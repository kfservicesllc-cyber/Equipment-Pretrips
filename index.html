<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>The Kingdom — Shanty Creek Resorts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root{
    --navy:#12233f;
    --navy-2:#1c3358;
    --gold:#c9a227;
    --gold-light:#e6c65c;
    --cream:#f7f4ec;
    --paper:#ffffff;
    --ink:#1a1e27;
    --ink-soft:#5b6472;
    --line:#dfd9c7;
    --ok:#3d7a5c;
    --warn:#b8791a;
    --bad:#a3372c;
    --radius:10px;
    --shadow: 0 1px 2px rgba(18,35,63,.06), 0 6px 20px rgba(18,35,63,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; padding:0 4px;}
  .table-scroll table{min-width:100%;}
  h1,h2,h3,.display{font-family:'Barlow Condensed',system-ui,sans-serif; text-transform:uppercase; letter-spacing:.03em;}
  .mono{font-family:'Roboto Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  /* Top bar */
  .topbar{
    background:var(--navy);
    color:var(--cream);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    box-shadow:var(--shadow);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .peak{width:26px;height:26px;flex:none;}
  .brand-text{line-height:1.05;}
  .brand-text .t1{font-family:'Barlow Condensed'; font-weight:700; font-size:19px; letter-spacing:.04em;}
  .brand-text .t2{font-size:10.5px; color:var(--gold-light); letter-spacing:.14em; text-transform:uppercase;}
  .mode-toggle{display:flex; background:rgba(255,255,255,.08); border-radius:999px; padding:3px; gap:2px;}
  .mode-toggle button{
    border:none; background:transparent; color:var(--cream); opacity:.65;
    padding:8px 16px; border-radius:999px; font-size:13px; font-weight:600; letter-spacing:.03em;
  }
  .mode-toggle button.active{background:var(--gold); color:var(--navy); opacity:1;}

  .wrap{max-width:1080px; margin:0 auto; padding:22px 16px 60px;}
  .wrap.narrow{max-width:520px;}

  /* Cards */
  .card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;}
  .card + .card{margin-top:16px;}
  .section-label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin-bottom:10px;}

  /* Driver: bus picker tiles */
  .tile-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;}
  .tile{
    border:1.5px solid var(--line); background:var(--paper); border-radius:var(--radius);
    padding:16px 12px; text-align:left; transition:border-color .15s, transform .1s;
  }
  .tile:active{transform:scale(.98);}
  .tile:hover{border-color:var(--gold);}
  .tile .bus-id{font-family:'Barlow Condensed'; font-size:26px; font-weight:700; color:var(--navy);}
  .tile .bus-name{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .tile .bus-mi{font-size:11px; color:var(--ink-soft); margin-top:8px; font-family:'Roboto Mono';}

  .action-choice{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .action-btn{
    border:2px solid var(--navy); border-radius:var(--radius); padding:22px 14px; background:var(--paper);
    font-family:'Barlow Condensed'; font-size:22px; font-weight:700; color:var(--navy); text-align:center;
  }
  .action-btn.start{border-color:var(--ok); color:var(--ok);}
  .action-btn.end{border-color:var(--bad); color:var(--bad);}
  .action-btn:active{transform:scale(.98);}

  .ticket-head{
    display:flex; align-items:baseline; justify-content:space-between; border-bottom:2px dashed var(--line);
    padding-bottom:12px; margin-bottom:16px;
  }
  .ticket-head .bus-big{font-family:'Barlow Condensed'; font-size:34px; font-weight:700; color:var(--navy); line-height:1;}
  .ticket-head .sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .badge{
    font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; letter-spacing:.04em; text-transform:uppercase;
  }
  .badge.start{background:#e4f2ea; color:var(--ok);}
  .badge.end{background:#f6e6e3; color:var(--bad);}

  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; letter-spacing:.02em;}
  input[type=text], input[type=number], textarea, select{
    width:100%; border:1.5px solid var(--line); border-radius:8px; padding:12px 12px; font-size:16px;
    font-family:inherit; background:var(--paper); color:var(--ink);
  }
  input:focus, textarea:focus, select:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold);}
  .field{margin-bottom:14px;}
  .odo-input{font-family:'Roboto Mono'; font-size:22px; font-weight:700; letter-spacing:.02em;}

  .check-row{
    padding:12px 4px; border-bottom:1px solid var(--line);
  }
  .check-row:last-child{border-bottom:none;}
  .check-row-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .check-row .lbl{font-size:14.5px; font-weight:600;}
  .pf-pair{display:flex; gap:6px; flex:none;}
  .pf-btn{border:1.5px solid var(--line); background:var(--paper); border-radius:6px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
  .pf-btn.pass.on{background:#e4f2ea; border-color:var(--ok); color:var(--ok);}
  .pf-btn.fail.on{background:#fbe3e0; border-color:var(--bad); color:var(--bad);}
  .check-fail-note{margin-top:8px;}
  .check-fail-note textarea{border-color:var(--bad);}
  .check-section-label{font-family:'Barlow Condensed'; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--navy); margin:16px 0 4px; padding-bottom:5px; border-bottom:2px solid var(--gold);}
  .check-section-label:first-child{margin-top:0;}
  .check-row .note-only-ta{margin-top:6px;}

  .issue-row{border:1.5px solid var(--line); border-radius:8px; padding:12px; margin-bottom:10px;}
  .issue-row-top{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .sev-pill{display:flex; gap:6px;}
  .sev-btn{border:1.5px solid var(--line); background:var(--paper); border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; color:var(--ink-soft);}
  .sev-btn.sel-minor.on{background:#fff3d6; border-color:var(--warn); color:var(--warn);}
  .sev-btn.sel-urgent.on{background:#fbe3e0; border-color:var(--bad); color:var(--bad);}
  .remove-issue{margin-left:auto; border:none; background:none; color:var(--ink-soft); font-size:12px; text-decoration:underline;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius:8px; padding:13px 20px; font-weight:700; font-size:14.5px; letter-spacing:.02em;
    text-transform:uppercase;
  }
  .btn-primary{background:var(--navy); color:var(--cream); width:100%;}
  .btn-primary:active{background:var(--navy-2);}
  .btn-gold{background:var(--gold); color:var(--navy); width:100%;}
  .btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--ink); text-transform:none; font-weight:600;}
  .btn-add-issue{width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--ink-soft); padding:12px; border-radius:8px; font-weight:600; font-size:13.5px;}
  .btn-sm{padding:7px 12px; font-size:12px; text-transform:none; border-radius:6px;}
  .btn-link{background:none; border:none; color:var(--navy); font-size:13px; font-weight:600; text-decoration:underline; padding:6px 0;}

  .confirm-wrap{text-align:center; padding:40px 16px;}
  .confirm-check{width:64px; height:64px; border-radius:50%; background:var(--ok); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:32px;}
  .confirm-wrap h2{margin:0 0 6px; font-size:26px;}
  .confirm-id{color:var(--ink-soft); font-size:13px; margin-bottom:24px;}

  /* Admin */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px;}
  .stat{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
  .stat .num{font-family:'Barlow Condensed'; font-size:32px; font-weight:700; color:var(--navy);}
  .stat .lab{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;}
  .stat.alert .num{color:var(--bad);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); border-bottom:2px solid var(--line); padding:8px 10px; white-space:nowrap;}
  td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase;}
  .tab-badge{display:inline-block; margin-left:6px; padding:1px 7px; border-radius:999px; background:var(--bad); color:#fff; font-size:10.5px; font-weight:700; vertical-align:1px;}
  a.unit-link{color:var(--navy-2); text-decoration:none; border-bottom:1px dotted var(--navy-2); cursor:pointer;}
  a.unit-link:hover{color:var(--gold); border-bottom-color:var(--gold);}
  .stat.clickable{cursor:pointer;}
  .stat.clickable:hover{outline:2px solid var(--gold);}
  .tag.open{background:#fbe3e0; color:var(--bad);}
  .tag.resolved{background:#e4f2ea; color:var(--ok);}
  .tag.minor{background:#fff3d6; color:var(--warn);}

  .bus-card{display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; padding:16px; border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; background:var(--paper);}
  .bus-card .info{flex:1; min-width:180px;}
  .bus-card .qrs{display:flex; gap:14px; flex-wrap:wrap;}
  .qr-box{text-align:center; font-size:11px; color:var(--ink-soft);}
  .qr-box img{border:1px solid var(--line); border-radius:6px; display:block; margin-bottom:5px;}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
  .toolbar select, .toolbar input{width:auto;}
  .toolbar select{max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* Pinned add/sort controls: stays visible at the top of the screen while its list scrolls
     underneath. positionPinned() (JS) sets the actual "top" px value for each .pin-top element,
     stacking multiple pinned bars in the same tab one below the other. */
  .pin-top{position:sticky; z-index:12;}
  .card.pin-top{background:var(--paper);}
  .toolbar.pin-top{background:var(--cream); padding:8px 2px 10px; margin-bottom:0;}

  /* ---- Admin chrome: control bar + filter drawer + add sheet -------------------
     applyAdminChrome() (JS) runs after every tab render. It lifts each tab's
     sort/filter toolbars out of the page into a right-hand drawer, and each
     "Add ___" card into a centre sheet, replacing them with one slim sticky
     control bar. That leaves the equipment list itself nearly the full screen. */
  .control-bar{display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    background:var(--cream); padding:8px 2px 9px; border-bottom:1px solid var(--line);}
  .control-bar .btn{width:auto; margin:0;}
  .filter-count{display:inline-flex; align-items:center; justify-content:center;
    min-width:18px; height:18px; padding:0 5px; margin-left:7px; border-radius:9px;
    background:var(--navy); color:#fff; font-size:11px; font-weight:700;}
  .chip-row{display:flex; gap:6px; flex-wrap:wrap; align-items:center;
    background:var(--cream); padding:0 2px 9px;}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:4px 8px 4px 10px;
    border-radius:14px; background:#eae5d6; border:1px solid var(--line);
    font-size:12px; font-weight:600; color:var(--ink-soft);}
  .chip button{background:none; border:none; padding:0 2px; margin:0; width:auto;
    font-size:14px; line-height:1; color:var(--ink-soft); cursor:pointer;}
  .chip button:hover{color:var(--bad);}

  .scrim{position:fixed; inset:0; background:rgba(18,35,63,.42); z-index:40;}
  .drawer{position:fixed; top:0; right:0; bottom:0; width:340px; max-width:88vw;
    background:var(--paper); z-index:41; display:flex; flex-direction:column;
    box-shadow:-6px 0 28px rgba(18,35,63,.24);}
  .drawer-head, .sheet-head{display:flex; align-items:center; justify-content:space-between;
    gap:12px; background:var(--navy); color:#fff; padding:13px 16px;
    border-bottom:3px solid var(--gold); flex:none;}
  .drawer-head .t, .sheet-head .t{font-family:'Barlow Condensed',sans-serif; font-size:18px;
    font-weight:700; letter-spacing:.05em; text-transform:uppercase;}
  .panel-close{background:none; border:none; color:#fff; font-size:13px; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase; padding:4px 2px; width:auto; margin:0; cursor:pointer;}
  .drawer-body{flex:1; overflow-y:auto; padding:16px 18px 26px;}
  .drawer-foot{flex:none; padding:12px 16px; border-top:1px solid var(--line); background:var(--cream);}
  .drawer-foot .btn{width:100%; margin:0;}
  /* Toolbars are rebuilt as stacked labelled fields once inside the drawer. */
  .drawer-field{margin-bottom:14px;}
  .drawer-field > label{display:block; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin-bottom:5px;}
  .drawer-field select, .drawer-field input{width:100%; max-width:none;}
  .drawer-field .btn{width:100%; margin:0;}
  .drawer-group + .drawer-group{margin-top:6px; padding-top:16px; border-top:1px solid var(--line);}

  .note-collapse{margin:2px 2px 12px;}
  .note-collapse > summary{list-style:none; cursor:pointer; font-size:12px; font-weight:600;
    letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft);
    padding:4px 0; display:flex; align-items:center; gap:7px;}
  .note-collapse > summary::-webkit-details-marker{display:none;}
  .note-collapse > summary::before{content:'\2139'; display:inline-flex; align-items:center;
    justify-content:center; width:16px; height:16px; border-radius:50%;
    background:var(--navy); color:#fff; font-size:11px; font-weight:700;}
  .note-collapse > summary::after{content:'Show'; color:var(--gold-light); font-weight:700;}
  .note-collapse[open] > summary::after{content:'Hide';}

  .tools-menu{position:fixed; z-index:43; background:var(--paper); border:1px solid var(--line);
    border-radius:10px; box-shadow:0 10px 30px rgba(18,35,63,.22); padding:6px; min-width:230px;}
  .tools-menu button{display:block; width:100%; text-align:left; background:none; border:none;
    padding:11px 12px; font-size:13.5px; font-weight:600; color:var(--ink); border-radius:6px; cursor:pointer;}
  .tools-menu button:hover{background:var(--cream);}

  .sheet-scrim{position:fixed; inset:0; background:rgba(18,35,63,.42); z-index:42;    overflow-y:auto; padding:36px 14px; display:flex; align-items:flex-start; justify-content:center;}
  .sheet{background:var(--paper); border-radius:var(--radius); width:100%; max-width:700px;
    box-shadow:0 18px 48px rgba(18,35,63,.3); overflow:hidden;}
  .sheet-head{border-radius:var(--radius) var(--radius) 0 0;}
  .sheet-body{padding:16px 18px 20px;}
  .sheet-body > .card{box-shadow:none; border:none; background:transparent; padding:0; margin:0;}
  @media (max-width:560px){
    .sheet-scrim{padding:0;}
    .sheet{border-radius:0; min-height:100%;}
    .sheet-head{border-radius:0;}
  }
  /* A list sitting below the pinned add/sort bars in a tab. sizeScrollLists() (JS) gives it
     its own height (filling whatever viewport space is left under the pinned stack) and its
     own scrollbar, so paging through a long list doesn't require scrolling past the pinned
     bars first, and more than one item can be seen at a time even when the pinned stack is tall. */
  .scroll-list{overflow-y:auto; -webkit-overflow-scrolling:touch; padding-right:2px; margin:0 -2px;}
  .empty{color:var(--ink-soft); font-size:13.5px; text-align:center; padding:30px 10px;}
  .tabs2{display:flex; gap:4px; border-bottom:2px solid var(--line); margin-bottom:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin; position:sticky; z-index:15; background:var(--cream); padding-top:8px;}
  .tabs2 button{white-space:nowrap; flex:none;}
  .tabs2 button{background:none; border:none; padding:10px 4px; margin-right:18px; font-weight:600; font-size:13.5px; color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-2px;}
  .tabs2 button.active{color:var(--navy); border-bottom-color:var(--gold);}
  .note{font-size:12px; color:var(--ink-soft); line-height:1.5;}
  .fail-banner{background:#fbe3e0; border:1.5px solid var(--bad); color:var(--bad); border-radius:8px; padding:12px 14px; font-size:13.5px; margin-bottom:14px; font-weight:600;}
  .settings-row{max-width:420px;}
  .flex-between{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  @media (max-width:560px){
    .action-choice{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg class="peak" viewBox="0 0 24 24" fill="none"><path d="M2 19L9 7l3.5 6L15 9l7 10H2z" fill="#c9a227"/></svg>
    <div class="brand-text">
      <div class="t1">The Kingdom</div>
      <div class="t2">Shanty Creek Equipment Logging and PM Tracking</div>
    </div>
  </div>
  <div class="mode-toggle" id="modeToggle">
    <button data-mode="driver" class="active">Equipment</button>
    <button data-mode="admin">Admin</button>
  </div>
</div>

<div id="app"></div>

<script>
(function(){

/* ---------- Supabase config ---------- */
const SUPABASE_URL = 'https://kyiqildemlstsrrzkcpy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5aXFpbGRlbWxzdHNycnprY3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTU2MzIsImV4cCI6MjA5ODQ5MTYzMn0.dS9rTqSRghdwIYRQ2JDAxqJGsSucTXv2ldXTV472uw8';

const supa = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
const CHECKLIST_PHOTOS_BUCKET = 'checklist-photos';

/* ---------- auth / profile helpers ---------- */
// Replaces the old client-side password check entirely. Signing in now goes through real
// Supabase Auth, and which department (or full-admin) an account can see is looked up from
// the `profiles` table, which the database itself enforces via RLS — not this file.
async function fetchMyProfile(userId){
  try{
    const { data, error } = await supa.from('profiles').select('*').eq('id', userId).maybeSingle();
    if(error || !data) return null;
    return data;
  }catch(e){
    console.error('profile fetch failed', e);
    return null;
  }
}
function applyProfile(profile){
  state.siteUnlocked = true;
  state.currentDepartmentKey = profile.is_full_admin ? null : profile.department_key;
  state.currentDepartmentName = profile.department_name || '';
  state.isViewOnly = !!profile.is_view_only;
  state.mode = 'admin';
}
async function tryRestoreSession(){
  if(!supa) return;
  try{
    const { data } = await supa.auth.getSession();
    const session = data && data.session;
    if(!session) return;
    const profile = await fetchMyProfile(session.user.id);
    if(profile) applyProfile(profile);
  }catch(e){
    console.error('session restore failed', e);
  }
}

/* ---------- storage helpers (Supabase-backed key/value store) ---------- */
let lastStorageError = null;
async function getJSON(key, fallback){
  if(!supa) return fallback;
  try{
    const { data, error } = await supa.from('kv_store').select('value').eq('key', key).maybeSingle();
    if(error || !data) return fallback;
    return data.value;
  }catch(e){
    console.error('storage get failed', key, e);
    return fallback;
  }
}
async function setJSON(key, val){
  if(!supa){ lastStorageError = 'Supabase library did not load.'; return false; }
  for(let attempt=0; attempt<2; attempt++){
    try{
      const { error } = await supa.from('kv_store').upsert({ key, value: val, updated_at: new Date().toISOString() });
      if(!error){ lastStorageError = null; return true; }
      lastStorageError = error.message || error.code || JSON.stringify(error);
      console.error('storage set failed', key, error);
    }catch(e){
      lastStorageError = (e && e.message) || String(e);
      console.error('storage set failed', key, e);
    }
  }
  return false;
}
async function deleteJSON(key){
  if(!supa) return false;
  try{
    const { error } = await supa.from('kv_store').delete().eq('key', key);
    if(!error) return true;
    console.error('storage delete failed', key, error);
    return false;
  }catch(e){
    console.error('storage delete failed', key, e);
    return false;
  }
}
// Shrinks and re-compresses a photo client-side before it ever leaves the phone — drivers are
// often on weak resort wifi/cell signal, and a raw phone photo can be 5-10MB. Caps the longest
// side at maxDim and re-encodes as JPEG at the given quality, which in practice lands well
// under 500KB while still being plenty legible for "what's wrong with this equipment."
function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Image compression failed')), 'image/jpeg', quality);
      };
      img.onerror = ()=> reject(new Error('Could not read that image file'));
      img.src = reader.result;
    };
    reader.onerror = ()=> reject(new Error('Could not read that image file'));
    reader.readAsDataURL(file);
  });
}
// Uploads a checklist/issue photo to the public checklist-photos storage bucket (works from the

// Short codes used to auto-prefix Quick-add numbered equipment so the same number can be
// reused at different locations (e.g. "SCH-12" at Schuss vs "CR-12" at Cedar River) without
// colliding, since Unit ID is the app's single global identifier for a piece of equipment.
const LOCATION_CODES = { 'Summit':'SUM', 'Schuss':'SCH', 'Schuss Mtn':'SCM', 'Cedar River':'CR', 'Legend':'LEG', 'Hawks Eye':'HE', 'Fleet':'FLT', 'Building Maintenance':'BM' };
// Parses input like "701-715, 720, 725-728" into a flat, de-duplicated list of ID strings.
// Ranges preserve the digit width of their first number, so "07-12" expands to 07, 08 ... 12
// instead of dropping the leading zero.
function parseNumberRanges(input){
  const out = [];
  const seen = new Set();
  String(input||'').split(',').forEach(tokenRaw=>{
    const token = tokenRaw.trim();
    if(!token) return;
    const m = token.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){
      const start = parseInt(m[1],10), end = parseInt(m[2],10);
      const width = m[1].length;
      if(start<=end){
        for(let n=start; n<=end; n++){
          const id = String(n).padStart(width,'0');
          if(!seen.has(id)){ seen.add(id); out.push(id); }
        }
      }
    } else if(!seen.has(token)){
      seen.add(token); out.push(token);
    }
  });
  return out;
}

/* ---------- PM helpers (meter- and calendar-based) ---------- */
// A PM item is either meter-based (intervalType 'meter' / unset: due every N hrs/mi past
// lastDoneReading) or calendar-based (intervalType 'days': due every N days past lastDoneDate).
// pmStatusFor computes one uniform status object for both kinds so every consumer (PM tab,
// PM Due tab, emails, badges, unit detail) shares identical due/soon math.
function pmIsDayBased(p){ return p.intervalType === 'days'; }
function pmStatusFor(bus, p, current){
  const SOON_FRACTION = 0.10;
  const interval = Number(p.intervalValue || 0);
  if(pmIsDayBased(p)){
    const lastDate = p.lastDoneDate ? new Date(p.lastDoneDate) : null;
    if(!lastDate || isNaN(lastDate)){
      return { dayBased:true, interval, hasBasis:false, isDue:false, soon:false, remaining:null, dueAt:null, dueAtLabel:'—', lastDoneLabel:'—', remainingUnit:'days' };
    }
    const dueDate = new Date(lastDate.getTime() + interval*86400000);
    const remaining = Math.ceil((dueDate.getTime() - Date.now()) / 86400000); // days left; <=0 due
    const isDue = remaining <= 0;
    const soon = !isDue && interval > 0 && remaining <= Math.max(1, interval * SOON_FRACTION);
    return { dayBased:true, interval, hasBasis:true, isDue, soon, remaining, dueAt: dueDate,
      dueAtLabel: dueDate.toLocaleDateString(), lastDoneLabel: lastDate.toLocaleDateString(), remainingUnit:'days' };
  }
  const lastDone = p.lastDoneReading || 0;
  const dueAt = lastDone + interval;
  const hasBasis = current != null;
  const remaining = hasBasis ? (dueAt - current) : null;
  const isDue = hasBasis && current >= dueAt;
  const soon = hasBasis && !isDue && interval > 0 && remaining <= interval * SOON_FRACTION;
  const unit = unitLabel(categoryFor(bus).trackingUnit);
  return { dayBased:false, interval, hasBasis, isDue, soon, remaining, dueAt,
    dueAtLabel: dueAt.toLocaleString() + ' ' + unit, lastDoneLabel: lastDone.toLocaleString() + ' ' + unit, remainingUnit: unit };
}
// Appends a "done" entry to the unit's PM history — the audit trail behind every Mark done.
// Capped so a unit's row in kv_store can't grow without bound.
function pushPmHistory(bus, p, reading){
  if(!bus.pmHistory) bus.pmHistory = [];
  bus.pmHistory.push({
    itemKey: p.key || null,
    label: p.label || '',
    at: new Date().toISOString(),
    reading: reading != null ? reading : null,
    by: currentDepartmentName() || 'Full Admin'
  });
  if(bus.pmHistory.length > 300) bus.pmHistory = bus.pmHistory.slice(-300);
}
function pmDueItemsFor(bus, mileage){
  if(!bus.pmItems || !bus.pmItems.length) return [];
  return bus.pmItems.filter(p => {
    if(pmIsDayBased(p)) return pmStatusFor(bus, p, null).isDue;
    if(mileage == null) return false;
    return mileage >= (p.lastDoneReading||0) + Number(p.intervalValue||0);
  });
}
function buildPmEmailBody(bus, driver, mileage, timestamp, dueItems){
  const cat = categoryFor(bus);
  const unit = unitLabel(cat.trackingUnit);
  let body = 'Preventive maintenance due\n\n';
  body += 'Equipment: ' + bus.id + (bus.name ? ' (' + bus.name + ')' : '') + ' — ' + cat.label + '\n';
  body += 'Location: ' + locationForBus(bus) + '\n';
  body += 'Driver: ' + driver + '\n';
  if(cat.trackingUnit !== 'none' && mileage != null){
    body += (cat.trackingUnit==='hours' ? 'Hour meter: ' : 'Odometer: ') + mileage + ' ' + unit + '\n';
  }
  body += 'Time: ' + fmtDT(timestamp) + '\n\n';
  body += 'Due items:\n';
  dueItems.forEach(p => {
    if(pmIsDayBased(p)){
      const st = pmStatusFor(bus, p, mileage);
      const overDays = st.remaining != null ? -st.remaining : 0;
      body += '- ' + p.label + ': due on ' + st.dueAtLabel + (overDays>0 ? ' (' + overDays + ' day' + (overDays===1?'':'s') + ' overdue)' : '') + '\n';
    } else {
      const dueAt = (p.lastDoneReading||0) + Number(p.intervalValue||0);
      const over = (mileage != null ? mileage : 0) - dueAt;
      body += '- ' + p.label + ': due at ' + dueAt.toLocaleString() + ' ' + unit + (over>=0 && mileage!=null ? ' (' + over.toLocaleString() + ' ' + unit + ' overdue)' : '') + '\n';
    }
  });
  return body;
}
async function sendPmNotification(bus, driver, mileage, timestamp, dueItems){
  const cat = categoryFor(bus);
  const subject = 'Maintenance due — ' + bus.id + ' (' + cat.label + ' · ' + locationForBus(bus) + ') — ' + dueItems.map(p=>p.label).join(', ');
  const body = buildPmEmailBody(bus, driver, mileage, timestamp, dueItems);
  return await sendAppEmail(subject, body, recipientsForPm(cat));
}

  // its own resolution state. `resolved` is the per-item stamp {at, by, note}; `isResolved`
  // also honors the legacy record-level issuesResolved flag so older data reads correctly.
  const fromChecks = s.preTrip ? Object.entries(s.preTrip)
    .filter(([k,v]) => v.status==='fail')
    .map(([k,v]) => {
      const item = cat && cat.checklist ? cat.checklist.find(c=>c.key===k) : null;
      return {source:'check', key:'check:'+k, label: item ? item.label : k, note: v.note, severity: v.severity||'minor', photoUrl: v.photoUrl || null,
        resolved: v.resolved || null, isResolved: !!v.resolved || !!s.issuesResolved};
    }) : [];
  const fromIssues = (s.issues||[]).map((i, idx) => ({source:'issue', key:'issue:'+idx, label: i.category, note: i.note, severity: i.severity||'minor', photoUrl: i.photoUrl || null,
    resolved: i.resolved || null, isResolved: !!i.resolved || !!s.issuesResolved}));
  return fromChecks.concat(fromIssues);
}
function recordHasUrgent(s, cat){
  // Urgent only counts while that specific item is still open — resolving the urgent item
  // (even if other minor items on the same record remain open) puts the unit back in service.
  return allFlaggedItems(s, cat).some(i=>i.severity==='urgent' && !i.isResolved);
}
// Finds the raw stored object behind a flagged-item key on a shift record, so resolution
// stamps land on the actual persisted data (preTrip entry or issues[] entry).
function rawFlaggedItem(rec, itemKey){
  if(itemKey.startsWith('check:')) return rec.preTrip ? rec.preTrip[itemKey.slice(6)] : null;
  if(itemKey.startsWith('issue:')) return (rec.issues||[])[Number(itemKey.slice(6))] || null;
  return null;
}
// Stamps one item resolved/reopened on a record and keeps the legacy record-level
// issuesResolved flag in sync (true only when every flagged item is resolved). Reopening an
// item on a legacy record (issuesResolved=true, no per-item stamps) first carries the old
// blanket resolution down onto each item so only the reopened one comes back open.
function setItemResolution(rec, cat, itemKey, resolution){
  const items = allFlaggedItems(rec, cat);
  if(!resolution && rec.issuesResolved){
    items.forEach(it => {
      const raw = rawFlaggedItem(rec, it.key);
      if(raw && !raw.resolved) raw.resolved = { at: null, by: '', note: '', legacy: true };
    });
  }
  const target = rawFlaggedItem(rec, itemKey);
  if(!target) return false;
  if(resolution) target.resolved = resolution;
  else delete target.resolved;
  rec.issuesResolved = allFlaggedItems(rec, cat).every(it => !!it.resolved);
  return true;
}

/* ---------- data access ---------- */
// Equipment and equipment types are sharded across one row per department (key
// 'buses:<deptKey>' / 'categories:<deptKey>', with '_core' used for anything not assigned to
// a department). Reads of these shards are open to everyone at the database level, since the
// no-login QR driver flow needs to find any unit regardless of department. What the database
// actually restricts is WRITES: a signed-in department account can only upsert its own shard,
// enforced by RLS, not by this file. Full admin merges every shard back into one flat list so
// the rest of the app's logic (busesForCurrentUser, categoriesForCurrentUser, etc.) is unchanged.
async function loadShardedRows(prefix){
  if(!supa) return [];
  try{
    const { data, error } = await supa.from('kv_store').select('key,value').like('key', prefix + ':%');
    if(error || !data) return [];
    return data.flatMap(row => Array.isArray(row.value) ? row.value : []);
  }catch(e){
    console.error('loadShardedRows failed', prefix, e);
    return [];
  }
}
function deptKeyOf(obj){
  return (obj && obj.department) || '_core';
}
// Equipment doesn't carry its own department tag directly — a bus is scoped to whichever
// department its equipment TYPE belongs to (see the "Equipment types this department can see"
// checkboxes in Admin → Departments). This mirrors how the original Supabase migration derived
// each bus's shard, and it's what lets one department (e.g. "Carts") own every unit of a type
// across every course, while each unit's own `location` field stays completely independent for
// QR-code scoping.
function busDeptKeyOf(bus){
  const cat = categoryFor(bus);
  return (cat && cat.department) || '_core';
}
async function saveSharded(prefix, items, groupKeyFn){
  if(isFullAdmin()){
    // Full admin can touch every shard, so re-zero every known department (plus '_core') to
    // avoid a shard that just emptied out staying stale.
    const allKeys = ['_core', ...state.departments.map(d=>d.key)];
    const groups = {};
    allKeys.forEach(k => groups[k] = []);
    items.forEach(item => {
      const k = groupKeyFn(item);
      if(!groups[k]) groups[k] = [];
      groups[k].push(item);
    });
    let allOk = true;
    for(const k of Object.keys(groups)){
      const ok = await setJSON(prefix + ':' + k, groups[k]);
      if(!ok) allOk = false;
    }
    return allOk;
  } else {
    // A department account only ever has permission to write its own shard. Everything in
    // scope for this session already belongs to that one department (see busesForCurrentUser /
    // categoriesForCurrentUser), so filtering to our own key reconstructs our shard safely
    // without attempting — and getting rejected for — writes to shards we don't own.
    const mine = items.filter(item => groupKeyFn(item) === state.currentDepartmentKey);
    return await setJSON(prefix + ':' + state.currentDepartmentKey, mine);
  }
}
async function loadBuses(){
  state.buses = await loadShardedRows('buses');
}
async function saveBuses(){
  return await saveSharded('buses', state.buses, busDeptKeyOf);
}
async function loadCategories(){
  let cats = await loadShardedRows('categories');
  if(!cats.length){
    cats = defaultCategories();
    // Seed once so they're immediately editable in Admin. Seeded categories have no
    // department, so they land in the '_core' shard (full-admin only).
    await setJSON('categories:_core', cats);
  } else {
    let changed = false;
    cats.forEach(c => {
      if(!c.checkMode){ c.checkMode = (c.key==='shuttle' ? 'shift' : 'daily'); changed = true; }
      if(c.simpleIssueReport === undefined){ c.simpleIssueReport = (c.label||'').trim().toLowerCase()==='golf cart'; changed = true; }
    });
    if(changed){ state.categories = cats; await saveSharded('categories', cats, deptKeyOf); }
  }
  state.categories = cats;
}

/* ---------- offline shift queue ---------- */
// If a driver submits in a dead spot (cart barn, back nine), the record is parked in
// localStorage on the phone instead of being lost behind a "retry" button. The queue is
// flushed on page load, whenever the browser comes back online, and every 60s as a backstop.
// Failure/PM notification emails for a queued record are sent at flush time, once the save
// actually lands.
const PENDING_SHIFTS_KEY = 'scfleet_pendingShifts';
function loadPendingShifts(){
  try{ return JSON.parse(localStorage.getItem(PENDING_SHIFTS_KEY)) || []; }catch(e){ return []; }
}
function savePendingShifts(list){
  try{ localStorage.setItem(PENDING_SHIFTS_KEY, JSON.stringify(list)); }catch(e){ console.error('pending queue save failed', e); }
}
function queuePendingShift(record, emailItems){
  const list = loadPendingShifts();
  list.push({ record, emailItems: emailItems || [] });
  savePendingShifts(list);
}
let flushingPending = false;
async function flushPendingShifts(){
  if(flushingPending || !supa) return;
  const list = loadPendingShifts();
  if(!list.length) return;
  flushingPending = true;
  try{
    const remaining = [];
    for(const entry of list){
      const rec = entry.record;
      try{
        // Read fresh from the server (bypass cache) so we merge against whatever actually
        // landed there, then skip if this record already made it up in a previous attempt.
        const serverArr = await getJSON('shifts:' + rec.busId, []);
        if(!serverArr.some(x => x.id === rec.id)) serverArr.push(rec);
        const ok = await saveShifts(rec.busId, serverArr);
        if(!ok){ remaining.push(entry); continue; }
        // Save landed — now send the notifications that were deferred while offline.
        const bus = state.buses.find(b=>b.id===rec.busId) || { id: rec.busId, name: rec.busName };
        if(entry.emailItems && entry.emailItems.length){
          await sendFailureNotification(bus, rec.driver, rec.mileage, rec.timestamp, entry.emailItems);
        }
        const pmDue = pmDueItemsFor(bus, rec.mileage);
        if(pmDue.length){
          await sendPmNotification(bus, rec.driver, rec.mileage, rec.timestamp, pmDue);
        }
      }catch(e){
        console.error('pending flush failed for', rec && rec.id, e);
        remaining.push(entry);
      }
    }
    savePendingShifts(remaining);
  }finally{
    flushingPending = false;
  }
}
// Fetches shift history for many buses in as few round trips as possible (chunked to stay
// well under any URL-length limits), instead of one request per bus. Populates shiftsCache
// for every requested id, defaulting to [] for any bus with no shift history yet.
async function loadShiftsBatch(busIds){
  const needed = busIds.filter(id => !state.shiftsCache[id]);
  if(!needed.length || !supa) return;
  const CHUNK = 200;
  for(let i=0; i<needed.length; i+=CHUNK){
    const chunk = needed.slice(i, i+CHUNK);
    const keys = chunk.map(id => 'shifts:' + id);
    try{
      const { data, error } = await supa.from('kv_store').select('key,value').in('key', keys);
      if(error){
        console.error('batch shift load failed', error);
        chunk.forEach(id => { if(!state.shiftsCache[id]) state.shiftsCache[id] = []; });
        continue;
      }
      const found = new Set();
      (data||[]).forEach(row => {
        const busId = row.key.slice('shifts:'.length);
        state.shiftsCache[busId] = row.value;
        found.add(busId);
      });
      chunk.forEach(id => { if(!found.has(id)) state.shiftsCache[id] = []; });
    }catch(e){
      console.error('batch shift load failed', e);
      chunk.forEach(id => { if(!state.shiftsCache[id]) state.shiftsCache[id] = []; });
    }
  }
}
async function loadAllShifts(){
  await loadShiftsBatch(state.buses.map(b=>b.id));
  const all = [];
  state.buses.forEach(b => {
    (state.shiftsCache[b.id] || []).forEach(s => all.push(s));
  });
  all.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  return all;
}
function lastMileage(busId){
  const arr = state.shiftsCache[busId] || [];
  if(!arr.length) return null;
  const sorted = [...arr].sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  return sorted[0].mileage;
}

function renderSiteGate(){
  const wrap = el('div', 'wrap narrow');

  card.innerHTML = '<div class="section-label">Sign in to continue</div>';

  const emailField = el('div','field'); emailField.style.marginTop='12px';
  emailField.innerHTML = '<label>Email</label>';
  const emailInput = document.createElement('input');
  emailInput.type='email'; emailInput.placeholder='you@shantycreek.com'; emailInput.id='site-email-input';
  emailInput.autocomplete='username';
  emailField.appendChild(emailInput);
  card.appendChild(emailField);

  const pwField = el('div','field'); pwField.style.marginTop='10px';
  pwField.innerHTML = '<label>Password</label>';
  const input = document.createElement('input');
  input.type='password'; input.placeholder='Password'; input.id='site-pw-input';
  input.autocomplete='current-password';
  pwField.appendChild(input);
  card.appendChild(pwField);

  const errMsg = el('div','note'); errMsg.style.color='var(--bad)'; errMsg.style.display='none';
  card.appendChild(errMsg);

  const submitBtn = document.createElement('button');
  submitBtn.className='btn btn-primary'; submitBtn.style.marginTop='10px'; submitBtn.textContent='Sign in';
  async function attempt(){
    const email = emailInput.value.trim();
    const password = input.value;
    if(!email || !password){
      errMsg.textContent = 'Enter both an email and a password.';
      errMsg.style.display = 'block';
      return;
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Signing in...';
    errMsg.style.display = 'none';
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if(error || !data.user){
      submitBtn.disabled = false; submitBtn.textContent = 'Sign in';
      errMsg.textContent = 'Incorrect email or password — try again.';
      errMsg.style.display = 'block';
      input.value = '';
      input.focus();
      return;
    }
    const profile = await fetchMyProfile(data.user.id);
    if(!profile){
      submitBtn.disabled = false; submitBtn.textContent = 'Sign in';
      errMsg.textContent = 'That login isn\'t linked to a department yet — ask Kody to set it up.';
      errMsg.style.display = 'block';
      await supa.auth.signOut();
      return;
    }
    applyProfile(profile);
    state.mode = 'admin';
    if(profile.is_view_only){
      state.admin.tab = 'overview';
      const subtitle = document.querySelector('.brand-text .t2');
      if(subtitle) subtitle.textContent = (profile.department_name || 'Ownership') + ' — view only';
    } else if(!profile.is_full_admin){
      state.admin.tab = 'buses';
      const subtitle = document.querySelector('.brand-text .t2');
      if(subtitle) subtitle.textContent = profile.department_name || 'Department';
    }
    render();
  }
  submitBtn.onclick = attempt;
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') attempt(); });
  emailInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') input.focus(); });
  card.appendChild(submitBtn);

  wrap.appendChild(card);
  app.appendChild(wrap);
  setTimeout(()=>{ const i = document.getElementById('site-email-input'); if(i) i.focus(); }, 50);
}

function renderDriver(){

      formPreTrip = {}; formIssues = [];

  card.appendChild(head);

  const form = el('div');

  // Driver / operator name
  const fName = el('div','field');
  fName.innerHTML = '<label>' + (action==='daily' ? 'Operator name' : 'Driver name') + '</label>';
  const nameInput = document.createElement('input');
  nameInput.type='text'; nameInput.placeholder='Full name'; nameInput.id='drv-name';
  // Prefill the last name used on this device — drivers scan several units a day and
  // shouldn't have to retype their own name every time.
  try{ nameInput.value = localStorage.getItem('scfleet_driverName') || ''; }catch(e){}
  fName.appendChild(nameInput);
  form.appendChild(fName);

  // Odometer / hour meter (skipped for equipment with no meter, e.g. trailers)
  if(cat.trackingUnit !== 'none'){
    const fOdo = el('div','field');
    fOdo.innerHTML = '<label>' + readingLabel(cat.trackingUnit) + '</label>';
    const odoInput = document.createElement('input');
    odoInput.type='number'; odoInput.inputMode='numeric'; odoInput.className='odo-input';
    odoInput.placeholder = lastMi!=null ? 'last: ' + lastMi.toLocaleString() : (cat.trackingUnit==='hours' ? 'e.g. 1420' : 'e.g. 48213');
    odoInput.id='drv-odo';
    fOdo.appendChild(odoInput);
    if(lastMi!=null) fOdo.appendChild(el('div','note','Last recorded: ' + lastMi.toLocaleString() + ' ' + unit));
    form.appendChild(fOdo);
  }

  if(showChecklist){
    if(!cat.simpleIssueReport){
      form.appendChild(el('div','section-label', action==='daily' ? 'Check — mark each Pass or Fail' : 'Pre-trip check — mark each Pass or Fail'));
    }
    const box = el('div','card');
    box.style.padding='4px 12px'; box.style.boxShadow='none'; box.style.marginBottom='14px';
    const checksWrap = el('div'); checksWrap.id='checksWrap';
    renderCheckRows(checksWrap, cat.checklist);
    box.appendChild(checksWrap);
    form.appendChild(box);
  }

  if(showIssues && cat.simpleIssueReport){
    // Simple, single "Report an Issue" box — no checklist linkage, no category dropdown, no
    // add-issue button. Just a description field and a Minor / Urgent choice. Used for equipment
    // types (e.g. Golf Cart) where the full multi-issue / category flow is more than is needed.
    form.appendChild(el('div','section-label','Report an Issue'));
    const box = el('div','card');
    box.style.padding='4px 12px'; box.style.boxShadow='none'; box.style.marginBottom='14px';
    const issuesWrap = el('div'); issuesWrap.id='issuesWrap';
    renderSimpleIssueBox(issuesWrap);
    box.appendChild(issuesWrap);
    form.appendChild(box);
  } else if(showIssues){
    const issuesLabel = action==='daily' ? 'Any additional issues to report?'
      : action==='start' ? 'Report an issue — including urgent / out of service'
      : 'Mechanical issues this shift';
    form.appendChild(el('div','section-label', issuesLabel));
    const issuesWrap = el('div'); issuesWrap.id='issuesWrap';
    renderIssueRows(issuesWrap);
    form.appendChild(issuesWrap);
    const addBtn = document.createElement('button');
    addBtn.className='btn-add-issue'; addBtn.textContent='+ Report an issue';
    addBtn.onclick = ()=>{ formIssues.push({id:uid('is'), category:ISSUE_CATEGORIES[0], severity:'minor', note:'', photoUrl:null, photoUploading:false}); renderIssueRows(issuesWrap); };
    form.appendChild(addBtn);
  }

  const fNote = el('div','field'); fNote.style.marginTop='14px';
  fNote.innerHTML = '<label>Notes (optional)</label>';
  const ta = document.createElement('textarea'); ta.rows=2; ta.id='drv-notes'; ta.placeholder='Anything else worth noting...';
  fNote.appendChild(ta);
  form.appendChild(fNote);

  card.appendChild(form);

  const submitBtn = document.createElement('button');
  submitBtn.className='btn btn-primary'; submitBtn.style.marginTop='6px';
  submitBtn.textContent = action==='start' ? 'Submit — Start Shift' : action==='end' ? 'Submit — End Shift' : 'Submit Check';
  submitBtn.onclick = () => submitShift(bus, action, submitBtn);
  card.appendChild(submitBtn);

  wrap.appendChild(card);
  if(action === 'daily'){
    if(!state.qrLocked){
      const back = el('button','btn-link','← Choose a different equipment');
      back.onclick = () => { state.driver.screen='pick'; state.driver.busId=null; formIssues=[]; formPreTrip={}; render(); };
      wrap.appendChild(back);
    } else if(state.qrLockedArea){
      const back = el('button','btn-link','← Choose a different unit');
      back.onclick = () => { state.driver.screen='areaPick'; state.driver.busId=null; formIssues=[]; formPreTrip={}; render(); };
      wrap.appendChild(back);
    }
  } else {
    const back = el('button','btn-link','← Back');
    back.onclick = () => { state.driver.screen='action'; formIssues=[]; formPreTrip={}; render(); };
    wrap.appendChild(back);
  }
}

// Shared photo-attachment widget for a failed check or a reported issue. `item` is the plain
// object being edited in place (a formPreTrip[key] entry, or a formIssues[] entry) — it needs
// photoUrl/photoUploading fields on it. `onChange` re-renders just the containing list so the
// widget's own state (uploading / has a photo / doesn't yet) reflects immediately.
function buildPhotoField(item, onChange){
  const wrap = el('div','photo-field');
  wrap.style.cssText = 'margin-top:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;';

  if(item.photoUploading){
    wrap.appendChild(el('div','note','Uploading photo...'));
    return wrap;
  }

  if(item.photoUrl){
    const thumb = document.createElement('img');
    thumb.src = item.photoUrl;
    thumb.alt = 'Attached photo';
    thumb.style.cssText = 'width:56px; height:56px; object-fit:cover; border-radius:6px; border:1px solid var(--line); cursor:pointer;';
    thumb.onclick = ()=> window.open(item.photoUrl, '_blank');
    wrap.appendChild(thumb);
    const rmBtn = document.createElement('button');
    rmBtn.className='btn-link'; rmBtn.textContent='Remove photo'; rmBtn.style.color='var(--bad)';
    rmBtn.onclick = (e)=>{ e.preventDefault(); item.photoUrl=null; onChange(); };
    wrap.appendChild(rmBtn);
    return wrap;
  }

  const label = document.createElement('label');
  label.className='btn-link'; label.textContent='📷 Add photo';
  label.style.cursor='pointer';
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*'; input.style.display='none';
  input.onchange = async ()=>{
    const file = input.files && input.files[0];
    if(!file) return;
    item.photoUploading = true; onChange();
    const url = await uploadChecklistPhoto(file, state.driver.busId);
    item.photoUploading = false;
    if(url) item.photoUrl = url;
    else alert('Photo upload failed — check your connection and try again.');
    onChange();
  };
  label.appendChild(input);
  wrap.appendChild(label);
  return wrap;
}

function renderCheckRows(container, checklist){
  container.innerHTML='';

  // Group items by an optional 'section' name (e.g. Tires / Body / Driveability), preserving
  // the order sections first appear in. Items with no section (the vast majority of equipment
  // types) land in a single unnamed group with no header, so this is a no-op for anything that
  // hasn't opted into sections.
  const sections = [];
  const sectionIndex = {};
  checklist.forEach(item => {
    const name = item.section || '';
    if(!(name in sectionIndex)){ sectionIndex[name] = sections.length; sections.push({name, items:[]}); }
    sections[sectionIndex[name]].items.push(item);
  });

  sections.forEach(sec => {
    if(sec.name){
      container.appendChild(el('div','check-section-label', sec.name));
    }
    sec.items.forEach(item => {
      const state_ = formPreTrip[item.key];
      const row = el('div','check-row');

      if(item.alwaysNote){
        // Catch-all free-text item — no Pass/Fail, just a note. Filling it in auto-flags it as
        // a (minor by default) fail so it flows through the same notification/PM-alert path as
        // any other failed check; leaving it blank submits clean.
        row.appendChild(el('div','lbl', item.label));
        const ta = document.createElement('textarea');
        ta.className = 'note-only-ta';
        ta.rows=2; ta.placeholder='Describe anything else worth flagging...'; ta.value = state_.note || '';
        ta.oninput = ()=>{
          formPreTrip[item.key].note = ta.value;
          formPreTrip[item.key].status = ta.value.trim() ? 'fail' : null;
        };
        row.appendChild(ta);
        if(state_.note && state_.note.trim()){
          const sevWrap = el('div','sev-pill');
          sevWrap.style.margin = '8px 0 0';
          const minorBtn = el('button','sev-btn sel-minor'+(state_.severity==='minor'?' on':''),'Minor');
          const urgentBtn = el('button','sev-btn sel-urgent'+(state_.severity==='urgent'?' on':''),'Urgent · Out of service');
          minorBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].severity='minor'; renderCheckRows(container, checklist); };
          urgentBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].severity='urgent'; renderCheckRows(container, checklist); };
          sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
          row.appendChild(sevWrap);
          row.appendChild(buildPhotoField(state_, ()=>renderCheckRows(container, checklist)));
        }
        container.appendChild(row);
        return;
      }

      const top = el('div','check-row-top');
      top.appendChild(el('div','lbl',item.label));
      const pair = el('div','pf-pair');
      const passBtn = el('button','pf-btn pass'+(state_.status==='pass'?' on':''),'Pass');
      const failBtn = el('button','pf-btn fail'+(state_.status==='fail'?' on':''),'Fail');
      passBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].status='pass'; renderCheckRows(container, checklist); };
      failBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].status='fail'; renderCheckRows(container, checklist); };
      pair.appendChild(passBtn); pair.appendChild(failBtn);
      top.appendChild(pair);
      row.appendChild(top);
      if(state_.status === 'fail'){
        const sevWrap = el('div','sev-pill');
        sevWrap.style.margin = '8px 0';
        const minorBtn = el('button','sev-btn sel-minor'+(state_.severity==='minor'?' on':''),'Minor');
        const urgentBtn = el('button','sev-btn sel-urgent'+(state_.severity==='urgent'?' on':''),'Urgent · Out of service');
        minorBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].severity='minor'; renderCheckRows(container, checklist); };
        urgentBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].severity='urgent'; renderCheckRows(container, checklist); };
        sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
        row.appendChild(sevWrap);

        const noteWrap = el('div','check-fail-note');
        const ta = document.createElement('textarea');
        ta.rows=2; ta.placeholder='What\'s wrong with ' + item.label.toLowerCase() + '?'; ta.value = state_.note;
        ta.oninput = ()=> formPreTrip[item.key].note = ta.value;
        noteWrap.appendChild(ta);
        row.appendChild(noteWrap);
        row.appendChild(buildPhotoField(state_, ()=>renderCheckRows(container, checklist)));
      }
      container.appendChild(row);
    });
  });
}

// Simplified single-slot version of the issue box: no category dropdown, no ability to add
// multiple rows — just a description field and a Minor / Urgent choice. formIssues is still used
// underneath (so submitShift / notifications / PM logic don't need to know the difference), it's
// just kept to a single entry and given a generic category label instead of showing a dropdown.
function renderSimpleIssueBox(container){
  container.innerHTML='';
  if(!formIssues.length){
    formIssues.push({id:uid('is'), category:'General', severity:'minor', note:'', photoUrl:null, photoUploading:false});
  }
  const iss = formIssues[0];
  const ta = document.createElement('textarea');
  ta.rows=3; ta.placeholder='Description of Issue — describe anything that came up...'; ta.value=iss.note;
  ta.oninput = ()=> iss.note = ta.value;
  container.appendChild(ta);
  const sevWrap = el('div','sev-pill');
  sevWrap.style.margin='8px 0 0';
  const minorBtn = el('button','sev-btn sel-minor'+(iss.severity==='minor'?' on':''),'Minor');
  const urgentBtn = el('button','sev-btn sel-urgent'+(iss.severity==='urgent'?' on':''),'Urgent · Out of service');
  minorBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='minor'; renderSimpleIssueBox(container); };
  urgentBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='urgent'; renderSimpleIssueBox(container); };
  sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
  container.appendChild(sevWrap);
  container.appendChild(buildPhotoField(iss, ()=>renderSimpleIssueBox(container)));
}

function renderIssueRows(container){
  container.innerHTML='';
  if(!formIssues.length){
    container.appendChild(el('div','note','No issues reported. If everything ran fine, leave this empty.'));
    return;
  }
  formIssues.forEach((iss, idx) => {
    const row = el('div','issue-row');
    const top = el('div','issue-row-top');
    const sel = document.createElement('select');
    ISSUE_CATEGORIES.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; if(c===iss.category)o.selected=true; sel.appendChild(o); });
    sel.onchange = ()=> iss.category = sel.value;
    top.appendChild(sel);
    const sevWrap = el('div','sev-pill');
    const minorBtn = el('button','sev-btn sel-minor'+(iss.severity==='minor'?' on':''),'Minor');
    const urgentBtn = el('button','sev-btn sel-urgent'+(iss.severity==='urgent'?' on':''),'Urgent · Out of service');
    minorBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='minor'; renderIssueRows(container); };
    urgentBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='urgent'; renderIssueRows(container); };
    sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
    top.appendChild(sevWrap);
    const rm = el('button','remove-issue','Remove');
    rm.onclick = (e)=>{ e.preventDefault(); formIssues.splice(idx,1); renderIssueRows(container); };
    top.appendChild(rm);
    row.appendChild(top);
    const ta = document.createElement('textarea');
    ta.rows=2; ta.placeholder='Describe the issue...'; ta.value=iss.note;
    ta.oninput = ()=> iss.note = ta.value;
    row.appendChild(ta);
    row.appendChild(buildPhotoField(iss, ()=>renderIssueRows(container)));
    container.appendChild(row);
  });
}

async function submitShift(bus, action, btn){
  const cat = categoryFor(bus);
  const name = document.getElementById('drv-name').value.trim();
  const odoEl = document.getElementById('drv-odo');
  const notesEl = document.getElementById('drv-notes');
  const notes = notesEl ? notesEl.value.trim() : '';

  if(!name){ alert('Please enter the driver name.'); return; }

  let mileage = null;
  if(cat.trackingUnit !== 'none'){
    const odoVal = odoEl ? odoEl.value : '';
    if(!odoVal){ alert('Please enter the ' + (cat.trackingUnit==='hours' ? 'hour meter reading.' : 'odometer reading.')); return; }
    mileage = Number(odoVal);
    if(Number.isNaN(mileage) || mileage < 0){ alert('That reading looks invalid.'); return; }
    // Sanity check against the last recorded reading — a fat-fingered extra digit poisons
    // lastMileage and fires every PM alert at once. Soft confirm only, since meter swaps and
    // corrections are legitimately possible.
    const prev = lastMileage(bus.id);
    if(prev != null){
      const unitTxt = unitLabel(cat.trackingUnit);
      if(mileage < prev){
        if(!confirm('Heads up: you entered ' + mileage.toLocaleString() + ' ' + unitTxt + ', which is LOWER than the last recorded reading (' + prev.toLocaleString() + ' ' + unitTxt + ').\n\nSubmit anyway?')) return;
      } else if(mileage > prev * 2 && mileage - prev > 1000){
        if(!confirm('Heads up: you entered ' + mileage.toLocaleString() + ' ' + unitTxt + ' — that\'s a big jump from the last recorded reading (' + prev.toLocaleString() + ' ' + unitTxt + '). Double-check for an extra digit.\n\nSubmit anyway?')) return;
      }
    }
  }

  try{ localStorage.setItem('scfleet_driverName', name); }catch(e){}

  if(Object.values(formPreTrip).some(v=>v.photoUploading) || formIssues.some(i=>i.photoUploading)){
    alert('A photo is still uploading — give it a moment and try submitting again.');
    return;
  }

  let failedChecks = [];
  const hasChecklist = (action === 'start' || action === 'daily');
  if(hasChecklist){
    const unanswered = cat.checklist.filter(c => !c.alwaysNote && (!formPreTrip[c.key] || !formPreTrip[c.key].status));
    if(unanswered.length){ alert('Please mark every check as Pass or Fail before submitting.'); return; }
    failedChecks = cat.checklist.filter(c => formPreTrip[c.key].status==='fail').map(c => ({label:c.label, note:formPreTrip[c.key].note, severity:formPreTrip[c.key].severity||'minor', photoUrl:formPreTrip[c.key].photoUrl||null}));
  }

  btn.disabled = true; btn.textContent = 'Saving...';

  const record = {
    id: uid('shift'),
    busId: bus.id,
    busName: bus.name || '',
    action, driver: name, mileage,
    timestamp: new Date().toISOString(),
    notes,
    preTrip: hasChecklist ? JSON.parse(JSON.stringify(formPreTrip)) : undefined,
    issues: formIssues.filter(i=>i.note && i.note.trim()).map(i=>({category:i.category, severity:i.severity, note:i.note, photoUrl:i.photoUrl||null})),
    issuesResolved: false
  };

  // Every flagged item (any failed check, any reported issue) triggers the email — severity is still
  // recorded and shown in Admin, it just no longer gates whether the notification goes out.
  const allFlagged = failedChecks.concat(record.issues.map(i=>({label: i.category, note: i.note, severity: i.severity, isIssue:true, photoUrl: i.photoUrl})));
  const emailItems = allFlagged.map(i=>({
    label: (i.isIssue ? i.label + (i.severity==='urgent' ? ' — urgent / out of service' : '') : i.label) + (i.severity==='urgent' ? ' ⚠ URGENT' : ''),
    note: i.note,
    photoUrl: i.photoUrl || null
  }));

  let ok = false;
  try{
    const arr = await loadShifts(bus.id);
    arr.push(record);
    ok = await saveShifts(bus.id, arr);
  }catch(e){
    console.error('shift save failed', e);
    ok = false;
  }

  let queuedOffline = false;
  if(!ok){
    // Save didn't land. If it looks like a connectivity problem (rather than a permissions /
    // data error), park the record on this device and hand it to the auto-retry queue — the
    // driver shouldn't have to stand in a dead spot mashing Retry.
    const looksLikeNetwork = !navigator.onLine || /failed to fetch|networkerror|load failed|network request failed|timeout/i.test(lastStorageError || '');
    if(looksLikeNetwork){
      queuePendingShift(record, emailItems);
      queuedOffline = true;
    } else {
      alert('Could not save.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ' Check your connection and try again.'));
      btn.disabled = false;
      btn.textContent = 'Retry submit';
      return;
    }
  }

  btn.textContent = queuedOffline ? 'Saved on this device' : 'Successfully submitted!';

  let emailResult = null;
  let pmDue = [];
  let pmEmailResult = null;
  if(!queuedOffline){
    if(emailItems.length){
      emailResult = await sendFailureNotification(bus, name, mileage, record.timestamp, emailItems);
    }
    // Preventive maintenance: fires every time a due item is crossed, on every log, until marked done in Admin.
    pmDue = pmDueItemsFor(bus, mileage);
    if(pmDue.length){
      pmEmailResult = await sendPmNotification(bus, name, mileage, record.timestamp, pmDue);
    }
  }

  state.driver.lastRecord = record;
  state.driver.failedChecks = allFlagged;
  state.driver.urgentCount = allFlagged.filter(i=>i.severity==='urgent').length;
  state.driver.emailResult = emailResult;
  state.driver.pmDue = pmDue;
  state.driver.pmEmailResult = pmEmailResult;
  state.driver.queuedOffline = queuedOffline;
  setTimeout(()=>{
    state.driver.screen = 'confirm';
    formIssues = []; formPreTrip = makeEmptyPreTrip();
    render();
  }, 500);
}

function flaggedItemsFromRecord(rec, cat){
  const failItems = (rec.preTrip ? Object.entries(rec.preTrip) : [])
    .filter(([k,v]) => v.status==='fail')
    .map(([k,v]) => {
      const item = cat.checklist.find(c=>c.key===k);
      const label = item ? item.label : k;
      return {label: label + (v.severity==='urgent' ? ' ⚠ URGENT' : ''), note: v.note, photoUrl: v.photoUrl || null};
    });
  const issueItems = (rec.issues||[])
    .map(i=>({label: i.category + (i.severity==='urgent' ? ' — urgent / out of service ⚠ URGENT' : ''), note: i.note, photoUrl: i.photoUrl || null}));
  return failItems.concat(issueItems);
}

function renderConfirm(wrap){
  const rec = state.driver.lastRecord;
  const flagged = state.driver.failedChecks || [];
  const urgentCount = state.driver.urgentCount || 0;
  const card = el('div','card confirm-wrap');
  const check = el('div','confirm-check','✓');
  card.appendChild(check);
  const h = document.createElement('h2'); h.textContent = 'Successfully submitted';
  card.appendChild(h);
  const recBus = state.buses.find(b=>b.id===rec.busId) || {id:rec.busId, name:rec.busName};
  const recCat = categoryFor(recBus);
  const recUnit = unitLabel(recCat.trackingUnit);
  const recReading = rec.mileage!=null ? (rec.mileage.toLocaleString() + ' ' + recUnit + ' · ') : '';
  card.appendChild(el('div','confirm-id', bus_(rec.busId) + ' · ' + recReading + fmtDT(rec.timestamp)));

  if(state.driver.queuedOffline){
    const offBanner = el('div','fail-banner');
    offBanner.style.textAlign='left';
    offBanner.style.background = '#fff3d6'; offBanner.style.borderColor = 'var(--warn)'; offBanner.style.color = 'var(--warn)';
    offBanner.innerHTML = '📶 No connection right now — this log is saved on this device and will upload automatically (with any notifications) as soon as signal comes back. Keep this browser; no need to resubmit.';
    card.appendChild(offBanner);
  }

  if(flagged.length){
    const banner = el('div','fail-banner');
    banner.style.textAlign='left';
    banner.innerHTML = '⚠ ' + flagged.length + ' item(s) flagged' + (urgentCount ? ' (' + urgentCount + ' urgent)' : '') + ': ' + flagged.map(c=>escapeHtml(c.label)).join(', ');
    card.appendChild(banner);

    const bus = state.buses.find(b=>b.id===rec.busId) || {id:rec.busId, name:rec.busName};
    const statusLine = el('div','note'); statusLine.style.marginBottom='10px';
    const resendBtn = document.createElement('button');
    resendBtn.className='btn btn-outline';

    const result = state.driver.emailResult;
    if(state.driver.queuedOffline){
      statusLine.style.color = 'var(--warn)';
      statusLine.textContent = 'Notification will be emailed automatically when this log uploads.';
      resendBtn.style.display = 'none';
    } else if(result && result.ok){
      statusLine.style.color = 'var(--ok)';
      statusLine.textContent = '✓ Notification emailed automatically to ' + escapeHtml(recipientsForFailure(recCat).join(', ')) + '.';
      resendBtn.textContent = 'Resend notification';
    } else if(result && result.method==='unconfigured'){
      statusLine.style.color = 'var(--bad)';
      statusLine.textContent = 'No notification sent — set up the notify email in Admin → Settings.';
      resendBtn.style.display = 'none';
    } else {
      statusLine.style.color = 'var(--bad)';
      statusLine.textContent = '✗ Notification failed to send: ' + escapeHtml((result && result.error) || 'unknown error') + '. This is still recorded in the shift log either way.';
      resendBtn.textContent = 'Retry sending';
    }
    card.appendChild(statusLine);

    if(resendBtn.style.display !== 'none'){
      resendBtn.onclick = async ()=>{
        resendBtn.disabled = true; resendBtn.textContent = 'Sending...';
        const items = flaggedItemsFromRecord(rec, recCat);
        const r = await sendFailureNotification(bus, rec.driver, rec.mileage, rec.timestamp, items);
        state.driver.emailResult = r;
        renderDriver();
      };
      card.appendChild(resendBtn);
    }
  }

  const pmDue = state.driver.pmDue || [];
  if(pmDue.length){
    const pmBanner = el('div','fail-banner');
    pmBanner.style.textAlign='left';
    pmBanner.style.background = '#fff3d6'; pmBanner.style.borderColor = 'var(--warn)'; pmBanner.style.color = 'var(--warn)';
    pmBanner.innerHTML = '🔧 Maintenance due: ' + pmDue.map(p=>escapeHtml(p.label)).join(', ');
    card.appendChild(pmBanner);

    const pmBus = state.buses.find(b=>b.id===rec.busId) || {id:rec.busId, name:rec.busName};
    const pmStatusLine = el('div','note'); pmStatusLine.style.marginBottom='10px';
    const pmResult = state.driver.pmEmailResult;
    const pmResendBtn = document.createElement('button');

      pmResendBtn.textContent = 'Retry sending';
    }
    card.appendChild(pmStatusLine);
    if(pmResendBtn.style.display !== 'none'){

        pmResendBtn.disabled = true; pmResendBtn.textContent = 'Sending...';

  const newBtn = document.createElement('button');

  newBtn.onclick = ()=>{

    formIssues=[]; formPreTrip={};

// Counts shown as badges on the admin tab strip — open issue items and PM items currently
// due, scoped to whatever the signed-in session can see. Reads only warm caches (boot batch-
// loads every unit's shifts), so it's safe to call synchronously while building the tabs.
function adminTabCounts(){
  const myBuses = busesForCurrentUser();
  let openIssues = 0;
  let pmDue = 0;
  myBuses.forEach(b => {
    const cat = categoryFor(b);
    (state.shiftsCache[b.id] || []).forEach(s => {
      allFlaggedItems(s, cat).forEach(it => { if(!it.isResolved) openIssues++; });
    });
    const current = lastMileage(b.id);
    (b.pmItems || []).forEach(p => { if(pmStatusFor(b, p, current).isDue) pmDue++; });
  });
  return { openIssues, pmDue };
}

async function renderAdminTab(holder){
  const all = await loadAllShifts();
  holder.innerHTML='';
  if((!isFullAdmin() || isViewOnly()) && (state.admin.tab==='settings' || state.admin.tab==='departments')){
    state.admin.tab = 'overview'; // department and view-only sessions can't reach these, even if state was fiddled with
  }
  if(!isFullAdmin()){
    const dept = state.departments.find(d=>d.key===state.currentDepartmentKey);
    const hiddenTabs = (dept && dept.hiddenTabs) || [];
    if(hiddenTabs.includes(state.admin.tab)) state.admin.tab = 'overview';
  }
  if(state.admin.tab==='overview') renderOverview(holder, all);
  else if(state.admin.tab==='buses') renderBusesTab(holder);
  else if(state.admin.tab==='types') renderEquipmentTypesTab(holder);
  else if(state.admin.tab==='pm') renderPmTab(holder);
  else if(state.admin.tab==='pmdue') renderPmDueTab(holder);
  else if(state.admin.tab==='issues') renderIssuesTab(holder, all);
  else if(state.admin.tab==='log') renderLogTab(holder, all);
  else if(state.admin.tab==='unitdetail') renderUnitDetailTab(holder, all);
  else if(state.admin.tab==='departments' && isFullAdmin() && !isViewOnly()) renderDepartmentsTab(holder);
  else if(state.admin.tab==='settings' && isFullAdmin() && !isViewOnly()) renderSettingsTab(holder);
  else if(state.admin.tab==='account') renderAccountTab(holder);
  // View-only logins (e.g. ownership) get every tab's full content, rendered above, but every
  // control that could add, save, delete, or upload something gets disabled right after —
  // simpler and safer than threading a read-only branch through each tab's render function.
  if(state.admin.tab !== 'account') lockDownForViewOnly(holder);
  // Lift this tab's filter toolbars into the side drawer and its Add cards into a
  // sheet, leaving one slim control bar. Runs before positionPinned() because it
  // changes what's left in the pinned stack.
  applyAdminChrome(holder);
  // Keep "Add" and "Sort/Filter" bars pinned to the top of the screen regardless of which
  // tab just rendered or how long its list is. Runs after layout settles (fonts/images can
  // still shift heights right after paint), and again shortly after in case they do.
  requestAnimationFrame(positionPinned);
  setTimeout(positionPinned, 200);
}

// Disables every button and file-upload input in the current tab for a view-only login.
// Everything else (sort/filter dropdowns, checkboxes used only for on-screen selection, text
// inputs) is left alone since none of it persists anything by itself — every actual save,
// delete, resolve, mark-done, resync, or CSV-import-confirm action in this app is wired to a
// button click, so disabling buttons is sufficient to make the whole tab inert to changes.
function lockDownForViewOnly(holder){
  if(!isViewOnly()) return;
  holder.querySelectorAll('button').forEach(function(b){ b.disabled = true; });
  holder.querySelectorAll('input[type="file"]').forEach(function(i){ i.disabled = true; });
}

// Standing rule: any "Add ___" card or sort/filter toolbar sitting above a list gets the
// .pin-top class so it stays visible while the list under it scrolls. This computes the
// sticky "top" offset for every .pin-top element in the current tab, stacking them in DOM
// order just below the topbar + tab strip (both of which are sticky themselves).
//
// If the tab also has a .scroll-list container (the actual card list, sitting after the
// pinned bars), this same pass gives it a max-height equal to whatever viewport space is
// left after the topbar, tab strip, pinned bars, and any plain (non-pinned) content above
// it — so that list gets its own internal scrollbar and scrolls independently of the page,
// rather than being squeezed down to a sliver by a tall pinned stack.
function positionPinned(){
  const holder = document.getElementById('admin-holder');
  if(!holder) return;
  const topbarEl = document.querySelector('.topbar');
  const tabsEl = document.querySelector('.tabs2');
  const baseline = (topbarEl ? topbarEl.offsetHeight : 0) + (tabsEl ? tabsEl.offsetHeight : 0);
  // flowHeight: total height of everything above the current point in normal (unscrolled)
  // document flow — used to size .scroll-list, since that's genuinely how much viewport
  // space is used up before the user scrolls at all.
  // stackHeight: height of only the OTHER pin-top bars stacked above this point — used as
  // a pin-top element's sticky "top" offset, since plain (non-sticky) content between two
  // pinned bars scrolls away for good and shouldn't be baked into a later bar's stuck
  // position (that previously left a permanent gap under the second bar once scrolled past).
  let flowHeight = baseline;
  let stackHeight = baseline;
  Array.from(holder.children).forEach(child => {
    if(child.classList.contains('pin-top')){
      child.style.top = stackHeight + 'px';
      stackHeight += child.offsetHeight;
      flowHeight += child.offsetHeight;
    } else if(child.classList.contains('scroll-list')){
      const available = window.innerHeight - flowHeight - 16;
      child.style.maxHeight = Math.max(240, available) + 'px';
      // Its own height is capped/scrollable now, so it doesn't add to either total —
      // nothing in these tabs currently follows a .scroll-list, but this keeps it safe if it does.
    } else {
      flowHeight += child.offsetHeight;
    }
  });
}

// ---- Admin chrome: filter drawer + add sheet --------------------------------
// Runs after every admin tab render. Rather than each tab building its own
// drawer, this takes what the tab already rendered and relocates it:
//   * every .toolbar.pin-top (sort/filter/print bars) -> right-hand drawer,
//     rebuilt as stacked labelled fields, opened by one "Filters" button
//   * every .card.pin-top ("Add equipment", "Add department", ...) -> a centre
//     sheet, opened by its own button in the control bar
// What's left above the list is a single slim control bar, so the list gets
// nearly the whole screen. Moving the live DOM nodes (rather than rebuilding
// them) keeps every existing onchange/onclick handler intact.
//
// Bars that manage their own show/hide (Carts Quick-add and Storage Area cards,
// marked data-self-panel) are left exactly where they are.
function closeAdminPanels(){
  ['admin-scrim','admin-drawer','admin-sheet','tools-menu'].forEach(id=>{
    const n = document.getElementById(id);
    if(n) n.remove();
  });
}

// The long explanatory paragraphs at the top of some tabs (and the QR printing
// note) cost more vertical space than the list they explain. Fold each into a
// one-line summary the user can open when they want it.
function collapseLongNotes(holder){
  Array.from(holder.children).forEach(node=>{
    if(!node.classList.contains('note')) return;
    if(node.dataset.noteDone) return;
    const text = (node.textContent || '').trim();
    if(text.length < 160) return; // short hints stay visible
    node.dataset.noteDone = '1';
    const det = document.createElement('details');
    det.className = 'note-collapse';
    const sum = document.createElement('summary');
    sum.textContent = node.dataset.noteTitle || 'Info & tips';
    det.appendChild(sum);
    holder.insertBefore(det, node);
    det.appendChild(node);
    node.style.margin = '8px 2px 2px';
  });
}

function activeFilterChips(drawerBody){
  // A select sitting on anything other than its first option is a live filter.
  // Every filter select in this app puts its "All ___" / default option first.
  // A search box with anything typed in it counts too.
  const chips = [];
  drawerBody.querySelectorAll('select').forEach(sel=>{
    if(sel.dataset.noChip) return;
    if(sel.selectedIndex > 0 && sel.options[sel.selectedIndex]){
      chips.push({
        label: sel.options[sel.selectedIndex].text,
        clear: ()=>{ sel.selectedIndex = 0; sel.dispatchEvent(new Event('change')); }
      });
    }
  });
  drawerBody.querySelectorAll('input[type="text"], input[type="search"], input:not([type])').forEach(inp=>{
    if(inp.dataset.noChip) return;
    if(String(inp.value || '').trim()){
      chips.push({
        label: '\u201C' + inp.value.trim() + '\u201D',
        clear: ()=>{
          inp.value = '';
          inp.dispatchEvent(new Event('input'));
          inp.dispatchEvent(new Event('change'));
        }
      });
    }
  });
  return chips;
}

function openFilterDrawer(){
  const drawer = document.getElementById('admin-drawer');

  drawer.style.display = 'flex';
  scrim.style.display = 'block';
}
function closeFilterDrawer(){
