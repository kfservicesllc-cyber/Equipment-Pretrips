function applyAdminChrome(holder){
  closeAdminPanels();

  const toolbars = Array.from(holder.children).filter(c=>
    c.classList.contains('pin-top') && c.classList.contains('toolbar') && !c.dataset.selfPanel && !c.dataset.keepInline);
  // Cards that become a control-bar button + sheet: the "Add ___" cards (pin-top) plus
  // anything explicitly marked data-sheet (CSV upload, quick-add, storage-area QRs...).
  const addCards = Array.from(holder.children).filter(c=>
    c.classList.contains('card') && (c.classList.contains('pin-top') || c.dataset.sheet) && !c.dataset.selfPanel);

  collapseLongNotes(holder);

  if(!toolbars.length && !addCards.length) return;

  const readOnly = (typeof isViewOnly === 'function') && isViewOnly();
  const bar = el('div','control-bar pin-top');

  // --- Add buttons -> sheet ---------------------------------------------------
  // The primary "Add ___" card gets its own solid button. Secondary tools (CSV
  // upload, quick-add, storage-area QRs) go behind one "Tools" menu so the control
  // bar stays a single row even on a phone.
  const tools = [];
  addCards.forEach(card=>{
    const labelEl = card.querySelector('.section-label');
    const title = card.dataset.sheetTitle || (labelEl ? labelEl.textContent.trim() : 'Add');
    if(labelEl) labelEl.remove(); // the sheet header shows it instead
    card.remove(); // parked off-DOM until its button is pressed

    if(card.classList.contains('pin-top')){
      const btn = document.createElement('button');
      btn.className = 'btn btn-primary btn-sm';
      btn.textContent = (/^add\b/i.test(title) ? '+ ' : '') + title;
      btn.disabled = readOnly;
      btn.onclick = ()=> openAdminSheet(title, card);
      bar.appendChild(btn);
    } else {
      tools.push({ title: title, card: card });
    }
  });
  if(tools.length){
    const toolsBtn = document.createElement('button');
    toolsBtn.className = 'btn btn-outline btn-sm';
    toolsBtn.textContent = 'Tools \u25BE';
    toolsBtn.disabled = readOnly;
    toolsBtn.onclick = (e)=>{ e.stopPropagation(); openToolsMenu(toolsBtn, tools); };
    bar.appendChild(toolsBtn);
  }

  // --- Filters button -> drawer ----------------------------------------------
  let filtersBtn = null, chipRow = null, drawerBody = null;
  if(toolbars.length){
    const scrim = el('div','scrim'); scrim.id = 'admin-scrim';
    const drawer = el('div','drawer'); drawer.id = 'admin-drawer';
    const head = el('div','drawer-head');
    head.appendChild(el('div','t','Filters & tools'));
    const closeBtn = el('button','panel-close','Close'); closeBtn.type='button';
    head.appendChild(closeBtn);
    drawer.appendChild(head);

    drawerBody = el('div','drawer-body');
    toolbars.forEach(tb=>{
      const group = el('div','drawer-group');
      // Toolbars are a flat run of bare text labels ("Show: "), selects, inputs and
      // buttons. Pair each control with the text node just before it and stack them.
      let pendingLabel = '';
      Array.from(tb.childNodes).forEach(node=>{
        if(node.nodeType === 3){
          const t = node.textContent.trim();
          if(t) pendingLabel = t.replace(/:\s*$/,'');
          return;
        }
        if(node.nodeType !== 1) return;
        const field = el('div','drawer-field');
        const tag = node.tagName;
        if(tag === 'SELECT' || tag === 'INPUT'){
          const labelText = pendingLabel || node.title || node.placeholder || '';
          if(labelText) field.appendChild(el('label',null,labelText));
        }
        pendingLabel = '';
        field.appendChild(node);
        group.appendChild(field);
      });
      if(group.children.length) drawerBody.appendChild(group);
      tb.remove();
    });
    drawer.appendChild(drawerBody);

    const foot = el('div','drawer-foot');
    const doneBtn = el('button','btn btn-primary','Done'); doneBtn.type='button';
    foot.appendChild(doneBtn);
    drawer.appendChild(foot);

    document.body.appendChild(scrim);
    document.body.appendChild(drawer);

    closeBtn.onclick = closeFilterDrawer;
    doneBtn.onclick = closeFilterDrawer;
    scrim.onclick = closeFilterDrawer;

    filtersBtn = document.createElement('button');
    filtersBtn.className = 'btn btn-outline btn-sm';
    filtersBtn.onclick = openFilterDrawer;
    bar.appendChild(filtersBtn);

    chipRow = el('div','chip-row pin-top');
  }

  holder.insertBefore(bar, holder.firstChild);
  if(chipRow) holder.insertBefore(chipRow, bar.nextSibling);

  // --- Active-filter chips ----------------------------------------------------
  // Without these, a filtered list just looks short with no clue why or where to
  // undo it — the whole reason the drawer needs a readout back on the page.
  if(chipRow && drawerBody){
    const chips = activeFilterChips(drawerBody);
    filtersBtn.textContent = 'Filters';
    if(chips.length){
      const count = el('span','filter-count', String(chips.length));
      filtersBtn.appendChild(count);
    }
    chipRow.innerHTML = '';
    chips.forEach(c=>{
      const chip = el('div','chip');
      chip.appendChild(document.createTextNode(c.label));
      const x = document.createElement('button');
      x.type = 'button'; x.textContent = '\u00D7'; x.title = 'Clear this filter';
      x.onclick = ()=>{ c.clear(); };
      chip.appendChild(x);
      chipRow.appendChild(chip);
    });
    chipRow.style.display = chips.length ? 'flex' : 'none';
  }

  // Filter changes re-render the whole tab, which rebuilds this drawer from
  // scratch — so reopen it if it was open, otherwise every dropdown change would
  // slam it shut mid-adjustment.
  if(state.admin.filtersOpen && toolbars.length) openFilterDrawer();
  else closeFilterDrawer();
}

// Small dropdown under the "Tools" button listing the secondary cards for this tab.
// Keeps the control bar to one row instead of a button per tool.
function closeToolsMenu(){
  const m = document.getElementById('tools-menu');
  if(m) m.remove();
}
function openToolsMenu(anchor, tools){
  if(document.getElementById('tools-menu')){ closeToolsMenu(); return; }
  const menu = el('div','tools-menu');
  menu.id = 'tools-menu';
  tools.forEach(t=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = t.title;
    b.onclick = ()=>{ closeToolsMenu(); openAdminSheet(t.title, t.card); };
    menu.appendChild(b);
  });
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  const w = menu.offsetWidth;
  menu.style.top = (r.bottom + 6) + 'px';
  // Keep it on screen on a narrow phone.
  menu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - w - 8)) + 'px';
  setTimeout(()=>{
    document.addEventListener('click', closeToolsMenu, { once:true });
  }, 0);
}

// Opens a parked "Add ___" card in a centre sheet. The card node is the live one// built by the tab, so its inputs and Save handlers work untouched.
function openAdminSheet(title, cardNode){
  const scrim = el('div','sheet-scrim'); scrim.id = 'admin-sheet';
  const sheet = el('div','sheet');
  const head = el('div','sheet-head');
  head.appendChild(el('div','t',title));
  const closeBtn = el('button','panel-close','Close'); closeBtn.type='button';
  head.appendChild(closeBtn);
  const body = el('div','sheet-body');
  body.appendChild(cardNode);
  sheet.appendChild(head);
  sheet.appendChild(body);
  scrim.appendChild(sheet);
  document.body.appendChild(scrim);

  const close = ()=>{
    // Hand the card back off-DOM so the button can reopen it with whatever was typed.
    if(cardNode.parentNode) cardNode.parentNode.removeChild(cardNode);
    scrim.remove();
  };
  closeBtn.onclick = close;
  scrim.onclick = (e)=>{ if(e.target === scrim) close(); };

  const firstInput = sheet.querySelector('input, select, textarea');
  if(firstInput) firstInput.focus();
}

// Esc closes whichever panel is on top.
if(!window._adminPanelEscBound){
  document.addEventListener('keydown', (e)=>{
    if(e.key !== 'Escape') return;
    if(document.getElementById('tools-menu')){ closeToolsMenu(); return; }
    const sheet = document.getElementById('admin-sheet');
    if(sheet){ sheet.remove(); return; }
    if(state.admin && state.admin.filtersOpen) closeFilterDrawer();
  });
  window._adminPanelEscBound = true;
}

function renderLabelTemplatesCard(holder){
  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Label sheet templates</div>';

  const intro = el('div','note');
  intro.style.marginBottom = '14px';
  intro.textContent = 'Upload the Word (.docx) template straight from Avery for any label sheet you want to print QR codes on, and the layout — label size, how many fit per sheet, spacing, margins — is read from the file automatically. Review the detected numbers below before saving; you can adjust anything that looks off.';
  card.appendChild(intro);

  const uploadField = el('div','field');
  uploadField.style.maxWidth = '420px';
  uploadField.innerHTML = '<label>Avery template file (.docx)</label>';
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.docx';
  uploadField.appendChild(fileInput);
  card.appendChild(uploadField);

  const parseStatus = el('div','note');
  parseStatus.style.margin = '10px 2px 0';
  card.appendChild(parseStatus);

  const reviewWrap = el('div');
  reviewWrap.style.cssText = 'display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--line);';
  card.appendChild(reviewWrap);

  fileInput.onchange = async ()=>{
    const file = fileInput.files && fileInput.files[0];
    if(!file) return;
    reviewWrap.style.display = 'none';
    reviewWrap.innerHTML = '';
    parseStatus.style.color = 'var(--ink-soft)';
    parseStatus.textContent = 'Reading template...';
    let parsed;
    try{
      parsed = await parseAveryTemplateFile(file);
    }catch(e){
      parseStatus.style.color = 'var(--bad)';
      parseStatus.textContent = '✗ ' + e.message;
      return;
    }
    let msg;
    if(parsed.cols && parsed.rows){
      msg = 'Detected ' + parsed.cols + ' × ' + parsed.rows + ' (' + (parsed.cols*parsed.rows) + ' per sheet).';
    } else {
      msg = 'Couldn\'t fully auto-detect this layout.';
    }
    if(parsed.warnings && parsed.warnings.length){
      parseStatus.style.color = 'var(--warn)';
      parseStatus.textContent = '⚠ ' + msg + ' ' + parsed.warnings.join(' ') + ' Review the fields below, then save.';
    } else {
      parseStatus.style.color = 'var(--ok)';
      parseStatus.textContent = '✓ ' + msg + ' Review the fields below, then save.';
    }
    renderTemplateReviewForm(reviewWrap, parsed);
    reviewWrap.style.display = 'block';
  };

  function renderTemplateReviewForm(wrap, parsed){
    const grid = el('div');
    grid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:12px; max-width:640px;';

    function numField(label, key, step){
      const f = el('div','field');
      f.innerHTML = `<label>${escapeHtml(label)}</label>`;
      const inp = document.createElement('input');
      inp.type = 'number'; inp.step = step || '0.001'; inp.value = parsed[key];
      inp.oninput = ()=>{ parsed[key] = parseFloat(inp.value) || 0; };
      f.appendChild(inp);
      grid.appendChild(f);
      return inp;
    }

    const nameField = el('div','field');
    nameField.style.gridColumn = '1 / -1';
    nameField.innerHTML = '<label>Name (shown in the Label size dropdown)</label>';
    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.value = parsed.name;
    nameInput.oninput = ()=>{ parsed.name = nameInput.value; };
    nameField.appendChild(nameInput);
    grid.appendChild(nameField);

    numField('Columns', 'cols', '1');
    numField('Rows', 'rows', '1');
    numField('Label width (in)', 'labelW');
    numField('Label height (in)', 'labelH');
    numField('Side margin (in)', 'sideMargin');
    numField('Top margin (in)', 'topMargin');
    numField('Column gap (in)', 'colGap');
    numField('Row gap (in)', 'rowGap');
    numField('QR code size (in)', 'qrSize');

    const layoutField = el('div','field');
    layoutField.innerHTML = '<label>Content layout</label>';
    const layoutSel = document.createElement('select');
    layoutSel.innerHTML = '<option value="vertical">Stacked (QR above text)</option><option value="horizontal">Side-by-side (QR beside text)</option>';
    layoutSel.value = parsed.layout;
    layoutSel.onchange = ()=>{ parsed.layout = layoutSel.value; };
    layoutField.appendChild(layoutSel);
    grid.appendChild(layoutField);

    const compactField = el('div','field');
    compactField.innerHTML = '<label>Compact (for small labels)</label>';
    const compactSel = document.createElement('select');
    compactSel.innerHTML = '<option value="1">Yes — ID + caption only</option><option value="0">No — full details</option>';
    compactSel.value = parsed.compact ? '1' : '0';
    compactSel.onchange = ()=>{ parsed.compact = compactSel.value === '1'; };
    compactField.appendChild(compactSel);
    grid.appendChild(compactField);

    wrap.appendChild(grid);

    const saveStatus = el('div','note');
    saveStatus.style.margin = '12px 2px 0';
    wrap.appendChild(saveStatus);

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary'; saveBtn.style.width = 'auto'; saveBtn.style.padding = '11px 18px'; saveBtn.style.marginTop = '12px';
    saveBtn.textContent = 'Save template';
    saveBtn.onclick = async ()=>{
      if(!parsed.name.trim()){ saveStatus.style.color='var(--bad)'; saveStatus.textContent = 'Give the template a name first.'; return; }
      if(!parsed.cols || !parsed.rows || !parsed.labelW || !parsed.labelH){ saveStatus.style.color='var(--bad)'; saveStatus.textContent = 'Columns, rows, and label width/height are required.'; return; }
      saveBtn.textContent = 'Saving...';
      const key = 'custom_' + uid('lbl');
      state.customLabelTemplates[key] = {
        name: parsed.name.trim(), cols: parsed.cols, rows: parsed.rows,
        labelW: parsed.labelW, labelH: parsed.labelH,
        sideMargin: parsed.sideMargin, topMargin: parsed.topMargin,
        colGap: parsed.colGap, rowGap: parsed.rowGap,
        layout: parsed.layout, qrSize: parsed.qrSize, compact: parsed.compact
      };
      const ok = await saveLabelTemplates();
      if(ok){
        saveStatus.style.color = 'var(--ok)';
        saveStatus.textContent = '✓ Saved. It now shows up in the Label size dropdown on Equipment & QR Codes.';
        wrap.style.display = 'none';
        fileInput.value = '';
        parseStatus.textContent = '';
        renderSavedTemplatesList(savedListWrap);
      } else {
        delete state.customLabelTemplates[key];
        saveStatus.style.color = 'var(--bad)';
        saveStatus.textContent = '✗ Could not save. Please try again.';
      }
      saveBtn.textContent = 'Save template';
    };
    wrap.appendChild(saveBtn);
  }

  const savedListWrap = el('div');
  savedListWrap.style.marginTop = '18px';
  card.appendChild(savedListWrap);
  renderSavedTemplatesList(savedListWrap);

  function renderSavedTemplatesList(wrap){
    wrap.innerHTML = '';
    const keys = Object.keys(state.customLabelTemplates || {});
    if(!keys.length){
      wrap.appendChild(el('div','note','No custom label templates saved yet — the built-in Avery sizes are still available in the dropdown.'));
      return;
    }
    wrap.appendChild(el('div','section-label','Saved custom templates'));
    keys.forEach(key=>{
      const t = state.customLabelTemplates[key];
      const row = el('div');
      row.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);';
      const info = el('div');
      info.innerHTML = `<div style="font-weight:700;">${escapeHtml(t.name)}</div><div style="font-size:12px; color:var(--ink-soft);">${t.cols} × ${t.rows} · ${t.labelW}" × ${t.labelH}" labels</div>`;
      row.appendChild(info);
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-outline'; delBtn.style.width = 'auto'; delBtn.style.padding = '8px 14px'; delBtn.style.color = 'var(--bad)';
      delBtn.textContent = 'Delete';
      delBtn.onclick = async ()=>{
        if(!confirm('Delete "' + t.name + '"? This can\'t be undone.')) return;
        delete state.customLabelTemplates[key];
        delBtn.textContent = 'Deleting...';
        const ok = await saveLabelTemplates();
        if(ok) renderSavedTemplatesList(wrap);
        else { alert('Could not delete. Please try again.'); await loadLabelTemplates(); renderSavedTemplatesList(wrap); }
      };
      row.appendChild(delBtn);
      wrap.appendChild(row);
    });
  }

  holder.appendChild(card);
}

function renderAccountTab(holder){
  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Your password</div>';
  const intro = el('div','note');
  intro.style.marginBottom = '12px';
  intro.textContent = isViewOnly()
    ? 'Change the password for this view-only login.'
    : isFullAdmin()
      ? 'Change the password for the full-admin login you\'re currently signed in with.'
      : 'Change the password for the ' + currentDepartmentName() + ' login you\'re currently signed in with.';
  card.appendChild(intro);

  const pwField = el('div','field'); pwField.style.maxWidth='320px';
  pwField.innerHTML = '<label>New password</label>';
  const pwInput = document.createElement('input');
  pwInput.type='text'; pwInput.placeholder='Leave blank to keep current password';
  pwField.appendChild(pwInput);
  card.appendChild(pwField);

  const status = el('div','note'); status.style.margin='8px 2px 0';
  card.appendChild(status);

  const saveBtn = document.createElement('button');
  saveBtn.className='btn btn-primary'; saveBtn.style.width='auto'; saveBtn.style.padding='11px 18px'; saveBtn.style.marginTop='10px';
  saveBtn.textContent='Update password';
  saveBtn.onclick = async ()=>{
    const newPw = pwInput.value.trim();
    if(!newPw){ status.style.color='var(--bad)'; status.textContent = 'Enter a new password first.'; return; }
    if(newPw.length < 6){ status.style.color='var(--bad)'; status.textContent = 'Use at least 6 characters.'; return; }
    saveBtn.textContent='Saving...';
    const { error } = await supa.auth.updateUser({ password: newPw });
    if(!error){
      status.style.color='var(--ok)';
      status.textContent = '✓ Password updated. Use the new one next time you sign in.';
      pwInput.value = '';
    } else {
      status.style.color='var(--bad)';
      status.textContent = '✗ Could not save. Details: ' + error.message;
    }
    saveBtn.textContent='Update password';
  };
  card.appendChild(saveBtn);
  holder.appendChild(card);
}

function renderDepartmentsTab(holder){

  addCard.innerHTML = '<div class="section-label">Add a new department</div>';

    <div class="field" style="flex:1; min-width:180px; margin-bottom:0;"><label>Department name</label><input type="text" id="new-dept-name" placeholder="e.g. Building Maintenance"></div>
  `;

  addBtn.onclick = async ()=>{
    const nameInput = document.getElementById('new-dept-name');
    const name = nameInput.value.trim();
    if(!name){ alert('Enter a department name.'); return; }
    state.departments.push({ key: uid('dept'), name });
    const ok = await saveDepartments();
    if(!ok){
      state.departments.pop();
      alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
      return;

  const resyncNote = el('div','note');
  resyncNote.style.marginBottom = '10px';
  resyncNote.textContent = 'Run this once after changing which department an equipment type belongs to below (e.g. assigning "Golf Cart" to a new department). It re-saves every unit into the correct department\'s storage so that department\'s login can add and edit them — nothing about what units exist or where they\'re located changes, this only fixes who can write to them.';
  resyncCard.appendChild(resyncNote);
  const resyncBtn = document.createElement('button');
  resyncBtn.className='btn btn-outline'; resyncBtn.style.width='auto'; resyncBtn.style.padding='11px 18px';
  resyncBtn.textContent = 'Resync now';
  resyncBtn.onclick = async ()=>{
    resyncBtn.disabled = true; resyncBtn.textContent = 'Resyncing...';
    const ok = await saveBuses();
    resyncBtn.disabled = false; resyncBtn.textContent = 'Resync now';
    if(ok) alert('Done — equipment has been resaved into the correct department shards.');
    else alert('Could not resync.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
  };
  resyncCard.appendChild(resyncBtn);
  holder.appendChild(resyncCard);

  state.departments.forEach((dept, idx) => {
    const card = el('div','card');
    const head = el('div','flex-between');
    const nameInput = document.createElement('input');
    nameInput.type='text'; nameInput.value=dept.name;
    nameInput.style.cssText = "font-family:'Barlow Condensed'; font-size:20px; font-weight:700; color:var(--navy); border:none; background:transparent; padding:2px 0; width:220px;";
    nameInput.oninput = ()=> { dept.name = nameInput.value; if(dept.linkedUserId) linkedNote.textContent = 'Linked to a Supabase Auth account. Re-save below if you just renamed this department.'; };
    head.appendChild(nameInput);
    const delBtn = document.createElement('button');
    delBtn.className='btn btn-outline btn-sm'; delBtn.textContent='Delete department';
    delBtn.onclick = async ()=>{
      if(!confirm('Delete "' + dept.name + '"? Its equipment types will stay but won\'t belong to any department until reassigned. This does not delete its Supabase Auth login — remove that separately in the Supabase dashboard if you want to fully retire it.')) return;
      state.departments = state.departments.filter(d=>d.key!==dept.key);
      const ok = await saveDepartments();
      if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
      renderAdminTab(holder);
    };
    head.appendChild(delBtn);
    card.appendChild(head);

    card.appendChild(el('div','section-label','Sign-in account'));
    const acctNote = el('div','note');
    acctNote.style.marginBottom = '8px';
    acctNote.innerHTML = 'Create this department\'s login once in the <strong>Supabase dashboard → Authentication → Users → Add user</strong> (an email + password), then paste that user\'s ID below to link it. Full steps are in the setup guide.';
    card.appendChild(acctNote);

    const linkField = el('div','field'); linkField.style.maxWidth='420px';
    linkField.innerHTML = '<label>Supabase Auth user ID</label>';
    const linkInput = document.createElement('input');
    linkInput.type='text'; linkInput.placeholder='e.g. 3fa85f64-5717-4562-b3fc-2c963f66afa6';
    linkInput.value = dept.linkedUserId || '';
    linkField.appendChild(linkInput);
    card.appendChild(linkField);

    const linkedNote = el('div','note'); linkedNote.style.margin = '6px 2px 0';
    linkedNote.style.color = dept.linkedUserId ? 'var(--ok)' : 'var(--ink-soft)';
    linkedNote.textContent = dept.linkedUserId ? '✓ Linked — this account can sign in as ' + dept.name + '.' : 'Not linked yet — this department has no working login.';
    card.appendChild(linkedNote);

    const linkBtn = document.createElement('button');
    linkBtn.className='btn btn-outline btn-sm'; linkBtn.style.marginTop='8px'; linkBtn.textContent='Save & link account';
    linkBtn.onclick = async ()=>{
      const uid = linkInput.value.trim();
      if(!uid){ alert('Paste the Supabase Auth user ID first.'); return; }
      linkBtn.disabled = true; linkBtn.textContent='Linking...';
      const { error } = await supa.from('profiles').upsert({
        id: uid, department_key: dept.key, department_name: dept.name, is_full_admin: false
      });
      if(error){
        alert('Could not link that account. Double check the user ID was copied exactly.\n\nDetails: ' + error.message);
        linkBtn.disabled = false; linkBtn.textContent='Save & link account';
        return;
      }
      dept.linkedUserId = uid;
      await saveDepartments();
      linkBtn.disabled = false; linkBtn.textContent='Save & link account';
      renderAdminTab(holder);

    card.appendChild(linkBtn);

      const belongsHere = cat.department === dept.key;
      const belongsElsewhere = cat.department && cat.department !== dept.key;
      const otherDept = belongsElsewhere ? state.departments.find(d=>d.key===cat.department) : null;
      const chip = document.createElement('label');
      chip.style.cssText = 'display:flex; align-items:center; gap:6px; border:1.5px solid ' + (belongsHere?'var(--navy)':'var(--line)') + '; border-radius:999px; padding:6px 12px; font-size:12.5px; cursor:pointer;' + (belongsElsewhere ? ' opacity:.5;' : '');
      const cb = document.createElement('input');
      cb.type='checkbox'; cb.checked = belongsHere; cb.disabled = !!belongsElsewhere;
      cb.style.cssText = 'width:15px; height:15px; accent-color:var(--navy);';
      cb.onchange = async ()=>{
        cat.department = cb.checked ? dept.key : null;
        const ok = await saveCategories();
        if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      chip.appendChild(cb);
      chip.appendChild(document.createTextNode(cat.label + (belongsElsewhere ? ' (in ' + (otherDept?otherDept.name:'another dept') + ')' : '')));
      typesWrap.appendChild(chip);
    });
    card.appendChild(typesWrap);

    card.appendChild(el('div','section-label','Tabs visible to this department'));
    const tabsNote = el('div','note');
    tabsNote.style.cssText = 'margin:-4px 0 8px; font-size:12px;';
    tabsNote.textContent = 'Overview and My Account always show. Uncheck anything this department doesn\'t need — e.g. a department that only does condition checks might not need Preventive Maintenance or Shift Log, just Mechanical Issues.';
    card.appendChild(tabsNote);
    const tabsWrap = el('div');
    tabsWrap.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;';
    if(!dept.hiddenTabs) dept.hiddenTabs = [];
    TOGGLEABLE_ADMIN_TABS.forEach(([key,label])=>{
      const hidden = dept.hiddenTabs.includes(key);
      const chip = document.createElement('label');
      chip.style.cssText = 'display:flex; align-items:center; gap:6px; border:1.5px solid ' + (!hidden?'var(--navy)':'var(--line)') + '; border-radius:999px; padding:6px 12px; font-size:12.5px; cursor:pointer;';
      const cb = document.createElement('input');
      cb.type='checkbox'; cb.checked = !hidden;
      cb.style.cssText = 'width:15px; height:15px; accent-color:var(--navy);';
      cb.onchange = ()=>{
        dept.hiddenTabs = cb.checked ? dept.hiddenTabs.filter(k=>k!==key) : dept.hiddenTabs.concat([key]);
        renderAdminTab(holder);
      };
      chip.appendChild(cb);
      chip.appendChild(document.createTextNode(label));
      tabsWrap.appendChild(chip);
    });
    card.appendChild(tabsWrap);

    const saveBtn = document.createElement('button');
    saveBtn.className='btn btn-primary'; saveBtn.style.width='auto'; saveBtn.style.padding='11px 18px';
    saveBtn.textContent='Save changes';
    saveBtn.onclick = async ()=>{
      saveBtn.textContent='Saving...';
      const ok = await saveDepartments();
      saveBtn.textContent = ok ? 'Saved' : 'Save failed';
      if(!ok) alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
      setTimeout(()=>{ saveBtn.textContent='Save changes'; }, 1500);
    };
    card.appendChild(saveBtn);

    holder.appendChild(card);
  });
}

function renderOverview(holder, allShifts){
  const myBuses = busesForCurrentUser();
  const myBusIds = new Set(myBuses.map(b=>b.id));
  const all = allShifts.filter(s => myBusIds.has(s.busId));

  const openIssues = [];
  all.forEach(s=>{
    const cat = categoryFor(myBuses.find(b=>b.id===s.busId) || {id:s.busId});
    allFlaggedItems(s, cat).forEach(item => { if(!item.isResolved) openIssues.push({rec:s, item}); });
  });
  const urgentCount = openIssues.filter(o=>o.item.severity==='urgent').length;

  // Stale units: nothing logged in the last 7 days (or ever) — catches equipment that's
  // quietly fallen out of its inspection/wash cycle.
  const STALE_DAYS = 7;
  const staleCutoff = Date.now() - STALE_DAYS*86400000;
  const isStaleBus = (b)=>{
    const arr = state.shiftsCache[b.id] || [];
    if(!arr.length) return true;
    return !arr.some(s => new Date(s.timestamp).getTime() >= staleCutoff);
  };
  const staleCount = myBuses.filter(isStaleBus).length;

  const goTab = (tab, setup)=>{ if(setup) setup(); state.admin.tab = tab; render(); };
  const stats = el('div','stat-grid');
  const eq = statCard(myBuses.length,'Equipment tracked');
  eq.classList.add('clickable'); eq.onclick = ()=> goTab('buses');
  stats.appendChild(eq);
  const lg = statCard(all.length,'Logs total');
  lg.classList.add('clickable'); lg.onclick = ()=> goTab('log');
  stats.appendChild(lg);
  const oi = statCard(openIssues.length,'Open issues'); if(urgentCount) oi.classList.add('alert');
  oi.classList.add('clickable'); oi.onclick = ()=> goTab('issues', ()=>{ state.admin.issueFilter='open'; });
  stats.appendChild(oi);
  const ui = statCard(urgentCount,'Urgent · out of service'); if(urgentCount) ui.classList.add('alert');
  ui.classList.add('clickable'); ui.onclick = ()=> goTab('issues', ()=>{ state.admin.issueFilter='open'; state.admin.issueSort='severity'; });
  stats.appendChild(ui);
  const st = statCard(staleCount,'Not logged ' + STALE_DAYS + '+ days'); if(staleCount) st.classList.add('alert');
  st.classList.add('clickable');
  st.onclick = ()=>{ state.admin.overviewShow = 'stale'; renderAdminTab(holder); };
  stats.appendChild(st);
  holder.appendChild(stats);

  if(myBuses.length){
    // Enrich each unit with its category, last shift record, and out-of-service flag
    // up front so every sort option below (including Status and Last shift) has what it needs.
    var enriched = myBuses.map(b=>{
      const arr = state.shiftsCache[b.id] || [];
      const sorted = [...arr].sort((a,x)=> new Date(x.timestamp)-new Date(a.timestamp));
      const last = sorted[0] || null;
      const cat = categoryFor(b);
      const hasUrgent = arr.some(s => recordHasUrgent(s, cat)); // per-item aware: resolving the urgent item returns the unit to service
      return {b, cat, last, hasUrgent};
    });

    const locationVal = state.admin.overviewLocationFilter || 'all';
    if(locationVal!=='all') enriched = enriched.filter(x => locationForBus(x.b)===locationVal);

    const showVal = state.admin.overviewShow || 'all';
    if(showVal==='stale') enriched = enriched.filter(x => isStaleBus(x.b));

    const sortVal = state.admin.overviewSort || 'location';
    enriched.sort((x,y)=>{
      if(sortVal==='id') return x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      if(sortVal==='type') return x.cat.label.localeCompare(y.cat.label) || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      if(sortVal==='status') return (y.hasUrgent - x.hasUrgent) || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      if(sortVal==='lastshift'){
        const xt = x.last ? new Date(x.last.timestamp).getTime() : -Infinity;
        const yt = y.last ? new Date(y.last.timestamp).getTime() : -Infinity;
        return yt - xt || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      }
      return locationForBus(x.b).localeCompare(locationForBus(y.b)) || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
    });

    const toolbar = el('div','toolbar pin-top');
    const showSel = document.createElement('select');
    showSel.innerHTML = '<option value="all">All units</option><option value="stale">Not logged ' + STALE_DAYS + '+ days</option>';
    showSel.value = showVal;
    showSel.onchange = ()=>{ state.admin.overviewShow = showSel.value; renderAdminTab(holder); };
    toolbar.appendChild(document.createTextNode('Show: '));
    toolbar.appendChild(showSel);

    const locSel = document.createElement('select');
    locSel.innerHTML = '<option value="all">All locations</option>' + LOCATIONS.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
    locSel.value = locationVal;
    locSel.onchange = ()=>{ state.admin.overviewLocationFilter = locSel.value; renderAdminTab(holder); };
    toolbar.appendChild(document.createTextNode('Location: '));
    toolbar.appendChild(locSel);

    const sortSel = document.createElement('select');
    sortSel.innerHTML = '<option value="location">Sort: Location</option><option value="id">Sort: ID</option>' +
      '<option value="type">Sort: Type</option><option value="status">Sort: Status (out of service first)</option>' +
      '<option value="lastshift">Sort: Last shift (most recent first)</option>';
    sortSel.value = sortVal;
    sortSel.onchange = ()=>{ state.admin.overviewSort = sortSel.value; renderAdminTab(holder); };
    toolbar.appendChild(document.createTextNode('Sort by: '));
    toolbar.appendChild(sortSel);

    // One-click status digest email — open issues + PM due across everything this session
    // can see, to the same recipients the automatic alerts use.
    const digestBtn = document.createElement('button');
    digestBtn.className='btn btn-outline btn-sm'; digestBtn.textContent='Email digest';
    digestBtn.onclick = async ()=>{
      digestBtn.disabled = true; digestBtn.textContent = 'Sending...';
      const r = await sendFleetDigest();
      digestBtn.disabled = false; digestBtn.textContent = 'Email digest';
      if(r.ok) alert('Digest sent to: ' + r.recipients.join(', '));
      else alert('Digest not sent — ' + r.error);
    };
    toolbar.appendChild(digestBtn);
    holder.appendChild(toolbar);
  }

  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Current status by equipment</div>';
  if(!myBuses.length){
    card.appendChild(el('div','empty','No equipment added yet — go to "Equipment & QR Codes" to add your fleet.'));
  } else if(!enriched.length){
    card.appendChild(el('div','empty','No equipment at this location.'));
  } else {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Location</th><th>Last reading</th><th>Last shift</th><th>Status</th></tr></thead>';
    const tbody = document.createElement('tbody');
    enriched.forEach(({b, cat, last, hasUrgent})=>{
      const tr = document.createElement('tr');
      const stale = isStaleBus(b);
      const lastCell = last ? escapeHtml(last.driver)+' · '+fmtDT(last.timestamp) : 'Never';
      tr.innerHTML = `<td>${unitLinkHtml(b.id)}</td><td>${escapeHtml(b.name||'—')}</td><td>${escapeHtml(cat.label)}</td><td>${escapeHtml(locationForBus(b))}</td>` +
        `<td class="mono">${last && last.mileage!=null ? last.mileage.toLocaleString()+' '+unitLabel(cat.trackingUnit) : '—'}</td>` +
        `<td>${stale ? '<span style="color:var(--warn); font-weight:600;">' + lastCell + '</span>' : lastCell}</td>` +
        `<td>${hasUrgent? '<span class="tag open">Out of service</span>' : '<span class="tag resolved">In service</span>'}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    bindUnitLinks(table);
    const scrollWrap = el('div','table-scroll');
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);
  }
  holder.appendChild(card);
}

// Composes and sends the on-demand fleet digest: every open issue item and every PM item
// currently due, scoped to the signed-in session. Recipients = union of the global failure
// and PM notify addresses from Admin → Settings.
async function sendFleetDigest(){
  const raw = (state.settings.notifyEmail || '') + ',' + (state.settings.pmNotifyEmail || '');
  const recipients = [...new Set(raw.split(',').map(e=>e.trim()).filter(Boolean))];
  if(!recipients.length) return { ok:false, error:'set a notify email in Admin → Settings first.' };

  const myBuses = busesForCurrentUser();
  const issueLines = [];
  const pmLines = [];
  myBuses.forEach(b => {
    const cat = categoryFor(b);
    (state.shiftsCache[b.id] || []).forEach(s => {
      allFlaggedItems(s, cat).forEach(it => {
        if(it.isResolved) return;
        const days = Math.floor((Date.now() - new Date(s.timestamp).getTime())/86400000);
        issueLines.push('- ' + b.id + (b.name?' ('+b.name+')':'') + ' — ' + it.label + (it.severity==='urgent'?' ⚠ URGENT':'') +
          (it.note?': '+it.note:'') + ' — reported by ' + s.driver + ', ' + (days<1?'today':days+' day'+(days===1?'':'s')+' ago'));
      });
    });
    const current = lastMileage(b.id);
    (b.pmItems || []).forEach(p => {
      const stPm = pmStatusFor(b, p, current);
      if(stPm.isDue) pmLines.push('- ' + b.id + (b.name?' ('+b.name+')':'') + ' — ' + (p.label||'PM item') + ' (due ' + (stPm.dayBased?'on ':'at ') + stPm.dueAtLabel + ')');
    });
  });

  const scopeName = currentDepartmentName() || 'All departments';
  let body = 'Fleet status digest — ' + scopeName + '\nGenerated: ' + fmtDT(new Date().toISOString()) + '\n\n';
  body += 'OPEN ISSUES (' + issueLines.length + ')\n' + (issueLines.length ? issueLines.join('\n') : 'None — all clear.') + '\n\n';
  body += 'PM DUE (' + pmLines.length + ')\n' + (pmLines.length ? pmLines.join('\n') : 'Nothing due.') + '\n\n';
  body += 'Sent from the Fleet Shift Log admin dashboard.';
  const r = await sendAppEmail('Fleet digest — ' + scopeName + ' — ' + new Date().toLocaleDateString(), body, recipients);
  return r.ok ? { ok:true, recipients } : { ok:false, error: r.error || 'send failed.' };
}

/* ---------- Avery .docx template parser ----------
   Reads an Avery-provided Word template (.docx, not the old .doc format) and derives the
   same geometry a person would otherwise have to work out by hand: label width/height,
   how many columns/rows fit per sheet, the gap between labels, and the sheet margins.

   How it works: Avery's templates lay the labels out as a single Word table. The table's
   column grid alternates label-width, gap-width, label-width, ... (or has no gap at all,
   just repeated equal-width columns), and row heights follow the same pattern vertically.
   We detect which width/height is the "real" label vs. the gap by majority count, then
   center that grid on the actual page size to get the margins — rather than trusting the
   template's own page-margin numbers, which are frequently just leftover authoring
   artifacts that don't match where the die-cut labels actually sit. */
function round5(n){ return Math.round(n * 100000) / 100000; }

function detectLabelAxis(valuesTwips){
  if(!valuesTwips.length) return null;
  if(valuesTwips.length === 1) return { count: 1, size: valuesTwips[0], gap: 0 };
  const groups = [];
  valuesTwips.forEach(v=>{
    const g = groups.find(g => Math.abs(g.value - v) <= 3);
    if(g) g.count++; else groups.push({ value: v, count: 1 });
  });
  groups.sort((a,b)=> b.count - a.count);
  const majority = groups[0];
  if(groups.length === 1) return { count: valuesTwips.length, size: majority.value, gap: 0 };
  const minority = groups[1];
  const expectedLabelCount = Math.ceil(valuesTwips.length / 2);
  const alternates = majority.count === expectedLabelCount && minority.count === (valuesTwips.length - expectedLabelCount);
  if(alternates) return { count: majority.count, size: majority.value, gap: minority.value };
  // Not a clean alternating pattern — likely a trailing scaffold column/row beyond the
  // print area (seen in some real Avery files). Keep the majority value, drop the rest.
  return { count: majority.count, size: majority.value, gap: 0 };
}

function humanizeTemplateFilename(filename){
  const base = filename.replace(/\.[^.]+$/, '');
  return base
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Za-z])([0-9])/g, '$1 $2')
    .replace(/([0-9])([A-Za-z])/g, '$1 $2')
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function extractFirstTag(xml, tagName){
  // Grabs the whole opening tag (e.g. "<w:pgSz w:h="15840" w:w="12240"/>") so attributes can
  // be read out of it regardless of what order the document happens to write them in.
  const re = new RegExp('<' + tagName + '\\b[^>]*/?>');
  const m = xml.match(re);
  return m ? m[0] : null;
}
function attrFromTag(tagStr, attrName){
  if(!tagStr) return null;
  const m = tagStr.match(new RegExp(attrName + '="([^"]*)"'));
  return m ? m[1] : null;
}

async function parseAveryTemplateFile(file){
  if(!/\.docx$/i.test(file.name)){
    throw new Error('That\'s an old .doc file — this can only read the newer .docx format. Open it in Word or Google Docs and use "Save As" / "Download" → Word (.docx), then upload that instead.');
  }
  if(!window.JSZip){
    throw new Error('The template-reading library didn\'t load. Refresh the page and try again.');
  }
  const buf = await file.arrayBuffer();
  const zip = await window.JSZip.loadAsync(buf);
  const docEntry = zip.file('word/document.xml');
  if(!docEntry) throw new Error('This doesn\'t look like a Word document (no word/document.xml found inside).');
  const xml = await docEntry.async('string');

  const warnings = [];

  // Page size — fall back to a standard sheet rather than blocking entirely if this can't
  // be read cleanly (attribute order, unexpected extra attributes, etc. vary between the
  // tool that produced the file).
  let pageW = 8.5, pageH = 11;
  const pgSzTag = extractFirstTag(xml, 'w:pgSz');
  const pgW = attrFromTag(pgSzTag, 'w:w');
  const pgH = attrFromTag(pgSzTag, 'w:h');
  if(pgW && pgH){
    pageW = parseInt(pgW, 10) / 1440;
    pageH = parseInt(pgH, 10) / 1440;
  } else {
    warnings.push('Couldn\'t read the page size from this file, so I assumed a standard 8.5" × 11" sheet.');
  }

  // Column grid
  const gridMatch = xml.match(/<w:tblGrid>([\s\S]*?)<\/w:tblGrid>/);
  const colWidths = gridMatch ? Array.from(gridMatch[1].matchAll(/w:w="(\d+)"/g)).map(m=>parseInt(m[1],10)) : [];
  if(!colWidths.length) warnings.push('Couldn\'t detect the column layout — fill in columns, label width, and column gap by hand below.');

  // Row heights — extract each whole <w:trHeight .../> tag first so w:val can be pulled out
  // regardless of what other attributes (w:hRule, etc.) sit alongside it or in what order.
  const rowHeightTags = Array.from(xml.matchAll(/<w:trHeight\b[^>]*\/?>/g)).map(m=>m[0]);
  const rowHeights = rowHeightTags.map(t=>attrFromTag(t, 'w:val')).filter(Boolean).map(v=>parseInt(v,10));
  if(!rowHeights.length) warnings.push('Couldn\'t detect the row layout — fill in rows, label height, and row gap by hand below.');

  const colAxis = colWidths.length ? detectLabelAxis(colWidths) : { count: 0, size: 0, gap: 0 };
  const rowAxis = rowHeights.length ? detectLabelAxis(rowHeights) : { count: 0, size: 0, gap: 0 };

  const cols = colAxis.count, rows = rowAxis.count;
  const labelW = colAxis.size / 1440, labelH = rowAxis.size / 1440;
  const colGap = colAxis.gap / 1440, rowGap = rowAxis.gap / 1440;

  let sideMargin = 0, topMargin = 0;
  if(cols && labelW){
    const totalGridW = cols * labelW + (cols - 1) * colGap;
    sideMargin = Math.max(0, (pageW - totalGridW) / 2);
  }
  if(rows && labelH){
    const totalGridH = rows * labelH + (rows - 1) * rowGap;
    topMargin = Math.max(0, (pageH - totalGridH) / 2);
  }

  const smaller = (labelW && labelH) ? Math.min(labelW, labelH) : Math.max(labelW, labelH, 2);
  const compact = smaller <= 2.3;
  const layout = labelW >= labelH ? 'horizontal' : 'vertical';
  let qrSize;
  if(compact) qrSize = smaller * 0.62;
  else if(layout === 'horizontal') qrSize = labelH * 0.8;
  else qrSize = labelW * 0.45;

  return {
    name: humanizeTemplateFilename(file.name) + (cols && rows ? ' (' + (cols*rows) + '/sheet)' : ''),
    cols, rows,
    labelW: round5(labelW), labelH: round5(labelH),
    sideMargin: round5(sideMargin), topMargin: round5(topMargin),
    colGap: round5(colGap), rowGap: round5(rowGap),
    layout, qrSize: round5(qrSize), compact,
    warnings
  };
}

let pendingImportRows = null;

function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field+='"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field='';
        if(row.length>1 || row[0]!=='') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function resolveCategoryByLabelOrKey(raw){
  if(!raw) return null;
  const r = raw.trim().toLowerCase();
  return categoriesForCurrentUser().find(c => c.key.toLowerCase()===r || c.label.toLowerCase()===r) || null;
}
function downloadCsvTemplate(){
  const sampleCat = categoriesForCurrentUser()[0];
  const rows = [
    ['ID','Name','Type','Location (optional)'],
    ['SH-9', 'Example shuttle', sampleCat ? sampleCat.label : 'Shuttle Bus', '']
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'equipment-upload-template.csv'; a.click();
  URL.revokeObjectURL(url);
}

          return;
        }

      };

      info.appendChild(btnRow);
    }
    card.appendChild(info);

    if(!cartsOnly){
      const qrs = el('div','qrs');
      const qrLabel = checkModeFor(cat)==='shift' ? 'Scan for Start / End of Shift' : 'Scan to log a check';
      const box = el('div','qr-box');

      printBtn.textContent='Print';

      qrs.appendChild(box);
      card.appendChild(qrs);
    }
    listScroll.appendChild(card);
  });
}

let pendingCatImportRows = null;

function resolveTrackingUnit(raw){
  const r = String(raw||'').trim().toLowerCase();
  if(r==='hours' || r==='hour' || r==='hrs') return 'hours';
  if(r==='miles' || r==='mile' || r==='mi') return 'miles';
  if(r==='none' || r==='not tracked' || r==='not-tracked' || r==='untracked' || r==='no') return 'none';
  return null;
}
function resolveCheckMode(raw){
  const r = String(raw||'').trim().toLowerCase();
  if(r==='daily' || r==='single daily / use check' || r==='single' || r==='use check' || r==='use') return 'daily';
  if(r==='shift' || r==='start / end shift' || r==='start/end shift' || r==='start-end') return 'shift';
  return null;
}
function trackingLabel(v){
  return v==='hours' ? 'Hours' : v==='miles' ? 'Miles' : 'Not tracked';
}
function checkModeLabel(v){
  return v==='shift' ? 'Start / End shift' : 'Single daily / use check';
}
function downloadCatCsvTemplate(){
  const rows = [
    ['Type Name','Tracking (Hours/Miles/Not tracked)','Workflow (Daily/Shift)','Checklist Items (optional, semicolon-separated)','Notify Email (optional)','PM Notify Email (optional)'],
    ['Utility Cart','Hours','Daily','Fluid levels; Tires; Lights','','']
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'equipment-types-upload-template.csv'; a.click();
  URL.revokeObjectURL(url);
}
function renderCatImportPreview(container, holder){
  container.innerHTML = '';
  if(!pendingCatImportRows || !pendingCatImportRows.length) return;

  const okRows = pendingCatImportRows.filter(r=>r.status==='ok');
  const errRows = pendingCatImportRows.filter(r=>r.status!=='ok');

  const table = document.createElement('table');
  table.innerHTML = '<thead><tr><th>Type Name</th><th>Tracking</th><th>Workflow</th><th>Checklist Items</th><th>Status</th></tr></thead>';
  const tbody = document.createElement('tbody');
  pendingCatImportRows.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><strong>${escapeHtml(r.label||'—')}</strong></td>
      <td>${r.trackingUnit ? escapeHtml(trackingLabel(r.trackingUnit)) : escapeHtml(r.trackingRaw||'—')}</td>
      <td>${r.checkMode ? escapeHtml(checkModeLabel(r.checkMode)) : escapeHtml(r.modeRaw||'—')}</td>
      <td>${r.checklist && r.checklist.length ? escapeHtml(r.checklist.map(c=>c.label).join(', ')) : '<span class="note">defaults</span>'}</td>
      <td>${r.status==='ok' ? '<span class="tag resolved">Will add</span>' : '<span class="tag open">'+escapeHtml(r.reason)+'</span>'}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  const scrollWrap = el('div','table-scroll');
  scrollWrap.appendChild(table);
  container.appendChild(scrollWrap);

  const summary = el('div','note');
  summary.style.margin = '10px 2px';
  summary.textContent = okRows.length + ' type(s) will be added' + (errRows.length ? ', ' + errRows.length + ' skipped (fix and re-upload if needed)' : '') + '.';
  container.appendChild(summary);

  const btnRow = el('div');
  btnRow.style.cssText = 'display:flex; gap:10px; flex-wrap:wrap;';
  const confirmBtn = document.createElement('button');
  confirmBtn.className='btn btn-gold'; confirmBtn.style.width='auto'; confirmBtn.style.padding='12px 20px';
  confirmBtn.textContent = 'Import ' + okRows.length + ' type(s)';

  confirmBtn.onclick = async ()=>{
    confirmBtn.disabled = true; confirmBtn.textContent = 'Importing...';
    const prevCats = state.categories;

      const newCat = {
        key: uid('cat'),
        label: r.label,
        trackingUnit: r.trackingUnit,
        checkMode: r.checkMode,
        checklist: (r.checklist && r.checklist.length) ? r.checklist : [
          {key:'fluids', label:'Fluid levels'},
          {key:'general', label:'General condition'}
        ]
      };
      if(r.notifyEmail) newCat.notifyEmail = r.notifyEmail;
      if(r.pmNotifyEmail) newCat.pmNotifyEmail = r.pmNotifyEmail;
      if(!isFullAdmin()) newCat.department = state.currentDepartmentKey;
      return newCat;
    }));
    const ok = await saveCategories();
    if(!ok){
      state.categories = prevCats;
      alert('Could not save these types.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ''));
      confirmBtn.disabled = false; confirmBtn.textContent = 'Import ' + okRows.length + ' type(s)';
      return;
    }
    pendingCatImportRows = null;
    renderAdminTab(holder);
  };
  btnRow.appendChild(confirmBtn);
  const cancelBtn = document.createElement('button');
  cancelBtn.className='btn btn-outline'; cancelBtn.textContent='Cancel';
  cancelBtn.onclick = ()=>{ pendingCatImportRows = null; renderAdminTab(holder); };
  btnRow.appendChild(cancelBtn);
  container.appendChild(btnRow);

  const catUploadCard = el('div','card');

  catUploadCard.appendChild(catUploadDesc);

  const catPreviewContainer = el('div');

  catUploadCard.appendChild(catPreviewContainer);

  catFileInput.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const rows = parseCsv(String(ev.target.result));
      if(!rows.length){ alert('That file looks empty.'); return; }
      let dataRows = rows;
      const first = rows[0].map(x=>String(x).trim().toLowerCase());
      if(first[0]==='type name' || first[0]==='name') dataRows = rows.slice(1);

      const seenLabels = new Set(state.categories.map(c=>c.label.trim().toLowerCase()));
      const seenInFile = new Set();
      pendingCatImportRows = dataRows.filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>{
        const label = String(r[0]||'').trim();
        const trackingRaw = String(r[1]||'').trim();
        const modeRaw = String(r[2]||'').trim();
        const checklistRaw = String(r[3]||'').trim();
        const notifyEmail = String(r[4]||'').trim();
        const pmNotifyEmail = String(r[5]||'').trim();

        const trackingUnit = resolveTrackingUnit(trackingRaw);
        const checkMode = resolveCheckMode(modeRaw);
        const checklist = checklistRaw ? checklistRaw.split(';').map(s=>s.trim()).filter(Boolean).map(l=>({key: uid('chk'), label:l})) : [];
        const dupKey = label.toLowerCase();

        let status='ok', reason='';
        if(!label){ status='error'; reason='Missing type name'; }
        else if(seenLabels.has(dupKey)){ status='error'; reason='Type already exists'; }
        else if(seenInFile.has(dupKey)){ status='error'; reason='Duplicate in file'; }
        else if(!trackingUnit){ status='error'; reason='Unknown tracking "'+trackingRaw+'"'; }
        else if(!checkMode){ status='error'; reason='Unknown workflow "'+modeRaw+'"'; }
        if(status==='ok') seenInFile.add(dupKey);
        return {label, trackingRaw, trackingUnit, modeRaw, checkMode, checklist, notifyEmail, pmNotifyEmail, status, reason};
      });

    modeSel.onchange = ()=> cat.checkMode = modeSel.value;
    rightSide.appendChild(modeSel);
    const unitSel = document.createElement('select');
    unitSel.innerHTML = '<option value="miles">Tracks miles</option><option value="hours">Tracks hours</option><option value="none">Not tracked (e.g. trailers)</option>';
    unitSel.value = cat.trackingUnit;
    unitSel.onchange = ()=> cat.trackingUnit = unitSel.value;
    rightSide.appendChild(unitSel);
    if(isFullAdmin() || cat.department === state.currentDepartmentKey){

      delBtn.className='btn btn-outline btn-sm'; delBtn.textContent='Delete type';

        // If this was one of the built-in default types, remember that it was deliberately

    const saveRow = el('div'); saveRow.style.marginTop='14px';
    const saveBtn = document.createElement('button');
    saveBtn.className='btn btn-primary'; saveBtn.style.width='auto'; saveBtn.style.padding='11px 18px'; saveBtn.textContent='Save changes';
    saveBtn.onclick = async ()=>{
      saveBtn.textContent='Saving...';

    holder.appendChild(card);

  if(isFullAdmin()){
  const dismissed = state.settings.dismissedBuiltins || [];
  const missing = defaultCategories().filter(dc => !state.categories.some(c => c.key === dc.key) && !dismissed.includes(dc.key));
  if(missing.length){

    const syncBtn = document.createElement('button');
    syncBtn.className='btn btn-gold'; syncBtn.style.width='auto'; syncBtn.style.padding='11px 18px';
    syncBtn.textContent = 'Add ' + missing.length + ' missing type' + (missing.length===1?'':'s');

      missing.forEach(m=>{ if(!state.settings.dismissedBuiltins.includes(m.key)) state.settings.dismissedBuiltins.push(m.key); });
