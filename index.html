<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>The Kingdom — Shanty Creek Resorts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root{
    --navy:#12233f;
    --navy-2:#1c3358;
    --gold:#c9a227;
    --gold-light:#e6c65c;
    --cream:#f7f4ec;
    --paper:#ffffff;
    --ink:#1a1e27;
    --ink-soft:#5b6472;
    --line:#dfd9c7;
    --ok:#3d7a5c;
    --warn:#b8791a;
    --bad:#a3372c;
    --radius:10px;
    --shadow: 0 1px 2px rgba(18,35,63,.06), 0 6px 20px rgba(18,35,63,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; padding:0 4px;}
  .table-scroll table{min-width:100%;}
  h1,h2,h3,.display{font-family:'Barlow Condensed',system-ui,sans-serif; text-transform:uppercase; letter-spacing:.03em;}
  .mono{font-family:'Roboto Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  /* Top bar */
  .topbar{
    background:var(--navy);
    color:var(--cream);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    box-shadow:var(--shadow);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .peak{width:26px;height:26px;flex:none;}
  .brand-text{line-height:1.05;}
  .brand-text .t1{font-family:'Barlow Condensed'; font-weight:700; font-size:19px; letter-spacing:.04em;}
  .brand-text .t2{font-size:10.5px; color:var(--gold-light); letter-spacing:.14em; text-transform:uppercase;}
  .mode-toggle{display:flex; background:rgba(255,255,255,.08); border-radius:999px; padding:3px; gap:2px;}
  .mode-toggle button{
    border:none; background:transparent; color:var(--cream); opacity:.65;
    padding:8px 16px; border-radius:999px; font-size:13px; font-weight:600; letter-spacing:.03em;
  }
  .mode-toggle button.active{background:var(--gold); color:var(--navy); opacity:1;}

  .wrap{max-width:1080px; margin:0 auto; padding:22px 16px 60px;}
  .wrap.narrow{max-width:520px;}

  /* Cards */
  .card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;}
  .card + .card{margin-top:16px;}
  .section-label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin-bottom:10px;}

  /* Driver: bus picker tiles */
  .tile-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;}
  .tile{
    border:1.5px solid var(--line); background:var(--paper); border-radius:var(--radius);
    padding:16px 12px; text-align:left; transition:border-color .15s, transform .1s;
  }
  .tile:active{transform:scale(.98);}
  .tile:hover{border-color:var(--gold);}
  .tile .bus-id{font-family:'Barlow Condensed'; font-size:26px; font-weight:700; color:var(--navy);}
  .tile .bus-name{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .tile .bus-mi{font-size:11px; color:var(--ink-soft); margin-top:8px; font-family:'Roboto Mono';}

  .action-choice{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .action-btn{
    border:2px solid var(--navy); border-radius:var(--radius); padding:22px 14px; background:var(--paper);
    font-family:'Barlow Condensed'; font-size:22px; font-weight:700; color:var(--navy); text-align:center;
  }
  .action-btn.start{border-color:var(--ok); color:var(--ok);}
  .action-btn.end{border-color:var(--bad); color:var(--bad);}
  .action-btn:active{transform:scale(.98);}

  .ticket-head{
    display:flex; align-items:baseline; justify-content:space-between; border-bottom:2px dashed var(--line);
    padding-bottom:12px; margin-bottom:16px;
  }
  .ticket-head .bus-big{font-family:'Barlow Condensed'; font-size:34px; font-weight:700; color:var(--navy); line-height:1;}
  .ticket-head .sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .badge{
    font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; letter-spacing:.04em; text-transform:uppercase;
  }
  .badge.start{background:#e4f2ea; color:var(--ok);}
  .badge.end{background:#f6e6e3; color:var(--bad);}

  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; letter-spacing:.02em;}
  input[type=text], input[type=number], textarea, select{
    width:100%; border:1.5px solid var(--line); border-radius:8px; padding:12px 12px; font-size:16px;
    font-family:inherit; background:var(--paper); color:var(--ink);
  }
  input:focus, textarea:focus, select:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold);}
  .field{margin-bottom:14px;}
  .odo-input{font-family:'Roboto Mono'; font-size:22px; font-weight:700; letter-spacing:.02em;}

  .check-row{
    padding:12px 4px; border-bottom:1px solid var(--line);
  }
  .check-row:last-child{border-bottom:none;}
  .check-row-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .check-row .lbl{font-size:14.5px; font-weight:600;}
  .pf-pair{display:flex; gap:6px; flex:none;}
  .pf-btn{border:1.5px solid var(--line); background:var(--paper); border-radius:6px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
  .pf-btn.pass.on{background:#e4f2ea; border-color:var(--ok); color:var(--ok);}
  .pf-btn.fail.on{background:#fbe3e0; border-color:var(--bad); color:var(--bad);}
  .check-fail-note{margin-top:8px;}
  .check-fail-note textarea{border-color:var(--bad);}

  .issue-row{border:1.5px solid var(--line); border-radius:8px; padding:12px; margin-bottom:10px;}
  .issue-row-top{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .sev-pill{display:flex; gap:6px;}
  .sev-btn{border:1.5px solid var(--line); background:var(--paper); border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; color:var(--ink-soft);}
  .sev-btn.sel-minor.on{background:#fff3d6; border-color:var(--warn); color:var(--warn);}
  .sev-btn.sel-urgent.on{background:#fbe3e0; border-color:var(--bad); color:var(--bad);}
  .remove-issue{margin-left:auto; border:none; background:none; color:var(--ink-soft); font-size:12px; text-decoration:underline;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius:8px; padding:13px 20px; font-weight:700; font-size:14.5px; letter-spacing:.02em;
    text-transform:uppercase;
  }
  .btn-primary{background:var(--navy); color:var(--cream); width:100%;}
  .btn-primary:active{background:var(--navy-2);}
  .btn-gold{background:var(--gold); color:var(--navy); width:100%;}
  .btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--ink); text-transform:none; font-weight:600;}
  .btn-add-issue{width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--ink-soft); padding:12px; border-radius:8px; font-weight:600; font-size:13.5px;}
  .btn-sm{padding:7px 12px; font-size:12px; text-transform:none; border-radius:6px;}
  .btn-link{background:none; border:none; color:var(--navy); font-size:13px; font-weight:600; text-decoration:underline; padding:6px 0;}

  .confirm-wrap{text-align:center; padding:40px 16px;}
  .confirm-check{width:64px; height:64px; border-radius:50%; background:var(--ok); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:32px;}
  .confirm-wrap h2{margin:0 0 6px; font-size:26px;}
  .confirm-id{color:var(--ink-soft); font-size:13px; margin-bottom:24px;}

  /* Admin */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px;}
  .stat{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
  .stat .num{font-family:'Barlow Condensed'; font-size:32px; font-weight:700; color:var(--navy);}
  .stat .lab{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;}
  .stat.alert .num{color:var(--bad);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); border-bottom:2px solid var(--line); padding:8px 10px; white-space:nowrap;}
  td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase;}
  .tag.open{background:#fbe3e0; color:var(--bad);}
  .tag.resolved{background:#e4f2ea; color:var(--ok);}
  .tag.minor{background:#fff3d6; color:var(--warn);}

  .bus-card{display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; padding:16px; border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; background:var(--paper);}
  .bus-card .info{flex:1; min-width:180px;}
  .bus-card .qrs{display:flex; gap:14px; flex-wrap:wrap;}
  .qr-box{text-align:center; font-size:11px; color:var(--ink-soft);}
  .qr-box img{border:1px solid var(--line); border-radius:6px; display:block; margin-bottom:5px;}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
  .toolbar select, .toolbar input{width:auto;}
  .toolbar select{max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* Pinned add/sort controls: stays visible at the top of the screen while its list scrolls
     underneath. positionPinned() (JS) sets the actual "top" px value for each .pin-top element,
     stacking multiple pinned bars in the same tab one below the other. */
  .pin-top{position:sticky; z-index:12;}
  .card.pin-top{background:var(--paper);}
  .toolbar.pin-top{background:var(--cream); padding:10px 2px 14px; margin-bottom:0;}
  .empty{color:var(--ink-soft); font-size:13.5px; text-align:center; padding:30px 10px;}
  .tabs2{display:flex; gap:4px; border-bottom:2px solid var(--line); margin-bottom:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin; position:sticky; z-index:15; background:var(--cream); padding-top:8px;}
  .tabs2 button{white-space:nowrap; flex:none;}
  .tabs2 button{background:none; border:none; padding:10px 4px; margin-right:18px; font-weight:600; font-size:13.5px; color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-2px;}
  .tabs2 button.active{color:var(--navy); border-bottom-color:var(--gold);}
  .note{font-size:12px; color:var(--ink-soft); line-height:1.5;}
  .fail-banner{background:#fbe3e0; border:1.5px solid var(--bad); color:var(--bad); border-radius:8px; padding:12px 14px; font-size:13.5px; margin-bottom:14px; font-weight:600;}
  .settings-row{max-width:420px;}
  .flex-between{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  @media (max-width:560px){
    .action-choice{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg class="peak" viewBox="0 0 24 24" fill="none"><path d="M2 19L9 7l3.5 6L15 9l7 10H2z" fill="#c9a227"/></svg>
    <div class="brand-text">
      <div class="t1">The Kingdom</div>
      <div class="t2">Shanty Creek Equipment Logging and PM Tracking</div>
    </div>
  </div>
  <div class="mode-toggle" id="modeToggle">
    <button data-mode="driver" class="active">Equipment</button>
    <button data-mode="admin">Admin</button>
  </div>
</div>

<div id="app"></div>

<script>
(function(){

/* ---------- Supabase config ---------- */
const SUPABASE_URL = 'https://kyiqildemlstsrrzkcpy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5aXFpbGRlbWxzdHNycnprY3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTU2MzIsImV4cCI6MjA5ODQ5MTYzMn0.dS9rTqSRghdwIYRQ2JDAxqJGsSucTXv2ldXTV472uw8';

const supa = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ---------- auth / profile helpers ---------- */
// Replaces the old client-side password check entirely. Signing in now goes through real
// Supabase Auth, and which department (or full-admin) an account can see is looked up from
// the `profiles` table, which the database itself enforces via RLS — not this file.
async function fetchMyProfile(userId){
  try{
    const { data, error } = await supa.from('profiles').select('*').eq('id', userId).maybeSingle();
    if(error || !data) return null;
    return data;
  }catch(e){
    console.error('profile fetch failed', e);
    return null;
  }
}
function applyProfile(profile){
  state.siteUnlocked = true;
  state.currentDepartmentKey = profile.is_full_admin ? null : profile.department_key;
  state.currentDepartmentName = profile.department_name || '';
  state.mode = 'admin';
}
async function tryRestoreSession(){
  if(!supa) return;
  try{
    const { data } = await supa.auth.getSession();
    const session = data && data.session;
    if(!session) return;
    const profile = await fetchMyProfile(session.user.id);
    if(profile) applyProfile(profile);
  }catch(e){
    console.error('session restore failed', e);
  }
}

/* ---------- storage helpers (Supabase-backed key/value store) ---------- */
let lastStorageError = null;
async function getJSON(key, fallback){
  if(!supa) return fallback;
  try{
    const { data, error } = await supa.from('kv_store').select('value').eq('key', key).maybeSingle();
    if(error || !data) return fallback;
    return data.value;
  }catch(e){
    console.error('storage get failed', key, e);
    return fallback;
  }
}
async function setJSON(key, val){
  if(!supa){ lastStorageError = 'Supabase library did not load.'; return false; }
  for(let attempt=0; attempt<2; attempt++){
    try{
      const { error } = await supa.from('kv_store').upsert({ key, value: val, updated_at: new Date().toISOString() });
      if(!error){ lastStorageError = null; return true; }
      lastStorageError = error.message || error.code || JSON.stringify(error);
      console.error('storage set failed', key, error);
    }catch(e){
      lastStorageError = (e && e.message) || String(e);
      console.error('storage set failed', key, e);
    }
  }
  return false;
}
function uid(prefix){
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
function fmtDT(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
function qrUrl(dataStr, size){
  return 'https://api.qrserver.com/v1/create-qr-code/?size=' + (size||'170x170') + '&data=' + encodeURIComponent(dataStr);
}
function selfUrlFor(busId){
  const base = window.location.href.split('#')[0];
  return base + '#bus=' + encodeURIComponent(busId);
}
function buildFailureEmailBody(bus, driver, mileage, timestamp, failedChecks){
  const cat = categoryFor(bus);
  let body = 'Pre-trip check failure\n\n';
  body += 'Equipment: ' + bus.id + (bus.name ? ' (' + bus.name + ')' : '') + ' — ' + cat.label + '\n';
  body += 'Driver: ' + driver + '\n';
  if(cat.trackingUnit !== 'none' && mileage != null){
    body += (cat.trackingUnit==='hours' ? 'Hour meter: ' : 'Odometer: ') + mileage + ' ' + unitLabel(cat.trackingUnit) + '\n';
  }
  body += 'Time: ' + fmtDT(timestamp) + '\n\n';
  body += 'Failed checks:\n';
  failedChecks.forEach(c => {
    body += '- ' + c.label + (c.note ? ': ' + c.note : ' (no note provided)') + '\n';
  });
  return body;
}
async function sendAppEmail(subject, body, recipients){
  if(!recipients || !recipients.length){
    return { ok:false, method:'unconfigured', error:'Set at least one notify email in Admin → Settings, or on this equipment\'s type.' };
  }
  try{
    const res = await fetch(SUPABASE_URL + '/functions/v1/hyper-worker', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ to: recipients, subject, message: body })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      return { ok:false, method:'send_error', error: (data && data.error) || ('HTTP ' + res.status) };
    }
    return { ok:true, method:'auto' };
  }catch(e){
    console.error('Edge function send failed', e);
    return { ok:false, method:'send_error', error: (e && e.message) || 'Unknown error' };
  }
}
// A category's own notify email overrides the global default when set; otherwise falls back
// to Admin → Settings. Lets a department (e.g. Building Maintenance) route its own alerts
// to its own inbox without touching everyone else's.
function recipientsForFailure(cat){
  const raw = (cat && cat.notifyEmail && cat.notifyEmail.trim()) ? cat.notifyEmail : (state.settings.notifyEmail || '');
  return raw.split(',').map(e=>e.trim()).filter(Boolean);
}
// PM (maintenance-due) recipients: category PM address → global PM address → falls back to
// whatever failure-alert address would apply, so PM emails never go silent just because no
// PM-specific address has been set up yet.
function recipientsForPm(cat){
  const catPm = (cat && cat.pmNotifyEmail && cat.pmNotifyEmail.trim()) ? cat.pmNotifyEmail : '';
  if(catPm) return catPm.split(',').map(e=>e.trim()).filter(Boolean);
  const globalPm = (state.settings.pmNotifyEmail || '').trim();
  if(globalPm) return globalPm.split(',').map(e=>e.trim()).filter(Boolean);
  return recipientsForFailure(cat);
}
async function sendFailureNotification(bus, driver, mileage, timestamp, failedChecks){
  const cat = categoryFor(bus);
  const subject = 'Pre-trip check failure — ' + bus.id + ' (' + cat.label + ') — ' + driver;
  const body = buildFailureEmailBody(bus, driver, mileage, timestamp, failedChecks);
  return await sendAppEmail(subject, body, recipientsForFailure(cat));
}
function pmDueItemsFor(bus, mileage){
  if(mileage == null || !bus.pmItems || !bus.pmItems.length) return [];
  return bus.pmItems.filter(p => mileage >= (p.lastDoneReading||0) + Number(p.intervalValue||0));
}
function buildPmEmailBody(bus, driver, mileage, timestamp, dueItems){
  const cat = categoryFor(bus);
  const unit = unitLabel(cat.trackingUnit);
  let body = 'Preventive maintenance due\n\n';
  body += 'Equipment: ' + bus.id + (bus.name ? ' (' + bus.name + ')' : '') + ' — ' + cat.label + '\n';
  body += 'Driver: ' + driver + '\n';
  body += (cat.trackingUnit==='hours' ? 'Hour meter: ' : 'Odometer: ') + mileage + ' ' + unit + '\n';
  body += 'Time: ' + fmtDT(timestamp) + '\n\n';
  body += 'Due items:\n';
  dueItems.forEach(p => {
    const dueAt = (p.lastDoneReading||0) + Number(p.intervalValue||0);
    const over = mileage - dueAt;
    body += '- ' + p.label + ': due at ' + dueAt.toLocaleString() + ' ' + unit + (over>=0 ? ' (' + over.toLocaleString() + ' ' + unit + ' overdue)' : '') + '\n';
  });
  return body;
}
async function sendPmNotification(bus, driver, mileage, timestamp, dueItems){
  const cat = categoryFor(bus);
  const subject = 'Maintenance due — ' + bus.id + ' (' + cat.label + ') — ' + dueItems.map(p=>p.label).join(', ');
  const body = buildPmEmailBody(bus, driver, mileage, timestamp, dueItems);
  return await sendAppEmail(subject, body, recipientsForPm(cat));
}



const ISSUE_CATEGORIES = ['Brakes','Engine','Transmission','A/C · Heat','Tires / Tracks','Lights · Electrical','Hydraulics','Cutting Unit / Reels','Winch / Cable','PTO / Attachments','Body · Exterior','Fluids / Leak','Other'];

function defaultCategories(){
  return [
    { key:'shuttle', label:'Shuttle Bus', trackingUnit:'miles', checkMode:'shift', checklist:[
      {key:'fluids', label:'Fluid levels'},
      {key:'tires', label:'Tires / pressure'},
      {key:'lights', label:'Lights & signals'},
      {key:'brakes', label:'Brakes'}
    ]},
    { key:'turf', label:'Turf Equipment', trackingUnit:'hours', checkMode:'daily', checklist:[
      {key:'fluids', label:'Fluid levels (oil, hydraulic, coolant)'},
      {key:'cutting', label:'Blades / reels — condition & sharpness'},
      {key:'belts', label:'Belts & pulleys'},
      {key:'tires', label:'Tires / pressure'},
      {key:'grease', label:'Grease fittings'},
      {key:'safety', label:'Safety switches / interlocks'}
    ]},
    { key:'groomer', label:'Snow Groomer', trackingUnit:'hours', checkMode:'daily', checklist:[
      {key:'fluids', label:'Fluid levels (oil, hydraulic, coolant)'},
      {key:'tracks', label:'Tracks & tension'},
      {key:'tiller', label:'Tiller condition'},
      {key:'winch', label:'Winch cable & drum'},
      {key:'lights', label:'Lights & beacon'},
      {key:'cab', label:'Cab heat / defrost / wipers'}
    ]},
    { key:'utv', label:'Side-by-Side / UTV', trackingUnit:'hours', checkMode:'daily', checklist:[
      {key:'fluids', label:'Fluid levels'},
      {key:'tires', label:'Tires / pressure'},
      {key:'brakes', label:'Brakes'},
      {key:'lights', label:'Lights'},
      {key:'accessories', label:'Winch / accessories'},
      {key:'restraints', label:'Seatbelts / ROPS'}
    ]},

function categoryFor(bus){
  const key = (bus && bus.category) || 'shuttle';
  return state.categories.find(c => c.key === key) || state.categories[0] || defaultCategories()[0];
}
function unitLabel(trackingUnit){
  if(trackingUnit === 'hours') return 'hrs';
  if(trackingUnit === 'none') return '';
  return 'mi';
}
function readingLabel(trackingUnit){
  if(trackingUnit === 'hours') return 'Hour meter reading (hours)';
  if(trackingUnit === 'none') return null;
  return 'Odometer reading (miles)';
}
function checkModeFor(cat){
  return cat.checkMode || (cat.key==='shuttle' ? 'shift' : 'daily');
}
// Department scoping: a null currentDepartmentKey means full admin (sees everything).
// A department session only ever sees categories explicitly assigned to it, and only
// equipment whose category is one of those.
function isFullAdmin(){
  return !state.currentDepartmentKey;
}
function categoriesForCurrentUser(){
  if(isFullAdmin()) return state.categories;
  return state.categories.filter(c => c.department === state.currentDepartmentKey);
}
function busesForCurrentUser(){
  if(isFullAdmin()) return state.buses;
  const allowedKeys = categoriesForCurrentUser().map(c=>c.key);
  return state.buses.filter(b => allowedKeys.includes(b.category||'shuttle'));
}
function currentDepartmentName(){
  if(state.currentDepartmentName) return state.currentDepartmentName;
  const d = state.departments.find(d=>d.key===state.currentDepartmentKey);
  return d ? d.name : '';
}
const LOCATION_PREFIXES = { '5':'Summit', '6':'Schuss', '7':'Cedar River', '8':'Legend', '9':'Hawks Eye' };
const LOCATIONS = ['Summit','Schuss','Schuss Mtn','Cedar River','Legend','Hawks Eye','Fleet','Building Maintenance'];
function locationForBus(bus){
  if(bus && bus.location) return bus.location;
  const id = ((bus && bus.id) || '').trim();
  return LOCATION_PREFIXES[id[0]] || 'Fleet';
}
// Returns every flagged item on a shift record — failed checklist entries and reported issues alike —
// in a common shape: {source:'check'|'issue', label, note, severity}
function allFlaggedItems(s, cat){
  const fromChecks = s.preTrip ? Object.entries(s.preTrip)
    .filter(([k,v]) => v.status==='fail')
    .map(([k,v]) => {
      const item = cat && cat.checklist ? cat.checklist.find(c=>c.key===k) : null;
      return {source:'check', label: item ? item.label : k, note: v.note, severity: v.severity||'minor'};
    }) : [];
  const fromIssues = (s.issues||[]).map(i => ({source:'issue', label: i.category, note: i.note, severity: i.severity||'minor'}));
  return fromChecks.concat(fromIssues);
}
function recordHasUrgent(s, cat){
  return allFlaggedItems(s, cat).some(i=>i.severity==='urgent');
}

/* ---------- data access ---------- */
// Equipment and equipment types are sharded across one row per department (key
// 'buses:<deptKey>' / 'categories:<deptKey>', with '_core' used for anything not assigned to
// a department). Reads of these shards are open to everyone at the database level, since the
// no-login QR driver flow needs to find any unit regardless of department. What the database
// actually restricts is WRITES: a signed-in department account can only upsert its own shard,
// enforced by RLS, not by this file. Full admin merges every shard back into one flat list so
// the rest of the app's logic (busesForCurrentUser, categoriesForCurrentUser, etc.) is unchanged.
async function loadShardedRows(prefix){
  if(!supa) return [];
  try{
    const { data, error } = await supa.from('kv_store').select('key,value').like('key', prefix + ':%');
    if(error || !data) return [];
    return data.flatMap(row => Array.isArray(row.value) ? row.value : []);
  }catch(e){
    console.error('loadShardedRows failed', prefix, e);
    return [];
  }
}
function deptKeyOf(obj){
  return (obj && obj.department) || '_core';
}
async function saveSharded(prefix, items, groupKeyFn){
  if(isFullAdmin()){
    // Full admin can touch every shard, so re-zero every known department (plus '_core') to
    // avoid a shard that just emptied out staying stale.
    const allKeys = ['_core', ...state.departments.map(d=>d.key)];
    const groups = {};
    allKeys.forEach(k => groups[k] = []);
    items.forEach(item => {
      const k = groupKeyFn(item);
      if(!groups[k]) groups[k] = [];
      groups[k].push(item);
    });
    let allOk = true;
    for(const k of Object.keys(groups)){
      const ok = await setJSON(prefix + ':' + k, groups[k]);
      if(!ok) allOk = false;
    }
    return allOk;
  } else {
    // A department account only ever has permission to write its own shard. Everything in
    // scope for this session already belongs to that one department (see busesForCurrentUser /
    // categoriesForCurrentUser), so filtering to our own key reconstructs our shard safely
    // without attempting — and getting rejected for — writes to shards we don't own.
    const mine = items.filter(item => groupKeyFn(item) === state.currentDepartmentKey);
    return await setJSON(prefix + ':' + state.currentDepartmentKey, mine);
  }
}
async function loadBuses(){
  state.buses = await loadShardedRows('buses');
}
async function saveBuses(){
  return await saveSharded('buses', state.buses, deptKeyOf);
}
async function loadCategories(){
  let cats = await loadShardedRows('categories');
  if(!cats.length){
    cats = defaultCategories();
    // Seed once so they're immediately editable in Admin. Seeded categories have no
    // department, so they land in the '_core' shard (full-admin only).
    await setJSON('categories:_core', cats);
  } else {
    let changed = false;
    cats.forEach(c => {
      if(!c.checkMode){ c.checkMode = (c.key==='shuttle' ? 'shift' : 'daily'); changed = true; }
    });
    if(changed){ state.categories = cats; await saveSharded('categories', cats, deptKeyOf); }
  }
  state.categories = cats;
}
async function saveCategories(){
  return await saveSharded('categories', state.categories, deptKeyOf);
}
async function loadDepartments(){
  state.departments = await getJSON('departments', []);
}
async function saveDepartments(){
  return await setJSON('departments', state.departments);
}
async function loadLabelTemplates(){
  state.customLabelTemplates = await getJSON('labelTemplates', {});
}
async function saveLabelTemplates(){
  return await setJSON('labelTemplates', state.customLabelTemplates);
}
// Merges the built-in Avery sizes with any custom ones added in Settings → Label Templates.
// Custom templates are looked up fresh each time (not cached) since they can be added/removed
// from the admin UI without a page reload.
function allLabelTemplates(){

}
async function loadSettings(){
  state.settings = await getJSON('settings', { notifyEmail: '', pmNotifyEmail: '' });
}
async function saveSettings(){

}
async function loadShifts(busId){
  if(!state.shiftsCache[busId]){
    state.shiftsCache[busId] = await getJSON('shifts:' + busId, []);
  }
  return state.shiftsCache[busId];
}
async function saveShifts(busId, arr){
  state.shiftsCache[busId] = arr;
  return await setJSON('shifts:' + busId, arr);
}
// Fetches shift history for many buses in as few round trips as possible (chunked to stay
// well under any URL-length limits), instead of one request per bus. Populates shiftsCache
// for every requested id, defaulting to [] for any bus with no shift history yet.
async function loadShiftsBatch(busIds){
  const needed = busIds.filter(id => !state.shiftsCache[id]);
  if(!needed.length || !supa) return;
  const CHUNK = 200;
  for(let i=0; i<needed.length; i+=CHUNK){
    const chunk = needed.slice(i, i+CHUNK);
    const keys = chunk.map(id => 'shifts:' + id);
    try{
      const { data, error } = await supa.from('kv_store').select('key,value').in('key', keys);
      if(error){
        console.error('batch shift load failed', error);
        chunk.forEach(id => { if(!state.shiftsCache[id]) state.shiftsCache[id] = []; });
        continue;
      }
      const found = new Set();
      (data||[]).forEach(row => {
        const busId = row.key.slice('shifts:'.length);
        state.shiftsCache[busId] = row.value;
        found.add(busId);
      });
      chunk.forEach(id => { if(!found.has(id)) state.shiftsCache[id] = []; });
    }catch(e){
      console.error('batch shift load failed', e);
      chunk.forEach(id => { if(!state.shiftsCache[id]) state.shiftsCache[id] = []; });
    }
  }
}
async function loadAllShifts(){
  await loadShiftsBatch(state.buses.map(b=>b.id));
  const all = [];
  state.buses.forEach(b => {
    (state.shiftsCache[b.id] || []).forEach(s => all.push(s));
  });
  all.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  return all;
}
function lastMileage(busId){
  const arr = state.shiftsCache[busId] || [];
  if(!arr.length) return null;
  const sorted = [...arr].sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  return sorted[0].mileage;
}

function renderSiteGate(){
  const wrap = el('div', 'wrap narrow');
  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Sign in to continue</div>';

  const emailField = el('div','field'); emailField.style.marginTop='12px';
  emailField.innerHTML = '<label>Email</label>';
  const emailInput = document.createElement('input');
  emailInput.type='email'; emailInput.placeholder='you@shantycreek.com'; emailInput.id='site-email-input';
  emailInput.autocomplete='username';
  emailField.appendChild(emailInput);
  card.appendChild(emailField);

  const pwField = el('div','field'); pwField.style.marginTop='10px';
  pwField.innerHTML = '<label>Password</label>';
  const input = document.createElement('input');
  input.type='password'; input.placeholder='Password'; input.id='site-pw-input';
  input.autocomplete='current-password';
  pwField.appendChild(input);
  card.appendChild(pwField);

  const errMsg = el('div','note'); errMsg.style.color='var(--bad)'; errMsg.style.display='none';
  card.appendChild(errMsg);

  const submitBtn = document.createElement('button');
  submitBtn.className='btn btn-primary'; submitBtn.style.marginTop='10px'; submitBtn.textContent='Sign in';
  async function attempt(){
    const email = emailInput.value.trim();
    const password = input.value;
    if(!email || !password){
      errMsg.textContent = 'Enter both an email and a password.';
      errMsg.style.display = 'block';
      return;
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Signing in...';
    errMsg.style.display = 'none';
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if(error || !data.user){
      submitBtn.disabled = false; submitBtn.textContent = 'Sign in';
      errMsg.textContent = 'Incorrect email or password — try again.';
      errMsg.style.display = 'block';
      input.value = '';
      input.focus();
      return;
    }
    const profile = await fetchMyProfile(data.user.id);
    if(!profile){
      submitBtn.disabled = false; submitBtn.textContent = 'Sign in';
      errMsg.textContent = 'That login isn\'t linked to a department yet — ask Kody to set it up.';
      errMsg.style.display = 'block';
      await supa.auth.signOut();
      return;
    }
    applyProfile(profile);
    state.mode = 'admin';
    if(!profile.is_full_admin){
      state.admin.tab = 'buses';
      const subtitle = document.querySelector('.brand-text .t2');
      if(subtitle) subtitle.textContent = profile.department_name || 'Department';
    }
    render();
  }
  submitBtn.onclick = attempt;
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') attempt(); });
  emailInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') input.focus(); });
  card.appendChild(submitBtn);

  wrap.appendChild(card);
  app.appendChild(wrap);
  setTimeout(()=>{ const i = document.getElementById('site-email-input'); if(i) i.focus(); }, 50);
}

/* ================= DRIVER MODE ================= */
function renderDriver(){
  const wrap = el('div', 'wrap narrow');
  app.appendChild(wrap);

  if(state.qrLocked && state.driver.screen === 'pick'){
    state.driver.busId = state.qrLockedBusId;
    state.driver.screen = 'action';
  }

  if(state.driver.screen === 'action'){
    const selBus = state.buses.find(b=>b.id===state.driver.busId);
    if(selBus && checkModeFor(categoryFor(selBus)) === 'daily'){
      formPreTrip = {}; formIssues = [];
      state.driver.action = 'daily';
      state.driver.screen = 'form';
    }
  }

  if(state.driver.screen === 'pick'){
    renderBusPicker(wrap);
  } else if(state.driver.screen === 'action'){
    renderActionPicker(wrap);
  } else if(state.driver.screen === 'form'){
    renderShiftForm(wrap);
  } else if(state.driver.screen === 'confirm'){
    renderConfirm(wrap);
  }
}

function renderBusPicker(wrap){
  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Select your equipment</div>';
  const myBuses = busesForCurrentUser();
  if(!myBuses.length){
    card.appendChild(el('div','empty','No equipment set up yet. Ask your manager to add units in Admin → Equipment.'));
  } else {
    const myCats = categoriesForCurrentUser();
    const typeVal = state.driver.typeFilter || 'all';
    const locationVal = state.driver.locationFilter || 'all';
    const sortVal = state.driver.sort || 'id';

    const toolbar = el('div','toolbar');
    const typeSel = document.createElement('select');
    typeSel.innerHTML = '<option value="all">All types</option>' + myCats.map(c=>`<option value="${escapeHtml(c.key)}">${escapeHtml(c.label)}</option>`).join('');
    typeSel.value = typeVal;
    typeSel.onchange = ()=>{ state.driver.typeFilter = typeSel.value; render(); };
    toolbar.appendChild(document.createTextNode('Type: '));
    toolbar.appendChild(typeSel);

    const locSel = document.createElement('select');
    locSel.innerHTML = '<option value="all">All locations</option>' + LOCATIONS.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
    locSel.value = locationVal;
    locSel.onchange = ()=>{ state.driver.locationFilter = locSel.value; render(); };
    toolbar.appendChild(document.createTextNode('Location: '));
    toolbar.appendChild(locSel);

    const sortSel = document.createElement('select');
    sortSel.innerHTML = '<option value="id">Sort: ID</option><option value="type">Sort: Type</option><option value="location">Sort: Location</option>';
    sortSel.value = sortVal;
    sortSel.onchange = ()=>{ state.driver.sort = sortSel.value; render(); };
    toolbar.appendChild(sortSel);
    card.appendChild(toolbar);

    let visibleBuses = myBuses.filter(b=>{
      const typeOk = typeVal==='all' || (b.category||'shuttle')===typeVal;
      const locOk = locationVal==='all' || locationForBus(b)===locationVal;
      return typeOk && locOk;
    });
    visibleBuses = visibleBuses.slice().sort((a,b)=>{
      if(sortVal==='type') return categoryFor(a).label.localeCompare(categoryFor(b).label) || a.id.localeCompare(b.id, undefined, {numeric:true});
      if(sortVal==='location') return locationForBus(a).localeCompare(locationForBus(b)) || a.id.localeCompare(b.id, undefined, {numeric:true});
      return a.id.localeCompare(b.id, undefined, {numeric:true});
    });

    if(!visibleBuses.length){
      card.appendChild(el('div','empty','No equipment matches this filter.'));
    } else {
      const grid = el('div','tile-grid');
      visibleBuses.forEach(b => {
        const cat = categoryFor(b);
        const t = document.createElement('button');
        t.className = 'tile';
        const mi = lastMileage(b.id);
        t.innerHTML = `<div class="bus-id">${escapeHtml(b.id)}</div><div class="bus-name">${escapeHtml(b.name||'')}</div><div class="bus-name" style="opacity:.8;">${escapeHtml(cat.label)} · ${escapeHtml(locationForBus(b))}</div>` +
          (mi!=null ? `<div class="bus-mi">${mi.toLocaleString()} ${unitLabel(cat.trackingUnit)}</div>` : '<div class="bus-mi">no readings yet</div>');
        t.onclick = () => { formPreTrip = {}; state.driver.busId = b.id; state.driver.screen='action'; render(); };
        grid.appendChild(t);
      });
      card.appendChild(grid);
    }
  }
  wrap.appendChild(card);
}

    const back = el('button','btn-link','← Back');
    back.onclick = () => { state.driver.screen='action'; formIssues=[]; formPreTrip={}; render(); };
    wrap.appendChild(back);
  }

function renderCheckRows(container, checklist){
  container.innerHTML='';
  checklist.forEach(item => {
    const state_ = formPreTrip[item.key];
    const row = el('div','check-row');
    const top = el('div','check-row-top');
    top.appendChild(el('div','lbl',item.label));
    const pair = el('div','pf-pair');
    const passBtn = el('button','pf-btn pass'+(state_.status==='pass'?' on':''),'Pass');
    const failBtn = el('button','pf-btn fail'+(state_.status==='fail'?' on':''),'Fail');
    passBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].status='pass'; renderCheckRows(container, checklist); };
    failBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].status='fail'; renderCheckRows(container, checklist); };
    pair.appendChild(passBtn); pair.appendChild(failBtn);
    top.appendChild(pair);
    row.appendChild(top);
    if(state_.status === 'fail'){
      const sevWrap = el('div','sev-pill');
      sevWrap.style.margin = '8px 0';
      const minorBtn = el('button','sev-btn sel-minor'+(state_.severity==='minor'?' on':''),'Minor');
      const urgentBtn = el('button','sev-btn sel-urgent'+(state_.severity==='urgent'?' on':''),'Urgent · Out of service');
      minorBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].severity='minor'; renderCheckRows(container, checklist); };
      urgentBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].severity='urgent'; renderCheckRows(container, checklist); };
      sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
      row.appendChild(sevWrap);

      const noteWrap = el('div','check-fail-note');
      const ta = document.createElement('textarea');
      ta.rows=2; ta.placeholder='What\'s wrong with ' + item.label.toLowerCase() + '?'; ta.value = state_.note;
      ta.oninput = ()=> formPreTrip[item.key].note = ta.value;
      noteWrap.appendChild(ta);
      row.appendChild(noteWrap);
    }
    container.appendChild(row);
  });
}

function renderIssueRows(container){
  container.innerHTML='';
  if(!formIssues.length){
    container.appendChild(el('div','note','No issues reported. If everything ran fine, leave this empty.'));
    return;
  }
  formIssues.forEach((iss, idx) => {
    const row = el('div','issue-row');
    const top = el('div','issue-row-top');
    const sel = document.createElement('select');
    ISSUE_CATEGORIES.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; if(c===iss.category)o.selected=true; sel.appendChild(o); });
    sel.onchange = ()=> iss.category = sel.value;
    top.appendChild(sel);
    const sevWrap = el('div','sev-pill');
    const minorBtn = el('button','sev-btn sel-minor'+(iss.severity==='minor'?' on':''),'Minor');
    const urgentBtn = el('button','sev-btn sel-urgent'+(iss.severity==='urgent'?' on':''),'Urgent · Out of service');
    minorBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='minor'; renderIssueRows(container); };
    urgentBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='urgent'; renderIssueRows(container); };
    sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
    top.appendChild(sevWrap);
    const rm = el('button','remove-issue','Remove');
    rm.onclick = (e)=>{ e.preventDefault(); formIssues.splice(idx,1); renderIssueRows(container); };
    top.appendChild(rm);
    row.appendChild(top);
    const ta = document.createElement('textarea');
    ta.rows=2; ta.placeholder='Describe the issue...'; ta.value=iss.note;
    ta.oninput = ()=> iss.note = ta.value;
    row.appendChild(ta);
    container.appendChild(row);
  });
}

async function submitShift(bus, action, btn){
  const cat = categoryFor(bus);
  const name = document.getElementById('drv-name').value.trim();
  const odoEl = document.getElementById('drv-odo');
  const notesEl = document.getElementById('drv-notes');
  const notes = notesEl ? notesEl.value.trim() : '';

  if(!name){ alert('Please enter the driver name.'); return; }

  let mileage = null;
  if(cat.trackingUnit !== 'none'){
    const odoVal = odoEl ? odoEl.value : '';
    if(!odoVal){ alert('Please enter the ' + (cat.trackingUnit==='hours' ? 'hour meter reading.' : 'odometer reading.')); return; }
    mileage = Number(odoVal);
    if(Number.isNaN(mileage) || mileage < 0){ alert('That reading looks invalid.'); return; }
  }

  let failedChecks = [];
  const hasChecklist = (action === 'start' || action === 'daily');
  if(hasChecklist){
    const unanswered = cat.checklist.filter(c => !formPreTrip[c.key] || !formPreTrip[c.key].status);
    if(unanswered.length){ alert('Please mark every check as Pass or Fail before submitting.'); return; }
    failedChecks = cat.checklist.filter(c => formPreTrip[c.key].status==='fail').map(c => ({label:c.label, note:formPreTrip[c.key].note, severity:formPreTrip[c.key].severity||'minor'}));
  }

  btn.disabled = true; btn.textContent = 'Saving...';

  const record = {
    id: uid('shift'),
    busId: bus.id,
    busName: bus.name || '',
    action, driver: name, mileage,
    timestamp: new Date().toISOString(),
    notes,
    preTrip: hasChecklist ? JSON.parse(JSON.stringify(formPreTrip)) : undefined,
    issues: formIssues.map(i=>({category:i.category, severity:i.severity, note:i.note})),
    issuesResolved: false
  };

  let ok = false;
  try{
    const arr = await loadShifts(bus.id);
    arr.push(record);
    ok = await saveShifts(bus.id, arr);
  }catch(e){
    console.error('shift save failed', e);
    ok = false;
  }

  if(!ok){
    alert('Could not save.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ' Check your connection and try again.'));
    btn.disabled = false;
    btn.textContent = 'Retry submit';
    return;
  }

  btn.textContent = 'Successfully submitted!';

  // Every flagged item (any failed check, any reported issue) triggers the email — severity is still
  // recorded and shown in Admin, it just no longer gates whether the notification goes out.
  const allFlagged = failedChecks.concat(record.issues.map(i=>({label: i.category, note: i.note, severity: i.severity, isIssue:true})));
  const emailItems = allFlagged.map(i=>({
    label: (i.isIssue ? i.label + (i.severity==='urgent' ? ' — urgent / out of service' : '') : i.label) + (i.severity==='urgent' ? ' ⚠ URGENT' : ''),
    note: i.note
  }));

  let emailResult = null;
  if(emailItems.length){
    emailResult = await sendFailureNotification(bus, name, mileage, record.timestamp, emailItems);
  }

  // Preventive maintenance: fires every time a due item is crossed, on every log, until marked done in Admin.
  const pmDue = pmDueItemsFor(bus, mileage);
  let pmEmailResult = null;
  if(pmDue.length){
    pmEmailResult = await sendPmNotification(bus, name, mileage, record.timestamp, pmDue);
  }

  state.driver.lastRecord = record;
  state.driver.failedChecks = allFlagged;
  state.driver.urgentCount = allFlagged.filter(i=>i.severity==='urgent').length;
  state.driver.emailResult = emailResult;
  state.driver.pmDue = pmDue;
  state.driver.pmEmailResult = pmEmailResult;
  setTimeout(()=>{
    state.driver.screen = 'confirm';
    formIssues = []; formPreTrip = makeEmptyPreTrip();
    render();
  }, 500);
}

function flaggedItemsFromRecord(rec, cat){
  const failItems = (rec.preTrip ? Object.entries(rec.preTrip) : [])
    .filter(([k,v]) => v.status==='fail')
    .map(([k,v]) => {
      const item = cat.checklist.find(c=>c.key===k);
      const label = item ? item.label : k;
      return {label: label + (v.severity==='urgent' ? ' ⚠ URGENT' : ''), note: v.note};
    });
  const issueItems = (rec.issues||[])
    .map(i=>({label: i.category + (i.severity==='urgent' ? ' — urgent / out of service ⚠ URGENT' : ''), note: i.note}));
  return failItems.concat(issueItems);
}

      pmStatusLine.style.color = 'var(--bad)';
      pmStatusLine.textContent = 'No notification sent — set up the notify email in Admin → Settings.';
      pmResendBtn.style.display = 'none';

      pmResendBtn.textContent = 'Retry sending';

    if(pmResendBtn.style.display !== 'none'){
      pmResendBtn.onclick = async ()=>{
        pmResendBtn.disabled = true; pmResendBtn.textContent = 'Sending...';
        const r = await sendPmNotification(pmBus, rec.driver, rec.mileage, rec.timestamp, pmDue);
        state.driver.pmEmailResult = r;
        renderDriver();

    }
  }

  const newBtn = document.createElement('button');
  newBtn.className='btn btn-gold'; newBtn.style.marginTop='18px';
  newBtn.textContent = rec.action==='daily' ? 'Log another check' : 'Log another shift';
  newBtn.onclick = ()=>{
    state.driver.failedChecks=[]; state.driver.urgentCount=0; state.driver.pmDue=[]; state.driver.pmEmailResult=null;
    formIssues=[]; formPreTrip={};
    if(state.qrLocked){

      }
    } else {
      state.driver.screen='pick'; state.driver.busId=null; state.driver.action=null;
      window.location.hash='';
    }
    render();
  };
  card.appendChild(newBtn);
  wrap.appendChild(card);
}

  else if(state.admin.tab==='issues') renderIssuesTab(holder, all);

  else if(state.admin.tab==='account') renderAccountTab(holder);
  // Keep "Add" and "Sort/Filter" bars pinned to the top of the screen regardless of which
  // tab just rendered or how long its list is. Runs after layout settles (fonts/images can
  // still shift heights right after paint), and again shortly after in case they do.
  requestAnimationFrame(positionPinned);
  setTimeout(positionPinned, 200);
}

// Standing rule: any "Add ___" card or sort/filter toolbar sitting above a list gets the
// .pin-top class so it stays visible while the list under it scrolls. This computes the
// sticky "top" offset for every .pin-top element in the current tab, stacking them in DOM
// order just below the topbar + tab strip (both of which are sticky themselves).
function positionPinned(){
  const holder = document.getElementById('admin-holder');
  if(!holder) return;
  const topbarEl = document.querySelector('.topbar');
  const tabsEl = document.querySelector('.tabs2');
  let running = (topbarEl ? topbarEl.offsetHeight : 0) + (tabsEl ? tabsEl.offsetHeight : 0);
  holder.querySelectorAll('.pin-top').forEach(pinnedEl => {
    pinnedEl.style.top = running + 'px';
    running += pinnedEl.offsetHeight;
  });
}

      statusMsg.style.color = 'var(--bad)';
      statusMsg.textContent = '✗ Something went wrong sending the test email. Please try again shortly.';
    }
  };
  btnRow.appendChild(testBtn);
  card.appendChild(btnRow);
  holder.appendChild(card);

  const pmCard = el('div','card');
  pmCard.innerHTML = '<div class="section-label">Maintenance (PM) notification email</div>';
  const pmIntro = el('div','note');
  pmIntro.style.marginBottom='14px';
  pmIntro.textContent = 'Preventive maintenance due-alerts can go to a different address than check failures. Leave this blank to keep sending PM alerts to the failure notification address above.';
  pmCard.appendChild(pmIntro);

  const pmEmailField = el('div','field');
  pmEmailField.style.maxWidth='420px';
  pmEmailField.innerHTML = '<label>Send maintenance (PM) due notifications to (optional)</label>';
  const pmEmailInput = document.createElement('input');
  pmEmailInput.type='text'; pmEmailInput.placeholder='Leave blank to use the address above'; pmEmailInput.value = state.settings.pmNotifyEmail || '';
  pmEmailField.appendChild(pmEmailInput);
  pmCard.appendChild(pmEmailField);

  const pmStatusMsg = el('div','note'); pmStatusMsg.style.margin='12px 2px 0';
  pmCard.appendChild(pmStatusMsg);

  const pmBtnRow = el('div');
  pmBtnRow.style.cssText='display:flex; gap:10px; margin-top:12px; align-items:center; flex-wrap:wrap;';
  const pmSaveBtn = document.createElement('button');
  pmSaveBtn.className='btn btn-primary'; pmSaveBtn.style.width='auto'; pmSaveBtn.style.padding='12px 20px';
  pmSaveBtn.textContent='Save';
  pmSaveBtn.onclick = async ()=>{
    state.settings.pmNotifyEmail = pmEmailInput.value.trim();
    pmSaveBtn.textContent='Saving...';
    const ok = await saveSettings();
    if(ok){
      pmSaveBtn.textContent='Saved';
      pmStatusMsg.style.color='var(--ok)';
      pmStatusMsg.textContent = '';
    } else {
      pmSaveBtn.textContent='Save failed';
      pmStatusMsg.style.color='var(--bad)';
      pmStatusMsg.textContent = '✗ Could not save. Please try again.';
    }
    setTimeout(()=>{ pmSaveBtn.textContent='Save'; }, 1800);
  };
  pmBtnRow.appendChild(pmSaveBtn);

  const pmTestBtn = document.createElement('button');
  pmTestBtn.className='btn btn-outline'; pmTestBtn.textContent='Send test PM email';
  pmTestBtn.onclick = async ()=>{
    state.settings.pmNotifyEmail = pmEmailInput.value.trim();
    const savedOk = await saveSettings();
    pmTestBtn.disabled = true; pmTestBtn.textContent = 'Sending...';
    pmStatusMsg.textContent = '';
    if(!savedOk){
      pmTestBtn.disabled = false; pmTestBtn.textContent = 'Send test PM email';
      pmStatusMsg.style.color = 'var(--bad)';
      pmStatusMsg.textContent = '✗ Could not save your changes. Please try again.';
      return;
    }
    const testBus = {id:'TEST', name:'Test bus', category:'shuttle'};
    const r = await sendPmNotification(
      testBus, 'Test Driver', 12345, new Date().toISOString(),
      [{label:'Oil change', intervalValue:100, lastDoneReading:12000}]
    );
    pmTestBtn.disabled = false;
    pmTestBtn.textContent = 'Send test PM email';
    const usedAddress = (state.settings.pmNotifyEmail || state.settings.notifyEmail);
    if(r.ok){
      pmStatusMsg.style.color = 'var(--ok)';
      pmStatusMsg.textContent = '✓ Test sent to ' + usedAddress + '. Check the inbox (and spam folder).';
    } else {
      pmStatusMsg.style.color = 'var(--bad)';
      pmStatusMsg.textContent = '✗ Something went wrong sending the test email. Please try again shortly.';
    }
  };
  pmBtnRow.appendChild(pmTestBtn);
  pmCard.appendChild(pmBtnRow);
  holder.appendChild(pmCard);

  renderLabelTemplatesCard(holder);
}

function renderLabelTemplatesCard(holder){
  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Label sheet templates</div>';

  const intro = el('div','note');
  intro.style.marginBottom = '14px';
  intro.textContent = 'Upload the Word (.docx) template straight from Avery for any label sheet you want to print QR codes on, and the layout — label size, how many fit per sheet, spacing, margins — is read from the file automatically. Review the detected numbers below before saving; you can adjust anything that looks off.';
  card.appendChild(intro);

  const uploadField = el('div','field');
  uploadField.style.maxWidth = '420px';
  uploadField.innerHTML = '<label>Avery template file (.docx)</label>';
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.docx';
  uploadField.appendChild(fileInput);
  card.appendChild(uploadField);

  const parseStatus = el('div','note');
  parseStatus.style.margin = '10px 2px 0';
  card.appendChild(parseStatus);

  const reviewWrap = el('div');
  reviewWrap.style.cssText = 'display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--line);';
  card.appendChild(reviewWrap);

  fileInput.onchange = async ()=>{
    const file = fileInput.files && fileInput.files[0];
    if(!file) return;
    reviewWrap.style.display = 'none';
    reviewWrap.innerHTML = '';
    parseStatus.style.color = 'var(--ink-soft)';
    parseStatus.textContent = 'Reading template...';
    let parsed;
    try{
      parsed = await parseAveryTemplateFile(file);
    }catch(e){
      parseStatus.style.color = 'var(--bad)';
      parseStatus.textContent = '✗ ' + e.message;
      return;
    }
    parseStatus.style.color = 'var(--ok)';
    parseStatus.textContent = '✓ Detected ' + parsed.cols + ' × ' + parsed.rows + ' (' + (parsed.cols*parsed.rows) + ' per sheet). Review the fields below, then save.';
    renderTemplateReviewForm(reviewWrap, parsed);
    reviewWrap.style.display = 'block';
  };

  function renderTemplateReviewForm(wrap, parsed){
    const grid = el('div');
    grid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:12px; max-width:640px;';

    function numField(label, key, step){
      const f = el('div','field');
      f.innerHTML = `<label>${escapeHtml(label)}</label>`;
      const inp = document.createElement('input');
      inp.type = 'number'; inp.step = step || '0.001'; inp.value = parsed[key];
      inp.oninput = ()=>{ parsed[key] = parseFloat(inp.value) || 0; };
      f.appendChild(inp);
      grid.appendChild(f);
      return inp;
    }

    const nameField = el('div','field');
    nameField.style.gridColumn = '1 / -1';
    nameField.innerHTML = '<label>Name (shown in the Label size dropdown)</label>';
    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.value = parsed.name;
    nameInput.oninput = ()=>{ parsed.name = nameInput.value; };
    nameField.appendChild(nameInput);
    grid.appendChild(nameField);

    numField('Columns', 'cols', '1');
    numField('Rows', 'rows', '1');
    numField('Label width (in)', 'labelW');
    numField('Label height (in)', 'labelH');
    numField('Side margin (in)', 'sideMargin');
    numField('Top margin (in)', 'topMargin');
    numField('Column gap (in)', 'colGap');
    numField('Row gap (in)', 'rowGap');
    numField('QR code size (in)', 'qrSize');

    const layoutField = el('div','field');
    layoutField.innerHTML = '<label>Content layout</label>';
    const layoutSel = document.createElement('select');
    layoutSel.innerHTML = '<option value="vertical">Stacked (QR above text)</option><option value="horizontal">Side-by-side (QR beside text)</option>';
    layoutSel.value = parsed.layout;
    layoutSel.onchange = ()=>{ parsed.layout = layoutSel.value; };
    layoutField.appendChild(layoutSel);
    grid.appendChild(layoutField);

    const compactField = el('div','field');
    compactField.innerHTML = '<label>Compact (for small labels)</label>';
    const compactSel = document.createElement('select');
    compactSel.innerHTML = '<option value="1">Yes — ID + caption only</option><option value="0">No — full details</option>';
    compactSel.value = parsed.compact ? '1' : '0';
    compactSel.onchange = ()=>{ parsed.compact = compactSel.value === '1'; };
    compactField.appendChild(compactSel);
    grid.appendChild(compactField);

    wrap.appendChild(grid);

    const saveStatus = el('div','note');
    saveStatus.style.margin = '12px 2px 0';
    wrap.appendChild(saveStatus);

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary'; saveBtn.style.width = 'auto'; saveBtn.style.padding = '11px 18px'; saveBtn.style.marginTop = '12px';
    saveBtn.textContent = 'Save template';
    saveBtn.onclick = async ()=>{
      if(!parsed.name.trim()){ saveStatus.style.color='var(--bad)'; saveStatus.textContent = 'Give the template a name first.'; return; }
      if(!parsed.cols || !parsed.rows || !parsed.labelW || !parsed.labelH){ saveStatus.style.color='var(--bad)'; saveStatus.textContent = 'Columns, rows, and label width/height are required.'; return; }
      saveBtn.textContent = 'Saving...';
      const key = 'custom_' + uid('lbl');
      state.customLabelTemplates[key] = {
        name: parsed.name.trim(), cols: parsed.cols, rows: parsed.rows,
        labelW: parsed.labelW, labelH: parsed.labelH,
        sideMargin: parsed.sideMargin, topMargin: parsed.topMargin,
        colGap: parsed.colGap, rowGap: parsed.rowGap,
        layout: parsed.layout, qrSize: parsed.qrSize, compact: parsed.compact
      };
      const ok = await saveLabelTemplates();
      if(ok){
        saveStatus.style.color = 'var(--ok)';
        saveStatus.textContent = '✓ Saved. It now shows up in the Label size dropdown on Equipment & QR Codes.';
        wrap.style.display = 'none';
        fileInput.value = '';
        parseStatus.textContent = '';
        renderSavedTemplatesList(savedListWrap);
      } else {
        delete state.customLabelTemplates[key];
        saveStatus.style.color = 'var(--bad)';
        saveStatus.textContent = '✗ Could not save. Please try again.';
      }
      saveBtn.textContent = 'Save template';
    };
    wrap.appendChild(saveBtn);
  }

  const savedListWrap = el('div');
  savedListWrap.style.marginTop = '18px';
  card.appendChild(savedListWrap);
  renderSavedTemplatesList(savedListWrap);

  function renderSavedTemplatesList(wrap){
    wrap.innerHTML = '';
    const keys = Object.keys(state.customLabelTemplates || {});
    if(!keys.length){
      wrap.appendChild(el('div','note','No custom label templates saved yet — the built-in Avery sizes are still available in the dropdown.'));
      return;
    }
    wrap.appendChild(el('div','section-label','Saved custom templates'));
    keys.forEach(key=>{
      const t = state.customLabelTemplates[key];
      const row = el('div');
      row.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);';
      const info = el('div');
      info.innerHTML = `<div style="font-weight:700;">${escapeHtml(t.name)}</div><div style="font-size:12px; color:var(--ink-soft);">${t.cols} × ${t.rows} · ${t.labelW}" × ${t.labelH}" labels</div>`;
      row.appendChild(info);
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-outline'; delBtn.style.width = 'auto'; delBtn.style.padding = '8px 14px'; delBtn.style.color = 'var(--bad)';
      delBtn.textContent = 'Delete';
      delBtn.onclick = async ()=>{
        if(!confirm('Delete "' + t.name + '"? This can\'t be undone.')) return;
        delete state.customLabelTemplates[key];
        delBtn.textContent = 'Deleting...';
        const ok = await saveLabelTemplates();
        if(ok) renderSavedTemplatesList(wrap);
        else { alert('Could not delete. Please try again.'); await loadLabelTemplates(); renderSavedTemplatesList(wrap); }
      };
      row.appendChild(delBtn);
      wrap.appendChild(row);
    });
  }

  holder.appendChild(card);
}

function renderDepartmentsTab(holder){
  const addCard = el('div','card pin-top');
  addCard.style.cssText = 'border-style:dashed; background:var(--cream); box-shadow:none;';
  addCard.innerHTML = '<div class="section-label">Add a new department</div>';

  addRow.innerHTML = `
    <div class="field" style="flex:1; min-width:180px; margin-bottom:0;"><label>Department name</label><input type="text" id="new-dept-name" placeholder="e.g. Building Maintenance"></div>
  `;
  const addBtn = document.createElement('button');
  addBtn.className='btn btn-primary'; addBtn.style.width='auto'; addBtn.style.padding='12px 20px'; addBtn.textContent='Add department';
  addBtn.onclick = async ()=>{
    const nameInput = document.getElementById('new-dept-name');
    const name = nameInput.value.trim();
    if(!name){ alert('Enter a department name.'); return; }
    state.departments.push({ key: uid('dept'), name });
    const ok = await saveDepartments();
    if(!ok){
      state.departments.pop();
      alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
      return;
    }
    renderAdminTab(holder);
  };
  addRow.appendChild(addBtn);
  addCard.appendChild(addRow);
  holder.appendChild(addCard);

  state.departments.forEach((dept, idx) => {
    const card = el('div','card');
    const head = el('div','flex-between');
    const nameInput = document.createElement('input');
    nameInput.type='text'; nameInput.value=dept.name;
    nameInput.style.cssText = "font-family:'Barlow Condensed'; font-size:20px; font-weight:700; color:var(--navy); border:none; background:transparent; padding:2px 0; width:220px;";
    nameInput.oninput = ()=> { dept.name = nameInput.value; if(dept.linkedUserId) linkedNote.textContent = 'Linked to a Supabase Auth account. Re-save below if you just renamed this department.'; };
    head.appendChild(nameInput);
    const delBtn = document.createElement('button');
    delBtn.className='btn btn-outline btn-sm'; delBtn.textContent='Delete department';
    delBtn.onclick = async ()=>{
      if(!confirm('Delete "' + dept.name + '"? Its equipment types will stay but won\'t belong to any department until reassigned. This does not delete its Supabase Auth login — remove that separately in the Supabase dashboard if you want to fully retire it.')) return;
      state.departments = state.departments.filter(d=>d.key!==dept.key);
      const ok = await saveDepartments();
      if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
      renderAdminTab(holder);
    };
    head.appendChild(delBtn);
    card.appendChild(head);

    card.appendChild(el('div','section-label','Sign-in account'));
    const acctNote = el('div','note');
    acctNote.style.marginBottom = '8px';
    acctNote.innerHTML = 'Create this department\'s login once in the <strong>Supabase dashboard → Authentication → Users → Add user</strong> (an email + password), then paste that user\'s ID below to link it. Full steps are in the setup guide.';
    card.appendChild(acctNote);

    const linkField = el('div','field'); linkField.style.maxWidth='420px';
    linkField.innerHTML = '<label>Supabase Auth user ID</label>';
    const linkInput = document.createElement('input');
    linkInput.type='text'; linkInput.placeholder='e.g. 3fa85f64-5717-4562-b3fc-2c963f66afa6';
    linkInput.value = dept.linkedUserId || '';
    linkField.appendChild(linkInput);
    card.appendChild(linkField);

    const linkedNote = el('div','note'); linkedNote.style.margin = '6px 2px 0';
    linkedNote.style.color = dept.linkedUserId ? 'var(--ok)' : 'var(--ink-soft)';
    linkedNote.textContent = dept.linkedUserId ? '✓ Linked — this account can sign in as ' + dept.name + '.' : 'Not linked yet — this department has no working login.';
    card.appendChild(linkedNote);

    const linkBtn = document.createElement('button');
    linkBtn.className='btn btn-outline btn-sm'; linkBtn.style.marginTop='8px'; linkBtn.textContent='Save & link account';
    linkBtn.onclick = async ()=>{
      const uid = linkInput.value.trim();
      if(!uid){ alert('Paste the Supabase Auth user ID first.'); return; }
      linkBtn.disabled = true; linkBtn.textContent='Linking...';
      const { error } = await supa.from('profiles').upsert({
        id: uid, department_key: dept.key, department_name: dept.name, is_full_admin: false
      });
      if(error){
        alert('Could not link that account. Double check the user ID was copied exactly.\n\nDetails: ' + error.message);
        linkBtn.disabled = false; linkBtn.textContent='Save & link account';
        return;
      }
      dept.linkedUserId = uid;
      await saveDepartments();
      linkBtn.disabled = false; linkBtn.textContent='Save & link account';
      renderAdminTab(holder);
    };
    card.appendChild(linkBtn);

    card.appendChild(el('div','section-label','Equipment types this department can see'));
    const typesWrap = el('div');
    typesWrap.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;';
    state.categories.forEach(cat => {
      const belongsHere = cat.department === dept.key;
      const belongsElsewhere = cat.department && cat.department !== dept.key;
      const otherDept = belongsElsewhere ? state.departments.find(d=>d.key===cat.department) : null;
      const chip = document.createElement('label');
      chip.style.cssText = 'display:flex; align-items:center; gap:6px; border:1.5px solid ' + (belongsHere?'var(--navy)':'var(--line)') + '; border-radius:999px; padding:6px 12px; font-size:12.5px; cursor:pointer;' + (belongsElsewhere ? ' opacity:.5;' : '');
      const cb = document.createElement('input');
      cb.type='checkbox'; cb.checked = belongsHere; cb.disabled = !!belongsElsewhere;
      cb.style.cssText = 'width:15px; height:15px; accent-color:var(--navy);';
      cb.onchange = async ()=>{
        cat.department = cb.checked ? dept.key : null;
        const ok = await saveCategories();
        if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      chip.appendChild(cb);
      chip.appendChild(document.createTextNode(cat.label + (belongsElsewhere ? ' (in ' + (otherDept?otherDept.name:'another dept') + ')' : '')));
      typesWrap.appendChild(chip);
    });
    card.appendChild(typesWrap);

    const saveBtn = document.createElement('button');
    saveBtn.className='btn btn-primary'; saveBtn.style.width='auto'; saveBtn.style.padding='11px 18px';
    saveBtn.textContent='Save changes';
    saveBtn.onclick = async ()=>{
      saveBtn.textContent='Saving...';
      const ok = await saveDepartments();
      saveBtn.textContent = ok ? 'Saved' : 'Save failed';
      if(!ok) alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
      setTimeout(()=>{ saveBtn.textContent='Save changes'; }, 1500);
    };
    card.appendChild(saveBtn);

    holder.appendChild(card);
  });
}

function renderOverview(holder, allShifts){
  const myBuses = busesForCurrentUser();
  const myBusIds = new Set(myBuses.map(b=>b.id));
  const all = allShifts.filter(s => myBusIds.has(s.busId));

  const openIssues = [];
  all.forEach(s=>{
    if(s.issuesResolved) return;
    const cat = categoryFor(myBuses.find(b=>b.id===s.busId) || {id:s.busId});
    allFlaggedItems(s, cat).forEach(item => openIssues.push({rec:s, item}));
  });
  const urgentCount = openIssues.filter(o=>o.item.severity==='urgent').length;

  const stats = el('div','stat-grid');
  stats.appendChild(statCard(myBuses.length,'Equipment tracked'));
  stats.appendChild(statCard(all.length,'Logs total'));
  const oi = statCard(openIssues.length,'Open issues'); if(urgentCount) oi.classList.add('alert');
  stats.appendChild(oi);
  const ui = statCard(urgentCount,'Urgent · out of service'); if(urgentCount) ui.classList.add('alert');
  stats.appendChild(ui);
  holder.appendChild(stats);

  if(myBuses.length){
    // Enrich each unit with its category, last shift record, and out-of-service flag
    // up front so every sort option below (including Status and Last shift) has what it needs.
    var enriched = myBuses.map(b=>{
      const arr = state.shiftsCache[b.id] || [];
      const sorted = [...arr].sort((a,x)=> new Date(x.timestamp)-new Date(a.timestamp));
      const last = sorted[0] || null;
      const cat = categoryFor(b);
      const hasUrgent = arr.some(s => !s.issuesResolved && recordHasUrgent(s, cat));
      return {b, cat, last, hasUrgent};
    });

    const locationVal = state.admin.overviewLocationFilter || 'all';
    if(locationVal!=='all') enriched = enriched.filter(x => locationForBus(x.b)===locationVal);

    const sortVal = state.admin.overviewSort || 'location';
    enriched.sort((x,y)=>{
      if(sortVal==='id') return x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      if(sortVal==='type') return x.cat.label.localeCompare(y.cat.label) || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      if(sortVal==='status') return (y.hasUrgent - x.hasUrgent) || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      if(sortVal==='lastshift'){
        const xt = x.last ? new Date(x.last.timestamp).getTime() : -Infinity;
        const yt = y.last ? new Date(y.last.timestamp).getTime() : -Infinity;
        return yt - xt || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
      }
      return locationForBus(x.b).localeCompare(locationForBus(y.b)) || x.b.id.localeCompare(y.b.id, undefined, {numeric:true});
    });

    const toolbar = el('div','toolbar pin-top');
    const locSel = document.createElement('select');
    locSel.innerHTML = '<option value="all">All locations</option>' + LOCATIONS.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
    locSel.value = locationVal;
    locSel.onchange = ()=>{ state.admin.overviewLocationFilter = locSel.value; renderAdminTab(holder); };
    toolbar.appendChild(document.createTextNode('Location: '));
    toolbar.appendChild(locSel);

    const sortSel = document.createElement('select');
    sortSel.innerHTML = '<option value="location">Sort: Location</option><option value="id">Sort: ID</option>' +
      '<option value="type">Sort: Type</option><option value="status">Sort: Status (out of service first)</option>' +
      '<option value="lastshift">Sort: Last shift (most recent first)</option>';
    sortSel.value = sortVal;
    sortSel.onchange = ()=>{ state.admin.overviewSort = sortSel.value; renderAdminTab(holder); };
    toolbar.appendChild(document.createTextNode('Sort by: '));
    toolbar.appendChild(sortSel);
    holder.appendChild(toolbar);
  }

  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Current status by equipment</div>';
  if(!myBuses.length){
    card.appendChild(el('div','empty','No equipment added yet — go to "Equipment & QR Codes" to add your fleet.'));
  } else if(!enriched.length){
    card.appendChild(el('div','empty','No equipment at this location.'));
  } else {
    const table = document.createElement('table');

/* ---------- Avery .docx template parser ----------
   Reads an Avery-provided Word template (.docx, not the old .doc format) and derives the
   same geometry a person would otherwise have to work out by hand: label width/height,
   how many columns/rows fit per sheet, the gap between labels, and the sheet margins.

   How it works: Avery's templates lay the labels out as a single Word table. The table's
   column grid alternates label-width, gap-width, label-width, ... (or has no gap at all,
   just repeated equal-width columns), and row heights follow the same pattern vertically.
   We detect which width/height is the "real" label vs. the gap by majority count, then
   center that grid on the actual page size to get the margins — rather than trusting the
   template's own page-margin numbers, which are frequently just leftover authoring
   artifacts that don't match where the die-cut labels actually sit. */
function round5(n){ return Math.round(n * 100000) / 100000; }

function detectLabelAxis(valuesTwips){
  if(!valuesTwips.length) return null;
  if(valuesTwips.length === 1) return { count: 1, size: valuesTwips[0], gap: 0 };
  const groups = [];
  valuesTwips.forEach(v=>{
    const g = groups.find(g => Math.abs(g.value - v) <= 3);
    if(g) g.count++; else groups.push({ value: v, count: 1 });
  });
  groups.sort((a,b)=> b.count - a.count);
  const majority = groups[0];
  if(groups.length === 1) return { count: valuesTwips.length, size: majority.value, gap: 0 };
  const minority = groups[1];
  const expectedLabelCount = Math.ceil(valuesTwips.length / 2);
  const alternates = majority.count === expectedLabelCount && minority.count === (valuesTwips.length - expectedLabelCount);
  if(alternates) return { count: majority.count, size: majority.value, gap: minority.value };
  // Not a clean alternating pattern — likely a trailing scaffold column/row beyond the
  // print area (seen in some real Avery files). Keep the majority value, drop the rest.
  return { count: majority.count, size: majority.value, gap: 0 };
}

function humanizeTemplateFilename(filename){
  const base = filename.replace(/\.[^.]+$/, '');
  return base
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Za-z])([0-9])/g, '$1 $2')
    .replace(/([0-9])([A-Za-z])/g, '$1 $2')
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

async function parseAveryTemplateFile(file){
  if(!/\.docx$/i.test(file.name)){
    throw new Error('That\'s an old .doc file — this can only read the newer .docx format. Open it in Word or Google Docs and use "Save As" / "Download" → Word (.docx), then upload that instead.');
  }
  if(!window.JSZip){
    throw new Error('The template-reading library didn\'t load. Refresh the page and try again.');
  }
  const buf = await file.arrayBuffer();
  const zip = await window.JSZip.loadAsync(buf);
  const docEntry = zip.file('word/document.xml');
  if(!docEntry) throw new Error('This doesn\'t look like a Word document (no word/document.xml found inside).');
  const xml = await docEntry.async('string');

  const pgSzMatch = xml.match(/<w:pgSz\s+w:w="(\d+)"\s+w:h="(\d+)"/);
  if(!pgSzMatch) throw new Error('Could not find a page size in this document.');
  const pageW = parseInt(pgSzMatch[1], 10) / 1440;
  const pageH = parseInt(pgSzMatch[2], 10) / 1440;

  const gridMatch = xml.match(/<w:tblGrid>([\s\S]*?)<\/w:tblGrid>/);
  if(!gridMatch) throw new Error('Could not find a label table in this document — is this really an Avery label template?');
  const colWidths = Array.from(gridMatch[1].matchAll(/w:w="(\d+)"/g)).map(m=>parseInt(m[1],10));

  const rowHeights = Array.from(xml.matchAll(/<w:trHeight\s+w:val="(\d+)"/g)).map(m=>parseInt(m[1],10));
  if(!rowHeights.length) throw new Error('Could not find row heights in this document. You can still fill in the fields below by hand.');

  const colAxis = detectLabelAxis(colWidths);
  const rowAxis = detectLabelAxis(rowHeights);

  const cols = colAxis.count, rows = rowAxis.count;
  const labelW = colAxis.size / 1440, labelH = rowAxis.size / 1440;
  const colGap = colAxis.gap / 1440, rowGap = rowAxis.gap / 1440;

  const totalGridW = cols * labelW + (cols - 1) * colGap;
  const totalGridH = rows * labelH + (rows - 1) * rowGap;
  const sideMargin = Math.max(0, (pageW - totalGridW) / 2);
  const topMargin = Math.max(0, (pageH - totalGridH) / 2);

  const smaller = Math.min(labelW, labelH);
  const compact = smaller <= 2.3;
  const layout = labelW >= labelH ? 'horizontal' : 'vertical';
  let qrSize;
  if(compact) qrSize = smaller * 0.62;
  else if(layout === 'horizontal') qrSize = labelH * 0.8;
  else qrSize = labelW * 0.45;

  return {
    name: humanizeTemplateFilename(file.name) + ' (' + (cols*rows) + '/sheet)',
    cols, rows,
    labelW: round5(labelW), labelH: round5(labelH),
    sideMargin: round5(sideMargin), topMargin: round5(topMargin),
    colGap: round5(colGap), rowGap: round5(rowGap),
    layout, qrSize: round5(qrSize), compact
  };
}

/* ---------- bulk equipment upload ---------- */
let pendingImportRows = null;
let selectedBusIds = new Set();

function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field+='"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field='';
        if(row.length>1 || row[0]!=='') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function resolveCategoryByLabelOrKey(raw){
  if(!raw) return null;
  const r = raw.trim().toLowerCase();
  return categoriesForCurrentUser().find(c => c.key.toLowerCase()===r || c.label.toLowerCase()===r) || null;
}

      renderImportPreview(previewContainer, holder);
