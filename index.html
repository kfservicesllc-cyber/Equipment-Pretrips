      if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); dismissBtn.disabled = false; return; }
      renderAdminTab(holder);
    };
    btnRow.appendChild(dismissBtn);
    syncCard.appendChild(btnRow);
    holder.appendChild(syncCard);
  }
  }
}

/* ---------- bulk PM schedule upload ---------- */
let pendingPmImportRows = null;

function downloadPmCsvTemplate(){
  const rows = [['Unit ID','Unit Name','PM Item','Interval','Last Done At (optional)']];
  const trackable = busesForCurrentUser().filter(b => categoryFor(b).trackingUnit !== 'none');
  trackable.sort((a,b)=> a.id.localeCompare(b.id, undefined, {numeric:true}));
  trackable.forEach(b => rows.push([b.id, b.name||'', '', '', '']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pm-schedule-upload-template.csv'; a.click();
  URL.revokeObjectURL(url);
}
function renderPmImportPreview(container, holder){
  container.innerHTML = '';
  if(!pendingPmImportRows || !pendingPmImportRows.length) return;

  const okRows = pendingPmImportRows.filter(r=>r.status==='ok');
  const errRows = pendingPmImportRows.filter(r=>r.status!=='ok');

  const table = document.createElement('table');
  table.innerHTML = '<thead><tr><th>Unit ID</th><th>Unit</th><th>PM Item</th><th>Interval</th><th>Last Done At</th><th>Status</th></tr></thead>';
  const tbody = document.createElement('tbody');
  pendingPmImportRows.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><strong>${escapeHtml(r.id||'—')}</strong></td>
      <td>${escapeHtml(r.busName||'—')}</td>
      <td>${escapeHtml(r.label||'—')}</td>
      <td>${r.interval!=null ? escapeHtml(String(r.interval)) : '—'}</td>
      <td>${r.lastDone!=null ? escapeHtml(String(r.lastDone)) : '<span class="note">current reading</span>'}</td>
      <td>${r.status==='ok' ? '<span class="tag resolved">Will add</span>' : '<span class="tag open">'+escapeHtml(r.reason)+'</span>'}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  const scrollWrap = el('div','table-scroll');
  scrollWrap.appendChild(table);
  container.appendChild(scrollWrap);

  const summary = el('div','note');
  summary.style.margin = '10px 2px';
  summary.textContent = okRows.length + ' PM item(s) will be added' + (errRows.length ? ', ' + errRows.length + ' skipped (fix and re-upload if needed)' : '') + '.';
  container.appendChild(summary);

  const btnRow = el('div');
  btnRow.style.cssText = 'display:flex; gap:10px; flex-wrap:wrap;';
  const confirmBtn = document.createElement('button');
  confirmBtn.className='btn btn-gold'; confirmBtn.style.width='auto'; confirmBtn.style.padding='12px 20px';
  confirmBtn.textContent = 'Import ' + okRows.length + ' PM item(s)';
  confirmBtn.disabled = okRows.length === 0;
  confirmBtn.onclick = async ()=>{
    confirmBtn.disabled = true; confirmBtn.textContent = 'Importing...';
    const snapshot = JSON.parse(JSON.stringify(state.buses));
    okRows.forEach(r=>{
      const bus = state.buses.find(b=>b.id===r.id);
      if(!bus) return;
      if(!bus.pmItems) bus.pmItems = [];
      bus.pmItems.push({
        key: uid('pm'),
        label: r.label,
        intervalValue: r.interval,
        lastDoneReading: r.lastDone != null ? r.lastDone : (lastMileage(bus.id) || 0)
      });
    });
    const ok = await saveBuses();
    if(!ok){
      state.buses = snapshot;
      alert('Could not save these PM items.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ''));
      confirmBtn.disabled = false; confirmBtn.textContent = 'Import ' + okRows.length + ' PM item(s)';
      return;
    }
    pendingPmImportRows = null;
    renderAdminTab(holder);
  };
  btnRow.appendChild(confirmBtn);
  const cancelBtn = document.createElement('button');
  cancelBtn.className='btn btn-outline'; cancelBtn.textContent='Cancel';
  cancelBtn.onclick = ()=>{ pendingPmImportRows = null; renderAdminTab(holder); };
  btnRow.appendChild(cancelBtn);
  container.appendChild(btnRow);
}

function renderPmTab(holder){
  const intro = el('div','note');
  intro.dataset.noteTitle = 'How PM schedules work';
  intro.style.margin = '2px 2px 14px';
  intro.textContent = 'Set a schedule per piece of equipment — meter-based ("Oil change every 250 hours") or calendar-based ("Annual inspection every 365 days"). Once the current reading or date crosses that line, a maintenance email goes out, and keeps going out on every new log until you mark it done here. Equipment without a meter can still carry calendar-based items.';
  holder.appendChild(intro);

  const filterVal = state.admin.pmTypeFilter || 'all';
  const locationVal = state.admin.pmLocationFilter || 'all';
  const pmSortVal = state.admin.pmSort || 'id';
  let visibleBuses = busesForCurrentUser().filter(b => {
    const typeOk = filterVal==='all' || (b.category||'shuttle')===filterVal;
    const locOk = locationVal==='all' || locationForBus(b)===locationVal;
    return typeOk && locOk;
  });
  const busHasDue = (b)=>{
    const cur = categoryFor(b).trackingUnit==='none' ? null : lastMileage(b.id);
    return (b.pmItems||[]).some(p => pmStatusFor(b, p, cur).isDue);
  };
  visibleBuses = visibleBuses.slice().sort((a,b)=>{
    if(pmSortVal==='type') return categoryFor(a).label.localeCompare(categoryFor(b).label) || a.id.localeCompare(b.id, undefined, {numeric:true});
    if(pmSortVal==='location') return locationForBus(a).localeCompare(locationForBus(b)) || a.id.localeCompare(b.id, undefined, {numeric:true});
    if(pmSortVal==='due'){
      return ((busHasDue(b)?1:0) - (busHasDue(a)?1:0)) || a.id.localeCompare(b.id, undefined, {numeric:true});
    }
    return a.id.localeCompare(b.id, undefined, {numeric:true});
  });

  const toolbar = el('div','toolbar pin-top');
  const filterSel = document.createElement('select');
  filterSel.innerHTML = '<option value="all">All types</option>' + categoriesForCurrentUser().map(c=>`<option value="${escapeHtml(c.key)}">${escapeHtml(c.label)}</option>`).join('');
  filterSel.value = filterVal;
  filterSel.onchange = ()=>{ state.admin.pmTypeFilter = filterSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Type: '));
  toolbar.appendChild(filterSel);
  const locSel = document.createElement('select');
  locSel.innerHTML = '<option value="all">All locations</option>' + LOCATIONS.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
  locSel.value = locationVal;
  locSel.onchange = ()=>{ state.admin.pmLocationFilter = locSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Location: '));
  toolbar.appendChild(locSel);
  const pmSortSel = document.createElement('select');
  pmSortSel.innerHTML = '<option value="id">Sort: ID</option><option value="type">Sort: Type</option><option value="location">Sort: Location</option><option value="due">Sort: Due first</option>';
  pmSortSel.value = pmSortVal;
  pmSortSel.onchange = ()=>{ state.admin.pmSort = pmSortSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Sort by: '));
  toolbar.appendChild(pmSortSel);
  holder.appendChild(toolbar);

  const anyTrackable = busesForCurrentUser().some(b => categoryFor(b).trackingUnit !== 'none');
  if(anyTrackable){
    const uploadCard = el('div','card');
    uploadCard.dataset.sheet = '1'; uploadCard.dataset.sheetTitle = 'Upload PM schedule CSV';
    uploadCard.innerHTML = '<div class="section-label">Or upload a PM schedule CSV</div>';
    const uploadDesc = el('div','note');
    uploadDesc.style.marginBottom = '12px';
    uploadDesc.textContent = 'Five columns: Unit ID, Unit Name (for reference only, not matched on), PM Item, Interval, Last Done At (optional — leave blank to use the unit\'s current reading). One row per PM item — give a unit several rows for several items. Download the template for a row pre-filled per trackable unit.';
    uploadCard.appendChild(uploadDesc);

    const uploadRow = el('div');
    uploadRow.style.cssText = 'display:flex; gap:10px; flex-wrap:wrap; align-items:center;';
    const templateBtn = document.createElement('button');
    templateBtn.className='btn btn-outline btn-sm'; templateBtn.textContent='Download CSV template';
    templateBtn.onclick = downloadPmCsvTemplate;
    uploadRow.appendChild(templateBtn);

    const fileInput = document.createElement('input');
    fileInput.type = 'file'; fileInput.accept = '.csv,text/csv';
    fileInput.id = 'pm-csv-upload-input';
    uploadRow.appendChild(fileInput);
    uploadCard.appendChild(uploadRow);

    const previewContainer = el('div');
    previewContainer.style.marginTop = '14px';
    uploadCard.appendChild(previewContainer);

    fileInput.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        const rows = parseCsv(String(ev.target.result));
        if(!rows.length){ alert('That file looks empty.'); return; }
        let dataRows = rows;
        const first = rows[0].map(x=>String(x).trim().toLowerCase());
        if(first[0]==='unit id' || first[0]==='id') dataRows = rows.slice(1);

        const seenInFile = new Set();
        pendingPmImportRows = dataRows.filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>{
          const id = String(r[0]||'').trim();
          const nameRaw = String(r[1]||'').trim();
          const label = String(r[2]||'').trim();
          const intervalRaw = String(r[3]||'').trim();
          const lastDoneRaw = String(r[4]||'').trim();

          const bus = busesForCurrentUser().find(b=>b.id===id);
          const cat = bus ? categoryFor(bus) : null;
          const interval = intervalRaw ? Number(intervalRaw) : NaN;
          const lastDone = lastDoneRaw ? Number(lastDoneRaw) : null;
          const dupKey = id.toLowerCase() + '|' + label.toLowerCase();

          let status='ok', reason='';
          if(!id){ status='error'; reason='Missing unit ID'; }
          else if(!bus){ status='error'; reason='Unknown unit ID'; }
          else if(cat.trackingUnit==='none'){ status='error'; reason="Unit type doesn't track hours/miles"; }
          else if(!label){ status='error'; reason='Missing PM item name'; }
          else if(!intervalRaw || isNaN(interval) || interval<=0){ status='error'; reason='Interval must be a positive number'; }
          else if(lastDoneRaw && isNaN(lastDone)){ status='error'; reason='Last done reading must be a number'; }
          else if(bus.pmItems && bus.pmItems.some(p=>(p.label||'').trim().toLowerCase()===label.toLowerCase())){ status='error'; reason='Item already exists on this unit'; }
          else if(seenInFile.has(dupKey)){ status='error'; reason='Duplicate in file'; }

          if(status==='ok') seenInFile.add(dupKey);
          return {
            id,
            busName: bus ? bus.name : nameRaw,
            label,
            interval: isNaN(interval) ? null : interval,
            lastDone: (lastDoneRaw && !isNaN(lastDone)) ? lastDone : null,
            status, reason
          };
        });
        renderPmImportPreview(previewContainer, holder);
      };
      reader.readAsText(file);
    };

    if(pendingPmImportRows) renderPmImportPreview(previewContainer, holder);
    holder.appendChild(uploadCard);
  }

  if(!visibleBuses.length){
    holder.appendChild(el('div','empty','No equipment matches this filter.'));
    return;
  }

  visibleBuses.forEach(b=>{
    const cat = categoryFor(b);
    const hasMeter = cat.trackingUnit !== 'none';
    const unit = unitLabel(cat.trackingUnit);
    const current = hasMeter ? lastMileage(b.id) : null;
    const card = el('div','card');
    const head = el('div','flex-between');
    head.innerHTML = `<div><span style="font-family:'Barlow Condensed'; font-size:20px; font-weight:700; color:var(--navy);">${escapeHtml(b.id)}</span>
      <span style="color:var(--ink-soft); font-size:13px;"> ${escapeHtml(b.name||'')} · ${escapeHtml(cat.label)}</span></div>
      <div class="mono" style="font-size:13px; color:var(--ink-soft);">${!hasMeter ? 'No meter — calendar-based PM only' : current!=null ? 'Current: ' + current.toLocaleString() + ' ' + unit : 'No readings yet'}</div>`;
    card.appendChild(head);

    const items = b.pmItems || [];
    if(!items.length){
      card.appendChild(el('div','note','No PM items set up for this unit yet.'));
    }
    items.forEach((p, idx) => {
      const dayBased = pmIsDayBased(p);
      const st = pmStatusFor(b, p, current);
      const isDue = st.isDue;
      const row = el('div');
      row.style.cssText = 'border:1.5px solid ' + (isDue?'var(--bad)':'var(--line)') + '; border-radius:8px; padding:12px; margin-top:10px;' + (isDue?' background:#fbe3e0;':'');

      const rowTop = el('div');
      rowTop.style.cssText = 'display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; margin-bottom:8px;';
      const labelField = el('div','field'); labelField.style.cssText='margin-bottom:0; flex:1; min-width:140px;';
      labelField.innerHTML = '<label>Item</label>';
      const labelInput = document.createElement('input');
      labelInput.type='text'; labelInput.value = p.label;
      labelInput.oninput = ()=> p.label = labelInput.value;
      labelField.appendChild(labelInput);
      rowTop.appendChild(labelField);

      const intField = el('div','field'); intField.style.cssText='margin-bottom:0; min-width:100px;';
      intField.innerHTML = '<label>Every</label>';
      const intInput = document.createElement('input');
      intInput.type='number'; intInput.value = p.intervalValue;
      intInput.oninput = ()=> p.intervalValue = Number(intInput.value);
      intField.appendChild(intInput);
      rowTop.appendChild(intField);

      // Meter vs calendar basis. Units without a meter are locked to calendar-based.
      const basisField = el('div','field'); basisField.style.cssText='margin-bottom:0; min-width:100px;';
      basisField.innerHTML = '<label>Basis</label>';
      const basisSel = document.createElement('select');
      basisSel.innerHTML = (hasMeter ? '<option value="meter">' + escapeHtml(unit) + '</option>' : '') + '<option value="days">days</option>';
      basisSel.value = dayBased || !hasMeter ? 'days' : 'meter';
      basisSel.onchange = async ()=>{
        if(basisSel.value === 'days'){
          p.intervalType = 'days';
          if(!p.lastDoneDate) p.lastDoneDate = new Date().toISOString().slice(0,10);
        } else {
          delete p.intervalType;
          if(p.lastDoneReading == null) p.lastDoneReading = current || 0;
        }
        const ok = await saveBuses();
        if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      basisField.appendChild(basisSel);
      rowTop.appendChild(basisField);

      const rmBtn = document.createElement('button');
      rmBtn.className='btn btn-outline btn-sm'; rmBtn.textContent='Remove';
      rmBtn.onclick = async ()=>{
        b.pmItems.splice(idx,1);
        const ok = await saveBuses();
        if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      rowTop.appendChild(rmBtn);
      row.appendChild(rowTop);

      const statusLine = el('div','note');
      statusLine.style.marginBottom = '8px';
      const remUnit = st.dayBased ? 'days' : unit;
      statusLine.innerHTML = 'Last done ' + (st.dayBased?'on':'at') + ' <strong>' + st.lastDoneLabel + '</strong> · due ' + (st.dayBased?'on':'at') + ' <strong>' + st.dueAtLabel + '</strong>' +
        (isDue ? ' · <span style="color:var(--bad); font-weight:700;">DUE' + (st.remaining!=null ? ' (' + (-st.remaining).toLocaleString() + ' ' + remUnit + ' over)' : '') + '</span>'
          : !st.hasBasis ? ' · <span style="color:var(--ink-soft);">' + (st.dayBased?'no date set':'no readings yet') + '</span>'
          : ' · <span style="color:var(--ok);">OK</span>');
      row.appendChild(statusLine);

      const doneRow = el('div');
      doneRow.style.cssText = 'display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap;';
      const doneField = el('div','field'); doneField.style.cssText='margin-bottom:0; min-width:130px;';
      let doneInput;
      if(st.dayBased){
        doneField.innerHTML = '<label>Mark done on</label>';
        doneInput = document.createElement('input');
        doneInput.type='date'; doneInput.value = new Date().toISOString().slice(0,10);
      } else {
        doneField.innerHTML = '<label>Mark done at</label>';
        doneInput = document.createElement('input');
        doneInput.type='number'; doneInput.placeholder = current!=null ? String(current) : 'reading';
      }
      doneField.appendChild(doneInput);
      doneRow.appendChild(doneField);
      const doneBtn = document.createElement('button');
      doneBtn.className='btn btn-primary btn-sm'; doneBtn.textContent='Mark done';
      doneBtn.onclick = async ()=>{
        if(st.dayBased){
          const d = doneInput.value || new Date().toISOString().slice(0,10);
          p.lastDoneDate = d;
          pushPmHistory(b, p, null);
        } else {
          const val = doneInput.value ? Number(doneInput.value) : current;
          if(val == null){ alert('Enter the reading it was done at, or log a shift for this unit first.'); return; }
          p.lastDoneReading = val;
          pushPmHistory(b, p, val);
        }
        doneBtn.disabled = true; doneBtn.textContent = 'Saving...';
        const ok = await saveBuses();
        if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); doneBtn.disabled=false; doneBtn.textContent='Mark done'; return; }
        renderAdminTab(holder);
      };
      doneRow.appendChild(doneBtn);

      const saveBtn = document.createElement('button');
      saveBtn.className='btn btn-outline btn-sm'; saveBtn.textContent='Save changes';
      saveBtn.onclick = async ()=>{
        saveBtn.textContent='Saving...';
        const ok = await saveBuses();
        saveBtn.textContent = ok ? 'Saved' : 'Save failed';
        if(!ok) alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
        setTimeout(()=>{ saveBtn.textContent='Save changes'; }, 1500);
      };
      doneRow.appendChild(saveBtn);
      row.appendChild(doneRow);

      card.appendChild(row);
    });

    const addBtn = document.createElement('button');
    addBtn.className='btn-add-issue'; addBtn.style.marginTop='10px'; addBtn.textContent='+ Add PM item';
    addBtn.onclick = async ()=>{
      if(!b.pmItems) b.pmItems = [];
      if(hasMeter){
        b.pmItems.push({ key: uid('pm'), label: 'New PM item', intervalValue: 100, lastDoneReading: current||0 });
      } else {
        b.pmItems.push({ key: uid('pm'), label: 'New PM item', intervalType: 'days', intervalValue: 365, lastDoneDate: new Date().toISOString().slice(0,10) });
      }
      const ok = await saveBuses();
      if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
      renderAdminTab(holder);
    };
    card.appendChild(addBtn);

    holder.appendChild(card);
  });
}

// Flat, filterable/sortable list of every PM item across the current user's trackable
// equipment — the "what's due" companion to the per-unit Preventive Maintenance tab.
// Built to match the Mechanical Issues tab: pinned toolbar (Show / Type / Location / Sort),
// then one scrollable table with a one-click "Mark done" per row. Marking done here sets the
// item's last-done reading to the unit's current reading and saves, same as the PM tab.
function renderPmDueTab(holder){
  // "Upcoming" threshold: an item not yet due counts as coming due soon once the reading is
  // within this fraction of its interval of the due point (self-scaling — 25 hrs on a 250-hr
  // interval, 50 mi on a 500-mi interval).
  const rows = [];
  busesForCurrentUser().forEach(b => {
    const cat = categoryFor(b);
    const unit = unitLabel(cat.trackingUnit);
    const current = cat.trackingUnit === 'none' ? null : lastMileage(b.id);
    (b.pmItems || []).forEach(p => {
      const st = pmStatusFor(b, p, current);
      rows.push({ bus:b, cat, item:p, unit, current, st,
        isDue: st.isDue, soon: st.soon, hasBasis: st.hasBasis, remaining: st.remaining, interval: st.interval });
    });
  });

  const intro = el('div','note');
  intro.dataset.noteTitle = 'How PM due works';
  intro.style.margin = '2px 2px 14px';
  intro.textContent = 'Everything on a PM schedule across your equipment, in one list — sorted so what\'s due floats to the top. "Soon" means the unit is within 10% of its interval of coming due. Mark an item done here and it resets to the unit\'s current reading (or to today, for calendar-based items), just like on the Preventive Maintenance tab.';
  holder.appendChild(intro);

  const showVal = state.admin.pmDueFilter || 'due';
  const typeVal = state.admin.pmDueTypeFilter || 'all';
  const locVal = state.admin.pmDueLocationFilter || 'all';
  const sortVal = state.admin.pmDueSort || 'status';

  const toolbar = el('div','toolbar pin-top');
  const showSel = document.createElement('select');
  showSel.innerHTML = '<option value="due">Due now</option><option value="soon">Due + upcoming</option><option value="all">All</option>';
  showSel.value = showVal;
  showSel.onchange = ()=>{ state.admin.pmDueFilter = showSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Show: '));
  toolbar.appendChild(showSel);

  const typeSel = document.createElement('select');
  typeSel.innerHTML = '<option value="all">All types</option>' + categoriesForCurrentUser().map(c=>`<option value="${escapeHtml(c.key)}">${escapeHtml(c.label)}</option>`).join('');
  typeSel.value = typeVal;
  typeSel.onchange = ()=>{ state.admin.pmDueTypeFilter = typeSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Type: '));
  toolbar.appendChild(typeSel);

  const locSel = document.createElement('select');
  locSel.innerHTML = '<option value="all">All locations</option>' + LOCATIONS.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
  locSel.value = locVal;
  locSel.onchange = ()=>{ state.admin.pmDueLocationFilter = locSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Location: '));
  toolbar.appendChild(locSel);

  const sortSel = document.createElement('select');
  sortSel.innerHTML = '<option value="status">Sort: Status (due first)</option>' +
    '<option value="overdue">Sort: Most overdue</option>' +
    '<option value="equipment">Sort: Equipment</option>' +
    '<option value="location">Sort: Location</option>' +
    '<option value="type">Sort: Type</option>';
  sortSel.value = sortVal;
  sortSel.onchange = ()=>{ state.admin.pmDueSort = sortSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Sort by: '));
  toolbar.appendChild(sortSel);

  const filtered = rows.filter(r => {
    if(typeVal !== 'all' && (r.bus.category||'shuttle') !== typeVal) return false;
    if(locVal !== 'all' && locationForBus(r.bus) !== locVal) return false;
    if(showVal === 'due') return r.isDue;
    if(showVal === 'soon') return r.isDue || r.soon;
    return true; // all
  });

  const exportBtn = document.createElement('button');
  exportBtn.className='btn btn-outline btn-sm'; exportBtn.textContent='Export CSV';
  exportBtn.onclick = ()=> exportPmDueCsv(filtered);
  toolbar.appendChild(exportBtn);
  holder.appendChild(toolbar);

  // Rank for status sort + tie-breaks: due (0) -> soon (1) -> ok (2) -> no basis (3).
  // "Most overdue" compares remaining as a FRACTION of the interval so meter-based (hrs/mi)
  // and calendar-based (days) items sort sensibly against each other.
  const rank = r => r.isDue ? 0 : r.soon ? 1 : r.hasBasis ? 2 : 3;
  const remFrac = r => (r.remaining == null || !r.interval) ? Infinity : r.remaining / r.interval;
  filtered.sort((a,b)=>{
    if(sortVal==='equipment') return a.bus.id.localeCompare(b.bus.id, undefined, {numeric:true});
    if(sortVal==='location') return locationForBus(a.bus).localeCompare(locationForBus(b.bus)) || a.bus.id.localeCompare(b.bus.id, undefined, {numeric:true});
    if(sortVal==='type') return a.cat.label.localeCompare(b.cat.label) || a.bus.id.localeCompare(b.bus.id, undefined, {numeric:true});
    if(sortVal==='overdue') return remFrac(a) - remFrac(b) || a.bus.id.localeCompare(b.bus.id, undefined, {numeric:true});
    // status (default)
    return rank(a) - rank(b) || remFrac(a) - remFrac(b) || a.bus.id.localeCompare(b.bus.id, undefined, {numeric:true});
  });

  const card = el('div','card');
  if(!filtered.length){
    card.appendChild(el('div','empty', showVal==='due' ? 'Nothing due right now — you\'re caught up.' : 'No PM items in this view.'));
    holder.appendChild(card);
    return;
  }

  const table = document.createElement('table');
  table.innerHTML = '<thead><tr><th>Equipment</th><th>PM item</th><th>Type</th><th>Location</th><th>Every</th><th>Last done</th><th>Current</th><th>Due</th><th>Status</th><th></th></tr></thead>';
  const tbody = document.createElement('tbody');
  filtered.forEach(r=>{
    const st = r.st;
    const remUnit = st.dayBased ? (Math.abs(st.remaining)===1?'day':'days') : r.unit;
    let statusTag;
    if(!st.hasBasis){
      statusTag = '<span class="tag" style="background:#eef1f5; color:var(--ink-soft);">' + (st.dayBased ? 'No date set' : 'No readings') + '</span>';
    } else if(st.isDue){
      const over = -st.remaining;
      statusTag = '<span class="tag open">Due' + (over>0 ? ' · ' + over.toLocaleString() + ' ' + remUnit + ' over' : '') + '</span>';
    } else if(st.soon){
      statusTag = '<span class="tag minor">Soon · ' + st.remaining.toLocaleString() + ' ' + remUnit + ' left</span>';
    } else {
      statusTag = '<span class="tag resolved">OK</span>';
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${unitLinkHtml(r.bus.id)}<div style="font-size:11.5px; color:var(--ink-soft);">${escapeHtml(r.bus.name||'')}</div></td>
      <td>${escapeHtml(r.item.label||'—')}</td>
      <td>${escapeHtml(r.cat.label)}</td>
      <td>${escapeHtml(locationForBus(r.bus))}</td>
      <td class="mono">${st.interval ? st.interval.toLocaleString() + ' ' + (st.dayBased ? 'days' : r.unit) : '—'}</td>
      <td class="mono">${st.lastDoneLabel}</td>
      <td class="mono">${!st.dayBased && r.current!=null ? r.current.toLocaleString() + ' ' + r.unit : '—'}</td>
      <td class="mono">${st.dueAtLabel}</td>
      <td>${statusTag}</td>`;
    const tdBtn = document.createElement('td');
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline btn-sm';
    btn.textContent = 'Mark done';
    btn.onclick = async ()=>{
      if(st.dayBased){
        r.item.lastDoneDate = new Date().toISOString().slice(0,10);
        pushPmHistory(r.bus, r.item, null);
      } else {
        if(r.current == null){
          alert('No readings yet for ' + r.bus.id + '. Log a shift for this unit first, or set the reading on the Preventive Maintenance tab.');
          return;
        }
        r.item.lastDoneReading = r.current;
        pushPmHistory(r.bus, r.item, r.current);
      }
      btn.disabled = true; btn.textContent = 'Saving...';
      const ok = await saveBuses();
      if(!ok){
        btn.disabled = false; btn.textContent = 'Mark done';
        alert('Could not save.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ''));
        return;
      }
      renderAdminTab(holder);
    };
    tdBtn.appendChild(btn);
    tr.appendChild(tdBtn);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  bindUnitLinks(table);
  const scrollWrap = el('div','table-scroll');
  scrollWrap.appendChild(table);
  card.appendChild(scrollWrap);
  holder.appendChild(card);
}

function exportPmDueCsv(rows){
  const out = [['Equipment','Name','PM Item','Type','Location','Interval','Interval Basis','Last Done','Current Reading','Due','Status']];
  rows.forEach(r=>{
    const st = r.st;
    out.push([
      r.bus.id, r.bus.name||'', r.item.label||'', r.cat.label, locationForBus(r.bus),
      st.interval, st.dayBased ? 'days' : r.unit,
      st.lastDoneLabel, (!st.dayBased && r.current!=null) ? r.current : '',
      st.dueAtLabel,
      !st.hasBasis ? (st.dayBased?'No date set':'No readings') : st.isDue ? 'Due' : st.soon ? 'Soon' : 'OK'
    ]);
  });
  downloadCsv(out, 'fleet-pm-due.csv');
}

function renderIssuesTab(holder, all){
  const myBusIds = new Set(busesForCurrentUser().map(b=>b.id));
  const rows = [];
  all.filter(s=>myBusIds.has(s.busId)).forEach(s => {
    const cat = categoryFor(state.buses.find(b=>b.id===s.busId) || {id:s.busId});
    allFlaggedItems(s, cat).forEach(item => rows.push({shift:s, item, cat}));
  });
  const toolbar = el('div','toolbar pin-top');
  const sel = document.createElement('select');
  sel.innerHTML = '<option value="open">Open</option><option value="resolved">Resolved</option><option value="all">All</option>';
  sel.value = state.admin.issueFilter || 'open';
  sel.onchange = ()=>{ state.admin.issueFilter = sel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Show: '));
  toolbar.appendChild(sel);

  const sortSel = document.createElement('select');
  sortSel.innerHTML = '<option value="date">Sort: Reported (newest first)</option>' +
    '<option value="equipment">Sort: Equipment</option>' +
    '<option value="driver">Sort: Driver</option>' +
    '<option value="severity">Sort: Severity (urgent first)</option>' +
    '<option value="status">Sort: Status (open first)</option>';
  sortSel.value = state.admin.issueSort || 'date';
  sortSel.onchange = ()=>{ state.admin.issueSort = sortSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Sort by: '));
  toolbar.appendChild(sortSel);
  holder.appendChild(toolbar);

  const filter = state.admin.issueFilter || 'open';
  const issueSortVal = state.admin.issueSort || 'date';
  // Filtering and status are per ITEM now — one shift record can have some items fixed and
  // others still open, and each row here stands on its own.
  const filtered = rows.filter(r => filter==='all' ? true : filter==='resolved' ? r.item.isResolved : !r.item.isResolved);
  filtered.sort((a,b)=>{
    if(issueSortVal==='equipment') return a.shift.busId.localeCompare(b.shift.busId, undefined, {numeric:true}) || (new Date(b.shift.timestamp) - new Date(a.shift.timestamp));
    if(issueSortVal==='driver') return (a.shift.driver||'').localeCompare(b.shift.driver||'') || (new Date(b.shift.timestamp) - new Date(a.shift.timestamp));
    if(issueSortVal==='severity') return ((b.item.severity==='urgent'?1:0) - (a.item.severity==='urgent'?1:0)) || (new Date(b.shift.timestamp) - new Date(a.shift.timestamp));
    if(issueSortVal==='status') return ((a.item.isResolved?1:0) - (b.item.isResolved?1:0)) || (new Date(b.shift.timestamp) - new Date(a.shift.timestamp));
    return new Date(b.shift.timestamp) - new Date(a.shift.timestamp); // date, newest first (default)
  });

  const exportBtn = document.createElement('button');
  exportBtn.className='btn btn-outline btn-sm'; exportBtn.textContent='Export CSV';
  exportBtn.onclick = ()=> exportIssuesCsv(filtered);
  toolbar.appendChild(exportBtn);

  const card = el('div','card');
  if(!filtered.length){
    card.appendChild(el('div','empty','No issues in this view.'));
  } else {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>Equipment</th><th>Reported</th><th>Driver</th><th>Reading</th><th>Source</th><th>Category</th><th>Severity</th><th>Note</th><th>Photo</th><th>Status</th><th>Resolution</th><th></th></tr></thead>';
    const tbody = document.createElement('tbody');
    filtered.forEach(r=>{
      const tr = document.createElement('tr');
      const readingCell = r.shift.mileage!=null ? r.shift.mileage.toLocaleString()+' '+unitLabel(r.cat.trackingUnit) : '—';
      const res = r.item.resolved;
      let resolutionCell = '—';
      if(r.item.isResolved){
        if(res && !res.legacy){
          resolutionCell = escapeHtml(res.by || '') + (res.note ? ' — ' + escapeHtml(res.note) : '') + (res.at ? '<div style="font-size:11px; color:var(--ink-soft);">' + fmtDT(res.at) + '</div>' : '');
        } else {
          resolutionCell = '<span style="color:var(--ink-soft);">Resolved (no details recorded)</span>';
        }
      }
      tr.innerHTML = `<td>${unitLinkHtml(r.shift.busId)}</td>
        <td>${fmtDT(r.shift.timestamp)}</td>
        <td>${escapeHtml(r.shift.driver)}</td>
        <td class="mono">${readingCell}</td>
        <td>${r.item.source==='check' ? '<span class="tag minor">Checklist</span>' : '<span class="tag resolved" style="background:#e6e0f0;color:#5a3d99;">Reported</span>'}</td>
        <td>${escapeHtml(r.item.label)}</td>
        <td>${r.item.severity==='urgent' ? '<span class="tag open">Urgent</span>' : '<span class="tag minor">Minor</span>'}</td>
        <td style="max-width:220px;">${escapeHtml(r.item.note||'—')}</td>
        <td>${r.item.photoUrl ? `<a href="${escapeHtml(r.item.photoUrl)}" target="_blank" rel="noopener"><img src="${escapeHtml(r.item.photoUrl)}" alt="Issue photo" style="width:44px;height:44px;object-fit:cover;border-radius:5px;border:1px solid var(--line);"></a>` : '—'}</td>
        <td>${r.item.isResolved ? '<span class="tag resolved">Resolved</span>' : '<span class="tag open">Open</span>'}</td>
        <td style="max-width:200px; font-size:12.5px;">${resolutionCell}</td>`;
      const tdBtn = document.createElement('td');
      buildResolveControl(tdBtn, r.shift, r.cat, r.item, ()=>renderAdminTab(holder));
      tr.appendChild(tdBtn);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    bindUnitLinks(table);
    const scrollWrap = el('div','table-scroll');
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);
  }
  holder.appendChild(card);
}

// The Mark resolved / Reopen control for one flagged item. Resolving expands a small inline
// form (who fixed it + what was done) instead of firing blind — that record is the unit's
// maintenance history. Shared by the Mechanical Issues tab and the unit detail screen.
function buildResolveControl(container, shift, cat, item, onDone){
  container.innerHTML = '';
  const btn = document.createElement('button');
  btn.className='btn btn-outline btn-sm';
  if(item.isResolved){
    btn.textContent = 'Reopen';
    btn.onclick = async ()=>{
      btn.disabled = true; btn.textContent = 'Reopening...';
      const ok = await applyItemResolution(shift, cat, item.key, null);
      if(!ok){ btn.disabled = false; btn.textContent = 'Reopen'; return; }
      onDone();
    };
    container.appendChild(btn);
    return;
  }
  btn.textContent = 'Mark resolved';
  btn.onclick = ()=>{
    container.innerHTML = '';
    const form = el('div');
    form.style.cssText = 'display:flex; flex-direction:column; gap:6px; min-width:180px;';
    const byInput = document.createElement('input');
    byInput.type='text'; byInput.placeholder='Resolved by';
    try{ byInput.value = localStorage.getItem('scfleet_resolvedBy') || currentDepartmentName() || ''; }catch(e){ byInput.value = currentDepartmentName() || ''; }
    form.appendChild(byInput);
    const noteInput = document.createElement('input');
    noteInput.type='text'; noteInput.placeholder='What was done (optional)';
    form.appendChild(noteInput);
    const btnRow = el('div');
    btnRow.style.cssText = 'display:flex; gap:6px;';
    const saveBtn = document.createElement('button');
    saveBtn.className='btn btn-primary btn-sm'; saveBtn.textContent='Save';
    saveBtn.onclick = async ()=>{
      const by = byInput.value.trim();
      if(!by){ alert('Enter who resolved it.'); return; }
      try{ localStorage.setItem('scfleet_resolvedBy', by); }catch(e){}
      saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
      const resolution = { at: new Date().toISOString(), by, note: noteInput.value.trim() };
      const ok = await applyItemResolution(shift, cat, item.key, resolution);
      if(!ok){ saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
      // Email only this item, with the resolution details attached.
      const bus = state.buses.find(b=>b.id===shift.busId) || {id: shift.busId, name: shift.busName};
      await sendResolvedNotification(bus, shift.driver, shift.timestamp,
        [{ label: item.label + (item.severity==='urgent' ? ' ⚠ URGENT' : ''), note: item.note, photoUrl: item.photoUrl || null }],
        by, resolution.note);
      onDone();
    };
    btnRow.appendChild(saveBtn);
    const cancelBtn = document.createElement('button');
    cancelBtn.className='btn btn-outline btn-sm'; cancelBtn.textContent='Cancel';
    cancelBtn.onclick = ()=> buildResolveControl(container, shift, cat, item, onDone);
    btnRow.appendChild(cancelBtn);
    form.appendChild(btnRow);
    container.appendChild(form);
    byInput.focus();
  };
  container.appendChild(btn);
}

// Loads the record fresh, applies the per-item resolution stamp (or clears it on reopen),
// keeps the record-level flag in sync, and saves. Returns true on success.
async function applyItemResolution(shift, cat, itemKey, resolution){
  const arr = await loadShifts(shift.busId);
  const target = arr.find(x=>x.id===shift.id);
  if(!target){ alert('Could not find that record anymore.'); return false; }
  setItemResolution(target, cat, itemKey, resolution);
  const ok = await saveShifts(shift.busId, arr);
  if(!ok){ alert('Could not save.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : '')); return false; }
  return true;
}

function exportIssuesCsv(rows){
  const out = [['Equipment','Reported','Driver','Reading','Source','Category','Severity','Note','Status','Resolved By','Resolution Note','Resolved At','Photo URL']];
  rows.forEach(r=>{
    const res = r.item.resolved;
    out.push([
      r.shift.busId, r.shift.timestamp, r.shift.driver,
      (r.shift.mileage!=null ? r.shift.mileage : ''),
      r.item.source==='check' ? 'Checklist' : 'Reported',
      r.item.label, r.item.severity,
      (r.item.note||'').replace(/[\r\n]+/g,' '),
      r.item.isResolved ? 'Resolved' : 'Open',
      res ? (res.by||'') : '', res ? (res.note||'').replace(/[\r\n]+/g,' ') : '', res ? (res.at||'') : '',
      r.item.photoUrl || ''
    ]);
  });
  downloadCsv(out, 'fleet-mechanical-issues.csv');
}
// Shared CSV download used by every per-tab export.
function downloadCsv(rows, filename){
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function renderLogTab(holder, all){
  const myBuses = busesForCurrentUser();
  const myBusIds = new Set(myBuses.map(b=>b.id));
  const scopedAll = all.filter(s=>myBusIds.has(s.busId));

  const toolbar = el('div','toolbar pin-top');
  const sel = document.createElement('select');
  sel.innerHTML = '<option value="all">All equipment</option>' + myBuses.map(b=>`<option value="${escapeHtml(b.id)}">${escapeHtml(b.id)}</option>`).join('');
  sel.value = state.admin.logBus || 'all';
  sel.onchange = ()=>{ state.admin.logBus = sel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Equipment: '));
  toolbar.appendChild(sel);

  const locSel = document.createElement('select');
  locSel.innerHTML = '<option value="all">All locations</option>' + LOCATIONS.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
  locSel.value = state.admin.logLocation || 'all';
  locSel.onchange = ()=>{ state.admin.logLocation = locSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Location: '));
  toolbar.appendChild(locSel);

  const rangeSel = document.createElement('select');
  rangeSel.innerHTML = '<option value="all">All time</option><option value="7">Last 7 days</option>' +
    '<option value="30">Last 30 days</option><option value="90">Last 90 days</option>';
  rangeSel.value = state.admin.logRange || 'all';
  rangeSel.onchange = ()=>{ state.admin.logRange = rangeSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Range: '));
  toolbar.appendChild(rangeSel);

  const sortSel = document.createElement('select');
  sortSel.innerHTML = '<option value="date">Sort: Date (newest first)</option>' +
    '<option value="vehicle">Sort: Vehicle ID</option>' +
    '<option value="driver">Sort: Driver</option>' +
    '<option value="issues">Sort: Issues (most first)</option>';
  sortSel.value = state.admin.logSort || 'date';
  sortSel.onchange = ()=>{ state.admin.logSort = sortSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Sort by: '));
  toolbar.appendChild(sortSel);

  // Free-text search across unit ID, driver, and notes — same live-rerender-with-focus-
  // restore pattern as the Equipment Types search box.
  const searchInput = document.createElement('input');
  searchInput.type='text'; searchInput.id='log-search-input'; searchInput.placeholder='Search unit, driver, notes...';
  searchInput.value = state.admin.logSearch || '';
  searchInput.style.minWidth='190px';
  searchInput.oninput = ()=>{
    state.admin.logSearch = searchInput.value;
    const cursorPos = searchInput.selectionStart;
    renderAdminTab(holder).then(()=>{
      const revived = document.getElementById('log-search-input');
      if(revived){ revived.focus(); revived.setSelectionRange(cursorPos, cursorPos); }
    });
  };
  toolbar.appendChild(searchInput);

  const exportBtn = document.createElement('button');
  exportBtn.className='btn btn-outline btn-sm'; exportBtn.textContent='Export CSV';
  exportBtn.onclick = ()=> exportCsv(scopedAll);
  toolbar.appendChild(exportBtn);

  const busFilter = state.admin.logBus || 'all';
  const locFilter = state.admin.logLocation || 'all';
  const sortVal = state.admin.logSort || 'date';
  const rangeVal = state.admin.logRange || 'all';
  const searchVal = (state.admin.logSearch || '').trim().toLowerCase();

  if(busFilter !== 'all'){
    const clearBtn = document.createElement('button');
    clearBtn.className='btn btn-outline btn-sm'; clearBtn.textContent='Clear all logs for ' + busFilter;
    clearBtn.onclick = async ()=>{
      // Destructive enough to warrant type-to-confirm — one native confirm is too easy to
      // click through when it wipes a unit's entire history.
      const typed = prompt('This permanently deletes ALL shift logs for ' + busFilter + ' and cannot be undone.\n\nType the unit ID (' + busFilter + ') to confirm:');
      if(typed === null) return;
      if(typed.trim() !== busFilter){ alert('That didn\'t match — nothing was deleted.'); return; }
      const ok = await saveShifts(busFilter, []);
      if(!ok){ alert('Could not delete.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
      renderAdminTab(holder);
    };
    toolbar.appendChild(clearBtn);
  }
  holder.appendChild(toolbar);

  let filtered = busFilter==='all' ? scopedAll : scopedAll.filter(s=>s.busId===busFilter);
  if(locFilter !== 'all'){
    filtered = filtered.filter(s => locationForBus(state.buses.find(b=>b.id===s.busId) || {id:s.busId}) === locFilter);
  }
  if(rangeVal !== 'all'){
    const cutoff = Date.now() - Number(rangeVal)*86400000;
    filtered = filtered.filter(s => new Date(s.timestamp).getTime() >= cutoff);
  }
  if(searchVal){
    filtered = filtered.filter(s =>
      (s.busId||'').toLowerCase().includes(searchVal) ||
      (s.driver||'').toLowerCase().includes(searchVal) ||
      (s.notes||'').toLowerCase().includes(searchVal));
  }

  // Enrich each record with the derived fields the table (and every sort option) needs,
  // computed once up front rather than recomputed per-row during render.
  const enriched = filtered.map(s=>{
    const sBus = state.buses.find(b=>b.id===s.busId) || {id:s.busId};
    const sUnit = unitLabel(categoryFor(sBus).trackingUnit);
    const failCount = s.preTrip ? Object.values(s.preTrip).filter(c=>c.status==='fail').length : 0;
    const issueCount = (s.issues && s.issues.length) || 0;
    const hasUrgentIssue = recordHasUrgent(s, categoryFor(sBus));
    return {s, sBus, sUnit, failCount, issueCount, hasUrgentIssue};
  });

  enriched.sort((a,b)=>{
    if(sortVal==='vehicle') return a.s.busId.localeCompare(b.s.busId, undefined, {numeric:true}) || (new Date(b.s.timestamp) - new Date(a.s.timestamp));
    if(sortVal==='driver') return (a.s.driver||'').localeCompare(b.s.driver||'') || (new Date(b.s.timestamp) - new Date(a.s.timestamp));
    if(sortVal==='issues') return (b.issueCount - a.issueCount) || (new Date(b.s.timestamp) - new Date(a.s.timestamp));
    return new Date(b.s.timestamp) - new Date(a.s.timestamp); // date, newest first (default)
  });

  const card = el('div','card');
  if(!enriched.length){
    card.appendChild(el('div','empty','No shift logs yet.'));
  } else {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>When</th><th>Equipment</th><th>Driver</th><th>Action</th><th>Reading</th><th>Issues</th><th>Notes</th><th></th></tr></thead>';
    const tbody = document.createElement('tbody');
    enriched.forEach(({s, sUnit, failCount, issueCount, hasUrgentIssue})=>{
      const tr = document.createElement('tr');
      let issueCell = '—';
      if(s.action==='start' || s.action==='daily'){
        const parts = [];
        if(s.preTrip) parts.push(failCount ? failCount+' failed' : 'All passed');
        if(issueCount) parts.push(issueCount+' issue'+(issueCount===1?'':'s'));
        issueCell = (parts.length ? parts.join(' · ') : '—') + (hasUrgentIssue ? ' ⚠' : '');
      } else if(s.action==='end' && issueCount){
        issueCell = issueCount + (hasUrgentIssue ? ' ⚠' : '');
      }
      const actionTag = s.action==='start' ? '<span class="tag resolved">Start</span>'
        : s.action==='end' ? '<span class="tag open" style="background:#f0e6d0;color:#8a6d1a;">End</span>'
        : '<span class="tag resolved" style="background:#e6e0f0;color:#5a3d99;">Check</span>';
      tr.innerHTML = `<td>${fmtDT(s.timestamp)}</td>
        <td>${unitLinkHtml(s.busId)}</td>
        <td>${escapeHtml(s.driver)}</td>
        <td>${actionTag}</td>
        <td class="mono">${s.mileage!=null ? s.mileage.toLocaleString()+' '+sUnit : '—'}</td>
        <td>${issueCell}</td>
        <td style="max-width:220px;">${escapeHtml(s.notes||'—')}</td>`;
      const tdDel = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className='btn btn-outline btn-sm'; delBtn.textContent='Delete';
      delBtn.onclick = async ()=>{
        if(!confirm('Delete this shift log entry? This cannot be undone.')) return;
        const arr = await loadShifts(s.busId);
        const newArr = arr.filter(x=>x.id!==s.id);
        const ok = await saveShifts(s.busId, newArr);
        if(!ok){ alert('Could not delete.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      tdDel.appendChild(delBtn);
      tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    bindUnitLinks(table);
    const scrollWrap = el('div','table-scroll');
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);
  }
  holder.appendChild(card);
}

function exportCsv(all){
  const rows = [['Timestamp','Bus','Driver','Action','Odometer','Failed Checks','Issue Count','Urgent','Notes']];
  all.forEach(s=>{
    const cat = categoryFor(state.buses.find(b=>b.id===s.busId) || {id:s.busId});
    const failCount = s.preTrip ? Object.values(s.preTrip).filter(c=>c.status==='fail').length : 0;
    rows.push([
      s.timestamp, s.busId, s.driver, s.action, (s.mileage!=null ? s.mileage : ''),
      failCount,
      (s.issues||[]).length,
      recordHasUrgent(s, cat) ? 'YES' : 'NO',
      (s.notes||'').replace(/[\r\n]+/g,' ')
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fleet-shift-log.csv'; a.click();
  URL.revokeObjectURL(url);
}

/* ---------- unit detail screen ---------- */
// Everything about one machine on one screen — reached by tapping a unit ID anywhere in
// Admin. Info + status up top, then open issues (resolvable in place), PM schedule with
// one-click mark-done, PM service history, and this unit's shift history.
function renderUnitDetailTab(holder, all){
  const busId = state.admin.detailBusId;
  const bus = busesForCurrentUser().find(b=>b.id===busId);
  const returnTab = state.admin.detailReturnTab || 'overview';

  const backBar = el('div');
  backBar.style.marginBottom = '10px';

  back.onclick = ()=>{ state.admin.tab = returnTab; state.admin.detailBusId = null; render(); };
  backBar.appendChild(back);
  holder.appendChild(backBar);

  if(!bus){
    holder.appendChild(el('div','empty','That unit isn\'t visible to this account (or no longer exists).'));
    return;
  }

  const cat = categoryFor(bus);
  const hasMeter = cat.trackingUnit !== 'none';
  const unit = unitLabel(cat.trackingUnit);
  const shifts = (state.shiftsCache[bus.id] || []).slice().sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  const last = shifts[0] || null;
  const current = hasMeter ? lastMileage(bus.id) : null;
  const hasUrgent = shifts.some(s => recordHasUrgent(s, cat));

  // --- Info card ---
  const info = el('div','card');

  infoHead.innerHTML = `<div><span style="font-family:'Barlow Condensed'; font-size:28px; font-weight:700; color:var(--navy);">${escapeHtml(bus.id)}</span>
      <span style="color:var(--ink-soft); font-size:14px;"> ${escapeHtml(bus.name||'')}</span></div>
    <div>${hasUrgent? '<span class="tag open">Out of service</span>' : '<span class="tag resolved">In service</span>'}</div>`;
  info.appendChild(infoHead);
  const infoBody = el('div','note');
  infoBody.style.marginTop = '8px';
  infoBody.innerHTML = 'Type: <strong>' + escapeHtml(cat.label) + '</strong> · Location: <strong>' + escapeHtml(locationForBus(bus)) + '</strong>' +
    (hasMeter ? ' · Current reading: <strong>' + (current!=null ? current.toLocaleString() + ' ' + unit : 'no readings yet') + '</strong>' : '') +
    ' · Last shift: <strong>' + (last ? escapeHtml(last.driver) + ' · ' + fmtDT(last.timestamp) : 'never') + '</strong>' +

  const qrBtn = document.createElement('button');
  qrBtn.className='btn btn-outline btn-sm'; qrBtn.textContent='Print QR label';
  qrBtn.onclick = ()=> printQrLabels([bus], 'fitall');
  infoBtns.appendChild(qrBtn);
  info.appendChild(infoBtns);
  holder.appendChild(info);

  // --- Open issues ---

  const issuesCard = el('div','card');
  issuesCard.innerHTML = '<div class="section-label">Open issues (' + openItems.length + ')</div>';
  if(!openItems.length){
    issuesCard.appendChild(el('div','note','Nothing open on this unit.'));
  } else {
    openItems.forEach(({shift, item})=>{
      const row = el('div');
      row.style.cssText = 'display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; border:1.5px solid var(--line); border-radius:8px; padding:10px 12px; margin-top:8px;' +

        '<strong>' + escapeHtml(item.label) + '</strong>' + (item.note ? ' — ' + escapeHtml(item.note) : '') +
        '<div style="font-size:11.5px; color:var(--ink-soft); margin-top:3px;">Reported by ' + escapeHtml(shift.driver) + ' · ' + fmtDT(shift.timestamp) +

          pushPmHistory(bus, p, current);

        const ok = await saveBuses();
        if(!ok){ btn.disabled=false; btn.textContent='Mark done'; alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      tdBtn.appendChild(btn);
      tr.appendChild(tdBtn);
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    const sw = el('div','table-scroll'); sw.appendChild(t);
    pmCard.appendChild(sw);
  }
  holder.appendChild(pmCard);

  // --- PM service history ---
  const histCard = el('div','card');
  const hist = (bus.pmHistory || []).slice().reverse();
  histCard.innerHTML = '<div class="section-label">PM service history (' + hist.length + ')</div>';
  if(!hist.length){
    histCard.appendChild(el('div','note','No PM completions recorded yet — every "Mark done" from here on lands in this list.'));
  } else {
    const t = document.createElement('table');
    t.innerHTML = '<thead><tr><th>Done</th><th>Item</th><th>At reading</th><th>By</th></tr></thead>';
    const tb = document.createElement('tbody');
    hist.forEach(h=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${fmtDT(h.at)}</td><td>${escapeHtml(h.label||'—')}</td>

        <td>${escapeHtml(h.by||'—')}</td>`;
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    const sw = el('div','table-scroll'); sw.appendChild(t);
    histCard.appendChild(sw);
  }
  holder.appendChild(histCard);

  // --- Shift history (most recent 50) ---
  const logCard = el('div','card');
  logCard.innerHTML = '<div class="section-label">Shift history' + (shifts.length>50 ? ' (latest 50 of ' + shifts.length + ' — full list on the Shift Log tab)' : ' (' + shifts.length + ')') + '</div>';
  if(!shifts.length){
    logCard.appendChild(el('div','note','No shift logs yet for this unit.'));
  } else {
    const t = document.createElement('table');
    t.innerHTML = '<thead><tr><th>When</th><th>Driver</th><th>Action</th><th>Reading</th><th>Issues</th><th>Notes</th></tr></thead>';
    const tb = document.createElement('tbody');
    shifts.slice(0,50).forEach(s=>{
      const failCount = s.preTrip ? Object.values(s.preTrip).filter(c=>c.status==='fail').length : 0;
      const issueCount = (s.issues && s.issues.length) || 0;
      const urgent = recordHasUrgent(s, cat);
      let issueCell = '—';
      if(s.action==='start' || s.action==='daily'){
        const parts = [];
        if(s.preTrip) parts.push(failCount ? failCount+' failed' : 'All passed');
        if(issueCount) parts.push(issueCount+' issue'+(issueCount===1?'':'s'));
        issueCell = (parts.length ? parts.join(' · ') : '—') + (urgent ? ' ⚠' : '');
      } else if(s.action==='end' && issueCount){
        issueCell = issueCount + (urgent ? ' ⚠' : '');
      }
      const actionTag = s.action==='start' ? '<span class="tag resolved">Start</span>'
        : s.action==='end' ? '<span class="tag open" style="background:#f0e6d0;color:#8a6d1a;">End</span>'
        : '<span class="tag resolved" style="background:#e6e0f0;color:#5a3d99;">Check</span>';
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${fmtDT(s.timestamp)}</td><td>${escapeHtml(s.driver)}</td><td>${actionTag}</td>
        <td class="mono">${s.mileage!=null ? s.mileage.toLocaleString()+' '+unit : '—'}</td>
        <td>${issueCell}</td>
        <td style="max-width:220px;">${escapeHtml(s.notes||'—')}</td>`;
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    const sw = el('div','table-scroll'); sw.appendChild(t);
    logCard.appendChild(sw);
  }
  holder.appendChild(logCard);
}

/* ---------- small dom helpers ---------- */
function el(tag, cls, text){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text!=null) e.textContent = text;
  return e;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- mode toggle ---------- */
document.getElementById('modeToggle').addEventListener('click', (e)=>{
  if(state.qrLocked) return; // driver QR sessions never expose admin
  const btn = e.target.closest('button[data-mode]');
  if(!btn) return;
  document.querySelectorAll('#modeToggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.mode = btn.dataset.mode;
  render();
});

/* ---------- boot ---------- */
async function boot(){
  app.innerHTML = '<div class="wrap"><div class="empty">Loading fleet data...</div></div>';

  if(!supa){
    app.innerHTML = '<div class="wrap"><div class="card"><div class="section-label">Can\'t connect to storage</div>' +
      '<div class="note">The Supabase library didn\'t load, so buses, shift logs, and settings can\'t be read or saved. ' +
      'If you\'re viewing this inside Claude, that\'s expected — Claude\'s sandbox blocks this kind of external request. ' +
      'Open this page from where it\'s actually hosted (e.g. your GitHub Pages URL) and reload.</div></div></div>';
    return;
  }

  await tryRestoreSession();
  await loadBuses();
  await loadCategories();
  await loadDepartments();
  await loadSettings();
  await loadLabelTemplates();
  await loadShiftsBatch(state.buses.map(b=>b.id));

  // hash deep link: #bus=ID (single QR per unit; old #bus=ID&action=start/end links still honored)
  // or #area=LOCATION&cat=TYPEKEY (one shared QR per storage area, e.g. a cart barn — the driver
  // picks the specific unit from a dropdown after scanning instead of scanning a per-unit code)
  const hash = window.location.hash.replace('#','');
  if(hash){
    const params = new URLSearchParams(hash);
    const busId = params.get('bus');
    const legacyAction = params.get('action');
    const areaLoc = params.get('area');
    const bus = state.buses.find(b=>b.id===busId);
    if(busId && bus){
      const mode = checkModeFor(categoryFor(bus));
      state.mode='driver';
      state.driver.busId = busId;
      state.qrLocked = true;
      state.qrLockedBusId = busId;

      if(mode === 'shift'){
        if(legacyAction==='start' || legacyAction==='end'){
          state.driver.action = legacyAction;
          state.driver.screen = 'form';
        } else {
          state.driver.screen = 'action';
        }
      } else {
        formPreTrip = {};
        formIssues = [];
        state.driver.action = 'daily';
        state.driver.screen = 'form';
      }

      const toggle = document.getElementById('modeToggle');
      if(toggle) toggle.style.display = 'none';
      const subtitle = document.querySelector('.brand-text .t2');
      if(subtitle) subtitle.textContent = bus.id + (bus.name ? ' · ' + bus.name : '') + ' · ' + categoryFor(bus).label;
    } else if(areaLoc){
      state.mode='driver';
      state.qrLocked = true;
      state.qrLockedArea = { location: areaLoc, catKey: params.get('cat') || null };
      state.driver.screen = 'areaPick';

      const toggle = document.getElementById('modeToggle');
      if(toggle) toggle.style.display = 'none';
      const subtitle = document.querySelector('.brand-text .t2');
      if(subtitle) subtitle.textContent = areaLoc + ' · Select your unit';
    }
  }
  render();

  // Drain any shift logs parked on this device while offline — now, whenever connectivity
  // returns, and once a minute as a backstop for flaky signal that never fires 'online'.
  flushPendingShifts();
  window.addEventListener('online', ()=>{ flushPendingShifts(); });
  setInterval(()=>{ if(loadPendingShifts().length) flushPendingShifts(); }, 60000);
}
boot();

})();
</script>
