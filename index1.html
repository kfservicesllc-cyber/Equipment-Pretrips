<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Fleet Shift Log — Shanty Creek Resorts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
  :root{
    --navy:#12233f;
    --navy-2:#1c3358;
    --gold:#c9a227;
    --gold-light:#e6c65c;
    --cream:#f7f4ec;
    --paper:#ffffff;
    --ink:#1a1e27;
    --ink-soft:#5b6472;
    --line:#dfd9c7;
    --ok:#3d7a5c;
    --warn:#b8791a;
    --bad:#a3372c;
    --radius:10px;
    --shadow: 0 1px 2px rgba(18,35,63,.06), 0 6px 20px rgba(18,35,63,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; padding:0 4px;}
  .table-scroll table{min-width:100%;}
  h1,h2,h3,.display{font-family:'Barlow Condensed',system-ui,sans-serif; text-transform:uppercase; letter-spacing:.03em;}
  .mono{font-family:'Roboto Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  /* Top bar */
  .topbar{
    background:var(--navy);
    color:var(--cream);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    box-shadow:var(--shadow);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .peak{width:26px;height:26px;flex:none;}
  .brand-text{line-height:1.05;}
  .brand-text .t1{font-family:'Barlow Condensed'; font-weight:700; font-size:19px; letter-spacing:.04em;}
  .brand-text .t2{font-size:10.5px; color:var(--gold-light); letter-spacing:.14em; text-transform:uppercase;}
  .mode-toggle{display:flex; background:rgba(255,255,255,.08); border-radius:999px; padding:3px; gap:2px;}
  .mode-toggle button{
    border:none; background:transparent; color:var(--cream); opacity:.65;
    padding:8px 16px; border-radius:999px; font-size:13px; font-weight:600; letter-spacing:.03em;
  }
  .mode-toggle button.active{background:var(--gold); color:var(--navy); opacity:1;}

  .wrap{max-width:1080px; margin:0 auto; padding:22px 16px 60px;}
  .wrap.narrow{max-width:520px;}

  /* Cards */
  .card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;}
  .card + .card{margin-top:16px;}
  .section-label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin-bottom:10px;}

  /* Driver: bus picker tiles */
  .tile-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;}
  .tile{
    border:1.5px solid var(--line); background:var(--paper); border-radius:var(--radius);
    padding:16px 12px; text-align:left; transition:border-color .15s, transform .1s;
  }
  .tile:active{transform:scale(.98);}
  .tile:hover{border-color:var(--gold);}
  .tile .bus-id{font-family:'Barlow Condensed'; font-size:26px; font-weight:700; color:var(--navy);}
  .tile .bus-name{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .tile .bus-mi{font-size:11px; color:var(--ink-soft); margin-top:8px; font-family:'Roboto Mono';}

  .action-choice{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .action-btn{
    border:2px solid var(--navy); border-radius:var(--radius); padding:22px 14px; background:var(--paper);
    font-family:'Barlow Condensed'; font-size:22px; font-weight:700; color:var(--navy); text-align:center;
  }
  .action-btn.start{border-color:var(--ok); color:var(--ok);}
  .action-btn.end{border-color:var(--bad); color:var(--bad);}
  .action-btn:active{transform:scale(.98);}

  .ticket-head{
    display:flex; align-items:baseline; justify-content:space-between; border-bottom:2px dashed var(--line);
    padding-bottom:12px; margin-bottom:16px;
  }
  .ticket-head .bus-big{font-family:'Barlow Condensed'; font-size:34px; font-weight:700; color:var(--navy); line-height:1;}
  .ticket-head .sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .badge{
    font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; letter-spacing:.04em; text-transform:uppercase;
  }
  .badge.start{background:#e4f2ea; color:var(--ok);}
  .badge.end{background:#f6e6e3; color:var(--bad);}

  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; letter-spacing:.02em;}
  input[type=text], input[type=number], textarea, select{
    width:100%; border:1.5px solid var(--line); border-radius:8px; padding:12px 12px; font-size:16px;
    font-family:inherit; background:var(--paper); color:var(--ink);
  }
  input:focus, textarea:focus, select:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold);}
  .field{margin-bottom:14px;}
  .odo-input{font-family:'Roboto Mono'; font-size:22px; font-weight:700; letter-spacing:.02em;}

  .check-row{
    padding:12px 4px; border-bottom:1px solid var(--line);
  }
  .check-row:last-child{border-bottom:none;}
  .check-row-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .check-row .lbl{font-size:14.5px; font-weight:600;}
  .pf-pair{display:flex; gap:6px; flex:none;}
  .pf-btn{border:1.5px solid var(--line); background:var(--paper); border-radius:6px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
  .pf-btn.pass.on{background:#e4f2ea; border-color:var(--ok); color:var(--ok);}
  .pf-btn.fail.on{background:#fbe3e0; border-color:var(--bad); color:var(--bad);}
  .check-fail-note{margin-top:8px;}
  .check-fail-note textarea{border-color:var(--bad);}

  .issue-row{border:1.5px solid var(--line); border-radius:8px; padding:12px; margin-bottom:10px;}
  .issue-row-top{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .sev-pill{display:flex; gap:6px;}
  .sev-btn{border:1.5px solid var(--line); background:var(--paper); border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; color:var(--ink-soft);}
  .sev-btn.sel-minor.on{background:#fff3d6; border-color:var(--warn); color:var(--warn);}
  .sev-btn.sel-urgent.on{background:#fbe3e0; border-color:var(--bad); color:var(--bad);}
  .remove-issue{margin-left:auto; border:none; background:none; color:var(--ink-soft); font-size:12px; text-decoration:underline;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius:8px; padding:13px 20px; font-weight:700; font-size:14.5px; letter-spacing:.02em;
    text-transform:uppercase;
  }
  .btn-primary{background:var(--navy); color:var(--cream); width:100%;}
  .btn-primary:active{background:var(--navy-2);}
  .btn-gold{background:var(--gold); color:var(--navy); width:100%;}
  .btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--ink); text-transform:none; font-weight:600;}
  .btn-add-issue{width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--ink-soft); padding:12px; border-radius:8px; font-weight:600; font-size:13.5px;}
  .btn-sm{padding:7px 12px; font-size:12px; text-transform:none; border-radius:6px;}
  .btn-link{background:none; border:none; color:var(--navy); font-size:13px; font-weight:600; text-decoration:underline; padding:6px 0;}

  .confirm-wrap{text-align:center; padding:40px 16px;}
  .confirm-check{width:64px; height:64px; border-radius:50%; background:var(--ok); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:32px;}
  .confirm-wrap h2{margin:0 0 6px; font-size:26px;}
  .confirm-id{color:var(--ink-soft); font-size:13px; margin-bottom:24px;}

  /* Admin */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px;}
  .stat{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
  .stat .num{font-family:'Barlow Condensed'; font-size:32px; font-weight:700; color:var(--navy);}
  .stat .lab{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;}
  .stat.alert .num{color:var(--bad);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); border-bottom:2px solid var(--line); padding:8px 10px; white-space:nowrap;}
  td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase;}
  .tag.open{background:#fbe3e0; color:var(--bad);}
  .tag.resolved{background:#e4f2ea; color:var(--ok);}
  .tag.minor{background:#fff3d6; color:var(--warn);}

  .bus-card{display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; padding:16px; border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; background:var(--paper);}
  .bus-card .info{flex:1; min-width:180px;}
  .bus-card .qrs{display:flex; gap:14px; flex-wrap:wrap;}
  .qr-box{text-align:center; font-size:11px; color:var(--ink-soft);}
  .qr-box img{border:1px solid var(--line); border-radius:6px; display:block; margin-bottom:5px;}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
  .toolbar select, .toolbar input{width:auto;}
  .empty{color:var(--ink-soft); font-size:13.5px; text-align:center; padding:30px 10px;}
  .tabs2{display:flex; gap:4px; border-bottom:2px solid var(--line); margin-bottom:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin;}
  .tabs2 button{white-space:nowrap; flex:none;}
  .tabs2 button{background:none; border:none; padding:10px 4px; margin-right:18px; font-weight:600; font-size:13.5px; color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-2px;}
  .tabs2 button.active{color:var(--navy); border-bottom-color:var(--gold);}
  .note{font-size:12px; color:var(--ink-soft); line-height:1.5;}
  .fail-banner{background:#fbe3e0; border:1.5px solid var(--bad); color:var(--bad); border-radius:8px; padding:12px 14px; font-size:13.5px; margin-bottom:14px; font-weight:600;}
  .settings-row{max-width:420px;}
  .flex-between{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  @media (max-width:560px){
    .action-choice{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>

<script>
(function(){

/* ---------- Supabase config ---------- */
const SUPABASE_URL = 'https://kyiqildemlstsrrzkcpy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5aXFpbGRlbWxzdHNycnprY3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTU2MzIsImV4cCI6MjA5ODQ5MTYzMn0.dS9rTqSRghdwIYRQ2JDAxqJGsSucTXv2ldXTV472uw8';
const supa = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ---------- storage helpers (Supabase-backed key/value store) ---------- */
let lastStorageError = null;
async function getJSON(key, fallback){
  if(!supa) return fallback;
  try{
    const { data, error } = await supa.from('kv_store').select('value').eq('key', key).maybeSingle();
    if(error || !data) return fallback;
    return data.value;
  }catch(e){
    console.error('storage get failed', key, e);
    return fallback;
  }
}
async function setJSON(key, val){
  if(!supa){ lastStorageError = 'Supabase library did not load.'; return false; }
  for(let attempt=0; attempt<2; attempt++){
    try{
      const { error } = await supa.from('kv_store').upsert({ key, value: val, updated_at: new Date().toISOString() });
      if(!error){ lastStorageError = null; return true; }
      lastStorageError = error.message || error.code || JSON.stringify(error);
      console.error('storage set failed', key, error);
    }catch(e){
      lastStorageError = (e && e.message) || String(e);
      console.error('storage set failed', key, e);
    }
  }
  return false;
}
function uid(prefix){
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
function fmtDT(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
function qrUrl(dataStr, size){
  return 'https://api.qrserver.com/v1/create-qr-code/?size=' + (size||'170x170') + '&data=' + encodeURIComponent(dataStr);
}
function selfUrlFor(busId, action){
  const base = window.location.href.split('#')[0];
  return base + '#bus=' + encodeURIComponent(busId) + '&action=' + action;
}
function buildFailureEmailBody(bus, driver, mileage, timestamp, failedChecks){
  const cat = categoryFor(bus);
  let body = 'Pre-trip check failure\n\n';
  body += 'Equipment: ' + bus.id + (bus.name ? ' (' + bus.name + ')' : '') + ' — ' + cat.label + '\n';
  body += 'Driver: ' + driver + '\n';
  if(cat.trackingUnit !== 'none' && mileage != null){
    body += (cat.trackingUnit==='hours' ? 'Hour meter: ' : 'Odometer: ') + mileage + ' ' + unitLabel(cat.trackingUnit) + '\n';
  }
  body += 'Time: ' + fmtDT(timestamp) + '\n\n';
  body += 'Failed checks:\n';
  failedChecks.forEach(c => {
    body += '- ' + c.label + (c.note ? ': ' + c.note : ' (no note provided)') + '\n';
  });
  return body;
}
async function sendFailureNotification(bus, driver, mileage, timestamp, failedChecks){
  const cfg = state.settings;
  const cat = categoryFor(bus);
  const subject = 'Pre-trip check failure — ' + bus.id + ' (' + cat.label + ') — ' + driver;
  const body = buildFailureEmailBody(bus, driver, mileage, timestamp, failedChecks);
  const to = (cfg.notifyEmail || '').trim();

  if(!to || !cfg.ejsServiceId || !cfg.ejsTemplateId || !cfg.ejsPublicKey){
    return { ok:false, method:'unconfigured', error:'Notify email and EmailJS Service ID / Template ID / Public Key must all be set in Admin → Settings.' };
  }
  if(!window.emailjs){
    return { ok:false, method:'sdk_missing', error:'The EmailJS library did not load in this browser session.' };
  }
  try{
    await window.emailjs.send(cfg.ejsServiceId, cfg.ejsTemplateId, {
      to_email: to,
      subject: subject,
      message: body,
      bus_id: bus.id,
      bus_name: bus.name || '',
      equipment_type: cat.label,
      driver_name: driver,
      mileage: (mileage != null ? mileage + ' ' + unitLabel(cat.trackingUnit) : 'Not tracked'),
      failed_checks: failedChecks.map(c => c.label + (c.note ? ' — ' + c.note : '')).join('\n'),
      timestamp: fmtDT(timestamp)
    }, { publicKey: cfg.ejsPublicKey });
    return { ok:true, method:'auto' };
  }catch(e){
    console.error('EmailJS send failed', e);
    return { ok:false, method:'send_error', error: (e && (e.text || e.message)) || 'Unknown error' };
  }
}

/* ---------- app state ---------- */
const state = {
  mode: 'driver',
  buses: [],
  categories: [],
  shiftsCache: {}, // busId -> array
  settings: { notifyEmail: '', ejsServiceId: '', ejsTemplateId: '', ejsPublicKey: '' },
  qrLocked: false,
  qrLockedBusId: null,
  driver: { screen: 'pick', busId: null, action: null },
  admin: { tab: 'overview' }
};

const app = document.getElementById('app');

function categoryFor(bus){
  const key = (bus && bus.category) || 'shuttle';
  return state.categories.find(c => c.key === key) || state.categories[0] || defaultCategories()[0];
}
function unitLabel(trackingUnit){
  if(trackingUnit === 'hours') return 'hrs';
  if(trackingUnit === 'none') return '';
  return 'mi';
}
function readingLabel(trackingUnit){
  if(trackingUnit === 'hours') return 'Hour meter reading (hours)';
  if(trackingUnit === 'none') return null;
  return 'Odometer reading (miles)';
}

/* ---------- data access ---------- */
async function loadBuses(){
  state.buses = await getJSON('buses', []);
}
async function saveBuses(){
  return await setJSON('buses', state.buses);
}
async function loadCategories(){
  let cats = await getJSON('categories', null);
  if(!cats || !cats.length){
    cats = defaultCategories();
    await setJSON('categories', cats); // seed once so they're immediately editable in Admin
  }
  state.categories = cats;
}
async function saveCategories(){
  return await setJSON('categories', state.categories);
}
async function loadSettings(){
  state.settings = await getJSON('settings', { notifyEmail: '', ejsServiceId: '', ejsTemplateId: '', ejsPublicKey: '' });
}
async function saveSettings(){
  return await setJSON('settings', state.settings);
}
async function loadShifts(busId){
  if(!state.shiftsCache[busId]){
    state.shiftsCache[busId] = await getJSON('shifts:' + busId, []);
  }
  return state.shiftsCache[busId];
}
async function saveShifts(busId, arr){
  state.shiftsCache[busId] = arr;
  return await setJSON('shifts:' + busId, arr);
}
async function loadAllShifts(){
  const all = [];
  for(const b of state.buses){
    const arr = await loadShifts(b.id);
    arr.forEach(s => all.push(s));
  }
  all.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  return all;
}
function lastMileage(busId){
  const arr = state.shiftsCache[busId] || [];
  if(!arr.length) return null;
  const sorted = [...arr].sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  return sorted[0].mileage;
}

/* ---------- render root ---------- */
function render(){
  app.innerHTML = '';
  if(state.mode === 'driver') renderDriver();
  else renderAdmin();
}

/* ================= DRIVER MODE ================= */
function renderDriver(){
  const wrap = el('div', 'wrap narrow');
  app.appendChild(wrap);

  if(state.qrLocked && state.driver.screen === 'pick'){
    state.driver.busId = state.qrLockedBusId;
    state.driver.screen = 'action';
  }

  if(state.driver.screen === 'pick'){
    renderBusPicker(wrap);
  } else if(state.driver.screen === 'action'){
    renderActionPicker(wrap);
  } else if(state.driver.screen === 'form'){
    renderShiftForm(wrap);
  } else if(state.driver.screen === 'confirm'){
    renderConfirm(wrap);
  }
}

function renderBusPicker(wrap){
  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Select your equipment</div>';
  if(!state.buses.length){
    card.appendChild(el('div','empty','No equipment set up yet. Ask your manager to add units in Admin → Equipment.'));
  } else {
    const grid = el('div','tile-grid');
    state.buses.forEach(b => {
      const cat = categoryFor(b);
      const t = document.createElement('button');
      t.className = 'tile';
      const mi = lastMileage(b.id);
      t.innerHTML = `<div class="bus-id">${escapeHtml(b.id)}</div><div class="bus-name">${escapeHtml(b.name||'')}</div><div class="bus-name" style="opacity:.8;">${escapeHtml(cat.label)}</div>` +
        (mi!=null ? `<div class="bus-mi">${mi.toLocaleString()} ${unitLabel(cat.trackingUnit)}</div>` : '<div class="bus-mi">no readings yet</div>');
      t.onclick = () => { formPreTrip = {}; state.driver.busId = b.id; state.driver.screen='action'; render(); };
      grid.appendChild(t);
    });
    card.appendChild(grid);
  }
  wrap.appendChild(card);
}

function renderActionPicker(wrap){
  const bus = state.buses.find(b=>b.id===state.driver.busId);
  const card = el('div','card');
  card.innerHTML = `<div class="section-label">${escapeHtml(bus.id)} — ${escapeHtml(bus.name||'')}</div>`;
  const choice = el('div','action-choice');
  const startBtn = document.createElement('button');
  startBtn.className='action-btn start'; startBtn.textContent='Start of Shift';
  startBtn.onclick = () => { formPreTrip = {}; state.driver.action='start'; state.driver.screen='form'; render(); };
  const endBtn = document.createElement('button');
  endBtn.className='action-btn end'; endBtn.textContent='End of Shift';
  endBtn.onclick = () => { state.driver.action='end'; state.driver.screen='form'; render(); };
  choice.appendChild(startBtn); choice.appendChild(endBtn);
  card.appendChild(choice);
  wrap.appendChild(card);
  if(!state.qrLocked){
    const back = el('button','btn-link','← Choose a different bus');
    back.onclick = () => { state.driver.screen='pick'; state.driver.busId=null; render(); };
    wrap.appendChild(back);
  }
}

let formIssues = []; // transient issue rows while building end-of-shift form
let formPreTrip = {};
function makeEmptyPreTrip(checklist){
  const o = {};
  (checklist || []).forEach(c => o[c.key] = {status:null, note:''});
  return o;
}

function renderShiftForm(wrap){
  const bus = state.buses.find(b=>b.id===state.driver.busId);
  const action = state.driver.action;
  const cat = categoryFor(bus);
  const lastMi = lastMileage(bus.id);
  const unit = unitLabel(cat.trackingUnit);

  if(action === 'start' && Object.keys(formPreTrip).length === 0){
    formPreTrip = makeEmptyPreTrip(cat.checklist);
  }

  const card = el('div','card');
  const head = el('div','ticket-head');
  head.innerHTML = `<div><div class="bus-big">${escapeHtml(bus.id)}</div><div class="sub">${escapeHtml(bus.name||'')} · ${escapeHtml(cat.label)}</div></div>`;
  const badge = el('span', 'badge ' + action, action==='start' ? 'Start of Shift' : 'End of Shift');
  head.appendChild(badge);
  card.appendChild(head);

  const form = el('div');

  // Driver name
  const fName = el('div','field');
  fName.innerHTML = '<label>Driver name</label>';
  const nameInput = document.createElement('input');
  nameInput.type='text'; nameInput.placeholder='Full name'; nameInput.id='drv-name';
  fName.appendChild(nameInput);
  form.appendChild(fName);

  // Odometer / hour meter (skipped for equipment with no meter, e.g. trailers)
  if(cat.trackingUnit !== 'none'){
    const fOdo = el('div','field');
    fOdo.innerHTML = '<label>' + readingLabel(cat.trackingUnit) + '</label>';
    const odoInput = document.createElement('input');
    odoInput.type='number'; odoInput.inputMode='numeric'; odoInput.className='odo-input';
    odoInput.placeholder = lastMi!=null ? 'last: ' + lastMi.toLocaleString() : (cat.trackingUnit==='hours' ? 'e.g. 1420' : 'e.g. 48213');
    odoInput.id='drv-odo';
    fOdo.appendChild(odoInput);
    if(lastMi!=null) fOdo.appendChild(el('div','note','Last recorded: ' + lastMi.toLocaleString() + ' ' + unit));
    form.appendChild(fOdo);
  }

  if(action === 'start'){
    form.appendChild(el('div','section-label','Pre-trip check — mark each Pass or Fail'));
    const box = el('div','card');
    box.style.padding='4px 12px'; box.style.boxShadow='none'; box.style.marginBottom='14px';
    const checksWrap = el('div'); checksWrap.id='checksWrap';
    renderCheckRows(checksWrap, cat.checklist);
    box.appendChild(checksWrap);
    form.appendChild(box);
    const fNote = el('div','field');
    fNote.innerHTML = '<label>Notes (optional)</label>';
    const ta = document.createElement('textarea'); ta.rows=2; ta.id='drv-notes'; ta.placeholder='Anything to flag before heading out...';
    fNote.appendChild(ta);
    form.appendChild(fNote);
  } else {
    form.appendChild(el('div','section-label','Mechanical issues this shift'));
    const issuesWrap = el('div'); issuesWrap.id='issuesWrap';
    renderIssueRows(issuesWrap);
    form.appendChild(issuesWrap);
    const addBtn = document.createElement('button');
    addBtn.className='btn-add-issue'; addBtn.textContent='+ Report an issue';
    addBtn.onclick = ()=>{ formIssues.push({id:uid('is'), category:ISSUE_CATEGORIES[0], severity:'minor', note:''}); renderIssueRows(issuesWrap); };
    form.appendChild(addBtn);

    const fNote = el('div','field'); fNote.style.marginTop='14px';
    fNote.innerHTML = '<label>General end-of-shift notes (optional)</label>';
    const ta = document.createElement('textarea'); ta.rows=2; ta.id='drv-notes'; ta.placeholder='Anything else worth noting...';
    fNote.appendChild(ta);
    form.appendChild(fNote);
  }

  card.appendChild(form);

  const submitBtn = document.createElement('button');
  submitBtn.className='btn btn-primary'; submitBtn.style.marginTop='6px';
  submitBtn.textContent = action==='start' ? 'Submit — Start Shift' : 'Submit — End Shift';
  submitBtn.onclick = () => submitShift(bus, action, submitBtn);
  card.appendChild(submitBtn);

  wrap.appendChild(card);
  const back = el('button','btn-link','← Back');
  back.onclick = () => { state.driver.screen='action'; formIssues=[]; formPreTrip={}; render(); };
  wrap.appendChild(back);
}

function renderCheckRows(container, checklist){
  container.innerHTML='';
  checklist.forEach(item => {
    const state_ = formPreTrip[item.key];
    const row = el('div','check-row');
    const top = el('div','check-row-top');
    top.appendChild(el('div','lbl',item.label));
    const pair = el('div','pf-pair');
    const passBtn = el('button','pf-btn pass'+(state_.status==='pass'?' on':''),'Pass');
    const failBtn = el('button','pf-btn fail'+(state_.status==='fail'?' on':''),'Fail');
    passBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].status='pass'; renderCheckRows(container, checklist); };
    failBtn.onclick = (e)=>{ e.preventDefault(); formPreTrip[item.key].status='fail'; renderCheckRows(container, checklist); };
    pair.appendChild(passBtn); pair.appendChild(failBtn);
    top.appendChild(pair);
    row.appendChild(top);
    if(state_.status === 'fail'){
      const noteWrap = el('div','check-fail-note');
      const ta = document.createElement('textarea');
      ta.rows=2; ta.placeholder='What\'s wrong with ' + item.label.toLowerCase() + '?'; ta.value = state_.note;
      ta.oninput = ()=> formPreTrip[item.key].note = ta.value;
      noteWrap.appendChild(ta);
      row.appendChild(noteWrap);
    }
    container.appendChild(row);
  });
}

function renderIssueRows(container){
  container.innerHTML='';
  if(!formIssues.length){
    container.appendChild(el('div','note','No issues reported. If everything ran fine, leave this empty.'));
    return;
  }
  formIssues.forEach((iss, idx) => {
    const row = el('div','issue-row');
    const top = el('div','issue-row-top');
    const sel = document.createElement('select');
    ISSUE_CATEGORIES.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; if(c===iss.category)o.selected=true; sel.appendChild(o); });
    sel.onchange = ()=> iss.category = sel.value;
    top.appendChild(sel);
    const sevWrap = el('div','sev-pill');
    const minorBtn = el('button','sev-btn sel-minor'+(iss.severity==='minor'?' on':''),'Minor');
    const urgentBtn = el('button','sev-btn sel-urgent'+(iss.severity==='urgent'?' on':''),'Urgent · Out of service');
    minorBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='minor'; renderIssueRows(container); };
    urgentBtn.onclick = (e)=>{ e.preventDefault(); iss.severity='urgent'; renderIssueRows(container); };
    sevWrap.appendChild(minorBtn); sevWrap.appendChild(urgentBtn);
    top.appendChild(sevWrap);
    const rm = el('button','remove-issue','Remove');
    rm.onclick = (e)=>{ e.preventDefault(); formIssues.splice(idx,1); renderIssueRows(container); };
    top.appendChild(rm);
    row.appendChild(top);
    const ta = document.createElement('textarea');
    ta.rows=2; ta.placeholder='Describe the issue...'; ta.value=iss.note;
    ta.oninput = ()=> iss.note = ta.value;
    row.appendChild(ta);
    container.appendChild(row);
  });
}

async function submitShift(bus, action, btn){
  const cat = categoryFor(bus);
  const name = document.getElementById('drv-name').value.trim();
  const odoEl = document.getElementById('drv-odo');
  const notesEl = document.getElementById('drv-notes');
  const notes = notesEl ? notesEl.value.trim() : '';

  if(!name){ alert('Please enter the driver name.'); return; }

  let mileage = null;
  if(cat.trackingUnit !== 'none'){
    const odoVal = odoEl ? odoEl.value : '';
    if(!odoVal){ alert('Please enter the ' + (cat.trackingUnit==='hours' ? 'hour meter reading.' : 'odometer reading.')); return; }
    mileage = Number(odoVal);
    if(Number.isNaN(mileage) || mileage < 0){ alert('That reading looks invalid.'); return; }
  }

  let failedChecks = [];
  if(action === 'start'){
    const unanswered = cat.checklist.filter(c => !formPreTrip[c.key] || !formPreTrip[c.key].status);
    if(unanswered.length){ alert('Please mark every check as Pass or Fail before submitting.'); return; }
    failedChecks = cat.checklist.filter(c => formPreTrip[c.key].status==='fail').map(c => ({label:c.label, note:formPreTrip[c.key].note}));
  }

  btn.disabled = true; btn.textContent = 'Saving...';

  const record = {
    id: uid('shift'),
    busId: bus.id,
    busName: bus.name || '',
    action, driver: name, mileage,
    timestamp: new Date().toISOString(),
    notes,
    preTrip: action==='start' ? JSON.parse(JSON.stringify(formPreTrip)) : undefined,
    issues: action==='end' ? formIssues.map(i=>({category:i.category, severity:i.severity, note:i.note})) : [],
    issuesResolved: false
  };

  let ok = false;
  try{
    const arr = await loadShifts(bus.id);
    arr.push(record);
    ok = await saveShifts(bus.id, arr);
  }catch(e){
    console.error('shift save failed', e);
    ok = false;
  }

  if(!ok){
    alert('Could not save.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ' Check your connection and try again.'));
    btn.disabled = false;
    btn.textContent = 'Retry submit';
    return;
  }

  btn.textContent = 'Successfully submitted!';

  let emailResult = null;
  if(failedChecks.length){
    emailResult = await sendFailureNotification(bus, name, mileage, record.timestamp, failedChecks);
  }

  state.driver.lastRecord = record;
  state.driver.failedChecks = failedChecks;
  state.driver.emailResult = emailResult;
  setTimeout(()=>{
    state.driver.screen = 'confirm';
    formIssues = []; formPreTrip = makeEmptyPreTrip();
    render();
  }, 500);
}

function renderConfirm(wrap){
  const rec = state.driver.lastRecord;
  const failedChecks = state.driver.failedChecks || [];
  const card = el('div','card confirm-wrap');
  const check = el('div','confirm-check','✓');
  card.appendChild(check);
  const h = document.createElement('h2'); h.textContent = 'Successfully submitted';
  card.appendChild(h);
  const recBus = state.buses.find(b=>b.id===rec.busId) || {id:rec.busId, name:rec.busName};
  const recUnit = unitLabel(categoryFor(recBus).trackingUnit);
  const recReading = rec.mileage!=null ? (rec.mileage.toLocaleString() + ' ' + recUnit + ' · ') : '';
  card.appendChild(el('div','confirm-id', bus_(rec.busId) + ' · ' + recReading + fmtDT(rec.timestamp)));

  if(failedChecks.length){
    const banner = el('div','fail-banner');
    banner.style.textAlign='left';
    banner.innerHTML = '⚠ ' + failedChecks.length + ' pre-trip check(s) failed: ' + failedChecks.map(c=>escapeHtml(c.label)).join(', ');
    card.appendChild(banner);

    const result = state.driver.emailResult;
    const bus = state.buses.find(b=>b.id===rec.busId) || {id:rec.busId, name:rec.busName};
    const statusLine = el('div','note'); statusLine.style.marginBottom='10px';
    const resendBtn = document.createElement('button');
    resendBtn.className='btn btn-outline';

    if(result && result.ok){
      statusLine.style.color = 'var(--ok)';
      statusLine.textContent = '✓ Notification emailed automatically to ' + escapeHtml(state.settings.notifyEmail) + '.';
      resendBtn.textContent = 'Resend notification';
    } else if(result && result.method==='unconfigured'){
      statusLine.style.color = 'var(--bad)';
      statusLine.textContent = 'No notification sent — set up the notify email and EmailJS keys in Admin → Settings.';
      resendBtn.style.display = 'none';
    } else {
      statusLine.style.color = 'var(--bad)';
      statusLine.textContent = '✗ Notification failed to send: ' + escapeHtml((result && result.error) || 'unknown error') + '. This is still recorded in the shift log either way.';
      resendBtn.textContent = 'Retry sending';
    }
    card.appendChild(statusLine);

    if(resendBtn.style.display !== 'none'){
      resendBtn.onclick = async ()=>{
        resendBtn.disabled = true; resendBtn.textContent = 'Sending...';
        const r = await sendFailureNotification(bus, rec.driver, rec.mileage, rec.timestamp, failedChecks);
        state.driver.emailResult = r;
        renderDriver();
      };
      card.appendChild(resendBtn);
    }
  }

  if(rec.action==='end' && rec.issues.length){
    const urgent = rec.issues.some(i=>i.severity==='urgent');
    card.appendChild(el('div','note', (urgent? '⚠ Urgent issue flagged — ' : '') + rec.issues.length + ' issue(s) sent to the manager dashboard.'));
  }
  const newBtn = document.createElement('button');
  newBtn.className='btn btn-gold'; newBtn.style.marginTop='18px'; newBtn.textContent='Log another shift';
  newBtn.onclick = ()=>{
    state.driver.failedChecks=[];
    if(state.qrLocked){
      state.driver.busId = state.qrLockedBusId;
      state.driver.action = null;
      state.driver.screen = 'action';
    } else {
      state.driver.screen='pick'; state.driver.busId=null; state.driver.action=null;
      window.location.hash='';
    }
    render();
  };
  card.appendChild(newBtn);
  wrap.appendChild(card);
}
function bus_(id){ const b = state.buses.find(x=>x.id===id); return b ? b.id + (b.name? ' · '+b.name : '') : id; }

function renderAdmin(){
  const wrap = el('div','wrap');
  app.appendChild(wrap);

  const tabs = el('div','tabs2');
  [['overview','Overview'],['buses','Equipment & QR Codes'],['types','Equipment Types'],['issues','Mechanical Issues'],['log','Shift Log'],['settings','Settings']].forEach(([key,label])=>{
    const b = document.createElement('button');

  wrap.appendChild(holder);

async function renderAdminTab(holder){
  const all = await loadAllShifts();
  holder.innerHTML='';
  if(state.admin.tab==='overview') renderOverview(holder, all);
  else if(state.admin.tab==='buses') renderBusesTab(holder);
  else if(state.admin.tab==='types') renderEquipmentTypesTab(holder);
  else if(state.admin.tab==='issues') renderIssuesTab(holder, all);
  else if(state.admin.tab==='log') renderLogTab(holder, all);
  else if(state.admin.tab==='settings') renderSettingsTab(holder);
}

  const intro = el('div','note');
  intro.style.marginBottom='14px';
  intro.textContent = 'When a driver marks a pre-trip check Fail, the app sends this email itself, automatically, in the background — no phone mail app involved.';

  emailInput.type='text'; emailInput.placeholder='manager@shantycreek.com'; emailInput.value = state.settings.notifyEmail || '';
  emailField.appendChild(emailInput);
  card.appendChild(emailField);

  const setup = el('div','card');
  setup.style.cssText='background:var(--cream); box-shadow:none; border-style:dashed;';
  setup.innerHTML = `<div class="section-label">EmailJS setup (one-time, ~5 minutes)</div>
    <div class="note" style="margin-bottom:12px;">
      1. Create a free account at emailjs.com and connect the mailbox you want emails to send from.<br>

      4. Under Account → General, copy your <strong>Public Key</strong>.<br>
      5. Paste all three below, save, then use "Send test email" to confirm it actually goes through.
    </div>`;
  const grid = el('div');
  grid.style.cssText='display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:640px;';
  function cfgField(labelText, key, placeholder){
    const f = el('div','field'); f.style.marginBottom='0';
    f.innerHTML = `<label>${labelText}</label>`;
    const inp = document.createElement('input');
    inp.type='text'; inp.placeholder=placeholder; inp.value = state.settings[key] || ''; inp.dataset.cfgKey = key;
    f.appendChild(inp);
    return f;
  }
  grid.appendChild(cfgField('Service ID','ejsServiceId','service_xxxxxxx'));
  grid.appendChild(cfgField('Template ID','ejsTemplateId','template_xxxxxxx'));
  const pkField = cfgField('Public Key','ejsPublicKey','xxxxxxxxxxxxxxxxx');
  pkField.style.gridColumn='1 / -1';
  grid.appendChild(pkField);
  setup.appendChild(grid);
  card.appendChild(setup);

  const statusMsg = el('div','note'); statusMsg.id='ejs-test-status'; statusMsg.style.margin='12px 2px 0';
  card.appendChild(statusMsg);

  const btnRow = el('div');
  btnRow.style.cssText='display:flex; gap:10px; margin-top:12px; align-items:center; flex-wrap:wrap;';
  const saveBtn = document.createElement('button');
  saveBtn.className='btn btn-primary'; saveBtn.style.width='auto'; saveBtn.style.padding='12px 20px';

    state.settings.notifyEmail = emailInput.value.trim();
    card.querySelectorAll('[data-cfg-key]').forEach(inp => { state.settings[inp.dataset.cfgKey] = inp.value.trim(); });
  }
  saveBtn.onclick = async ()=>{
    collectFields();
    saveBtn.textContent='Saving...';
    const ok = await saveSettings();
    if(ok){
      saveBtn.textContent='Saved';
      statusMsg.style.color='var(--ok)';
      statusMsg.textContent = '';
    } else {
      saveBtn.textContent='Save failed';
      statusMsg.style.color='var(--bad)';
      statusMsg.textContent = '✗ Could not write to the database — check your Supabase table/policies (see console for details), then try again.';
    }
    setTimeout(()=>{ saveBtn.textContent='Save'; }, 1800);
  };
  btnRow.appendChild(saveBtn);

  const testBtn = document.createElement('button');
  testBtn.className='btn btn-outline'; testBtn.textContent='Send test email';
  testBtn.onclick = async ()=>{
    collectFields();
    const savedOk = await saveSettings();
    testBtn.disabled = true; testBtn.textContent = 'Sending...';

      testBtn.disabled = false; testBtn.textContent = 'Send test email';

    }
  };
  btnRow.appendChild(testBtn);
  card.appendChild(btnRow);
  holder.appendChild(card);
}

function renderOverview(holder, all){
  const openIssues = [];
  all.forEach(s=> (s.issues||[]).forEach((iss,idx)=>{ if(!s.issuesResolved) openIssues.push({rec:s, iss}); }));
  const urgentCount = openIssues.filter(o=>o.iss.severity==='urgent').length;

  const stats = el('div','stat-grid');
  stats.appendChild(statCard(state.buses.length,'Equipment tracked'));
  stats.appendChild(statCard(all.length,'Shift logs total'));
  const oi = statCard(openIssues.length,'Open issues'); if(openIssues.length) oi.classList.add(urgentCount?'alert':'');
  stats.appendChild(oi);
  const ui = statCard(urgentCount,'Urgent · out of service'); if(urgentCount) ui.classList.add('alert');
  stats.appendChild(ui);
  holder.appendChild(stats);

  const card = el('div','card');
  card.innerHTML = '<div class="section-label">Current status by equipment</div>';
  if(!state.buses.length){
    card.appendChild(el('div','empty','No equipment added yet — go to "Equipment & QR Codes" to add your fleet.'));
  } else {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Last reading</th><th>Last shift</th><th>Status</th></tr></thead>';
    const tbody = document.createElement('tbody');
    state.buses.forEach(b=>{
      const arr = state.shiftsCache[b.id] || [];
      const sorted = [...arr].sort((a,x)=> new Date(x.timestamp)-new Date(a.timestamp));
      const last = sorted[0];
      const hasUrgent = arr.some(s => !s.issuesResolved && (s.issues||[]).some(i=>i.severity==='urgent'));
      const cat = categoryFor(b);
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><strong>${escapeHtml(b.id)}</strong></td><td>${escapeHtml(b.name||'—')}</td><td>${escapeHtml(cat.label)}</td>` +
        `<td class="mono">${last && last.mileage!=null ? last.mileage.toLocaleString()+' '+unitLabel(cat.trackingUnit) : '—'}</td>` +
        `<td>${last? escapeHtml(last.driver)+' · '+fmtDT(last.timestamp) : '—'}</td>` +
        `<td>${hasUrgent? '<span class="tag open">Out of service</span>' : '<span class="tag resolved">In service</span>'}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    const scrollWrap = el('div','table-scroll');
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);
  }
  holder.appendChild(card);
}
function statCard(num,label){
  const s = el('div','stat');
  s.innerHTML = `<div class="num">${num}</div><div class="lab">${label}</div>`;
  return s;
}

function renderBusesTab(holder){
  const addCard = el('div','card');
  addCard.innerHTML = '<div class="section-label">Add equipment</div>';
  const row = el('div');
  row.style.display='flex'; row.style.gap='10px'; row.style.flexWrap='wrap'; row.style.alignItems='flex-end';
  row.innerHTML = `
    <div class="field" style="min-width:100px; margin-bottom:0;"><label>ID</label><input type="text" id="new-bus-id" placeholder="e.g. SH-3"></div>
    <div class="field" style="flex:1; min-width:160px; margin-bottom:0;"><label>Name</label><input type="text" id="new-bus-name" placeholder="e.g. Cedar River shuttle"></div>
  `;
  const catField = el('div','field'); catField.style.minWidth='170px'; catField.style.marginBottom='0';
  catField.innerHTML = '<label>Type</label>';
  const catSelect = document.createElement('select'); catSelect.id='new-bus-cat';
  state.categories.forEach(c => { const o=document.createElement('option'); o.value=c.key; o.textContent=c.label; catSelect.appendChild(o); });
  catField.appendChild(catSelect);
  row.appendChild(catField);
  const addBtn = document.createElement('button');
  addBtn.className='btn btn-primary'; addBtn.style.width='auto'; addBtn.style.padding='12px 20px'; addBtn.textContent='Add equipment';
  addBtn.onclick = async ()=>{
    const idInput = document.getElementById('new-bus-id');
    const nameInput = document.getElementById('new-bus-name');
    const id = idInput.value.trim();
    if(!id){ alert('Enter an ID.'); return; }
    if(state.buses.some(b=>b.id===id)){ alert('That ID already exists.'); return; }
    addBtn.disabled = true; addBtn.textContent = 'Saving...';
    state.buses.push({id, name: nameInput.value.trim(), category: catSelect.value});
    const ok = await saveBuses();
    if(!ok){
      state.buses = state.buses.filter(b=>b.id!==id); // roll back, it didn't actually persist
      addBtn.disabled = false; addBtn.textContent = 'Add equipment';
      alert('Could not save this unit.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ''));
      return;
    }
    renderAdminTab(holder);
  };
  row.appendChild(addBtn);
  addCard.appendChild(row);
  if(!state.categories.length){
    addCard.appendChild(el('div','note','No equipment types yet — set some up in Admin → Equipment Types first.'));
  }
  holder.appendChild(addCard);

  if(!state.buses.length){
    holder.appendChild(el('div','empty','No equipment yet — add your first unit above.'));
    return;
  }

  const toolbar = el('div','toolbar');
  const filterSel = document.createElement('select');
  filterSel.innerHTML = '<option value="all">All types</option>' + state.categories.map(c=>`<option value="${escapeHtml(c.key)}">${escapeHtml(c.label)}</option>`).join('');
  filterSel.value = state.admin.busTypeFilter || 'all';
  filterSel.onchange = ()=>{ state.admin.busTypeFilter = filterSel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Filter: '));
  toolbar.appendChild(filterSel);
  holder.appendChild(toolbar);

  const note = el('div','note');
  note.style.margin = '10px 2px 14px';
  note.textContent = 'Print each QR code and post it on the equipment. Scanning it opens this app straight into that unit\'s start or end-of-shift form. Note: for QR codes to work from drivers\' phones, this page needs a permanent link — publish this artifact (Share) or host the file, then reload this tab so the QR codes point to that address.';
  holder.appendChild(note);

  const filterVal = state.admin.busTypeFilter || 'all';
  const visibleBuses = filterVal==='all' ? state.buses : state.buses.filter(b => (b.category||'shuttle')===filterVal);

  visibleBuses.forEach(b=>{
    const cat = categoryFor(b);
    const card = el('div','bus-card');
    const info = el('div','info');
    info.innerHTML = `<div class="bus-id" style="font-family:'Barlow Condensed'; font-size:22px; font-weight:700; color:var(--navy);">${escapeHtml(b.id)}</div>
      <div class="bus-name" style="color:var(--ink-soft);">${escapeHtml(b.name||'')}</div>
      <div class="bus-name" style="color:var(--ink-soft); margin-bottom:10px; font-size:11.5px; text-transform:uppercase; letter-spacing:.05em;">${escapeHtml(cat.label)}</div>`;
    const rm = document.createElement('button');
    rm.className='btn btn-outline btn-sm'; rm.textContent='Remove';
    rm.onclick = async ()=>{
      if(!confirm('Remove ' + b.id + '? Its shift history stays in storage but will no longer show in the picker.')) return;
      const prevBuses = state.buses;
      state.buses = state.buses.filter(x=>x.id!==b.id);
      const ok = await saveBuses();
      if(!ok){
        state.buses = prevBuses;
        alert('Could not save this change.' + (lastStorageError ? '\n\nDetails: ' + lastStorageError : ''));
        return;
      }
      renderAdminTab(holder);
    };
    info.appendChild(rm);
    card.appendChild(info);

    const qrs = el('div','qrs');
    [['start','Start of Shift'],['end','End of Shift']].forEach(([action,label])=>{
      const box = el('div','qr-box');
      const img = document.createElement('img');
      img.src = qrUrl(selfUrlFor(b.id, action));
      img.width=140; img.height=140; img.alt=label+' QR';
      box.appendChild(img);
      box.appendChild(document.createTextNode(label));
      qrs.appendChild(box);
    });
    card.appendChild(qrs);
    holder.appendChild(card);
  });
}

function renderEquipmentTypesTab(holder){
  const intro = el('div','note');
  intro.style.margin = '2px 2px 14px';
  intro.textContent = 'Each equipment type has its own pre-trip checklist and its own tracking unit (miles or hours). Add a new type for anything not listed yet — turf mowers, sprayers, groomers, UTVs, trucks, whatever you run.';
  holder.appendChild(intro);

  state.categories.forEach((cat, catIdx) => {
    const card = el('div','card');
    const head = el('div','flex-between');
    const titleWrap = el('div');
    const nameInput = document.createElement('input');
    nameInput.type='text'; nameInput.value=cat.label;
    nameInput.style.cssText = "font-family:'Barlow Condensed'; font-size:20px; font-weight:700; color:var(--navy); border:none; background:transparent; padding:2px 0; width:220px;";
    nameInput.oninput = ()=> cat.label = nameInput.value;
    titleWrap.appendChild(nameInput);
    head.appendChild(titleWrap);

    const rightSide = el('div');
    rightSide.style.cssText = 'display:flex; gap:8px; align-items:center;';
    const unitSel = document.createElement('select');
    unitSel.innerHTML = '<option value="miles">Tracks miles</option><option value="hours">Tracks hours</option><option value="none">Not tracked (e.g. trailers)</option>';
    unitSel.value = cat.trackingUnit;
    unitSel.onchange = ()=> cat.trackingUnit = unitSel.value;
    rightSide.appendChild(unitSel);
    const delBtn = document.createElement('button');
    delBtn.className='btn btn-outline btn-sm'; delBtn.textContent='Delete type';
    delBtn.onclick = async ()=>{
      const inUse = state.buses.some(b => (b.category||'shuttle')===cat.key);
      if(inUse && !confirm('Some equipment is currently set to "' + cat.label + '". Deleting the type won\'t delete that equipment, but it will fall back to the first available type. Continue?')) return;
      if(!inUse && !confirm('Delete "' + cat.label + '"?')) return;
      state.categories = state.categories.filter(c=>c.key!==cat.key);
      const ok = await saveCategories();
      if(!ok){ alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
      renderAdminTab(holder);
    };
    rightSide.appendChild(delBtn);
    head.appendChild(rightSide);
    card.appendChild(head);

    card.appendChild(el('div','section-label','Pre-trip checklist items'));
    const itemsWrap = el('div');
    cat.checklist.forEach((item, itemIdx) => {
      const row = el('div');
      row.style.cssText = 'display:flex; gap:8px; align-items:center; margin-bottom:8px;';
      const itemInput = document.createElement('input');
      itemInput.type='text'; itemInput.value=item.label; itemInput.style.flex='1';
      itemInput.oninput = ()=> item.label = itemInput.value;
      row.appendChild(itemInput);
      const rmItemBtn = document.createElement('button');
      rmItemBtn.className='btn btn-outline btn-sm'; rmItemBtn.textContent='Remove';
      rmItemBtn.onclick = ()=>{ cat.checklist.splice(itemIdx,1); renderAdminTab(holder); };
      row.appendChild(rmItemBtn);
      itemsWrap.appendChild(row);
    });
    card.appendChild(itemsWrap);
    const addItemBtn = document.createElement('button');
    addItemBtn.className='btn-add-issue'; addItemBtn.textContent='+ Add checklist item';
    addItemBtn.onclick = ()=>{ cat.checklist.push({key: uid('chk'), label:'New check'}); renderAdminTab(holder); };
    card.appendChild(addItemBtn);

    const saveRow = el('div'); saveRow.style.marginTop='14px';
    const saveBtn = document.createElement('button');
    saveBtn.className='btn btn-primary'; saveBtn.style.width='auto'; saveBtn.style.padding='11px 18px'; saveBtn.textContent='Save changes';
    saveBtn.onclick = async ()=>{
      saveBtn.textContent='Saving...';
      const ok = await saveCategories();
      saveBtn.textContent = ok ? 'Saved' : 'Save failed';
      if(!ok) alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
      setTimeout(()=>{ saveBtn.textContent='Save changes'; }, 1500);
    };
    saveRow.appendChild(saveBtn);
    card.appendChild(saveRow);

    holder.appendChild(card);
  });

  const addCatCard = el('div','card');
  addCatCard.style.cssText = 'border-style:dashed; background:var(--cream); box-shadow:none;';
  addCatCard.innerHTML = '<div class="section-label">Add a new equipment type</div>';
  const addRow = el('div');
  addRow.style.cssText = 'display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;';
  addRow.innerHTML = `
    <div class="field" style="flex:1; min-width:180px; margin-bottom:0;"><label>Type name</label><input type="text" id="new-cat-label" placeholder="e.g. Utility Cart"></div>
  `;
  const trackField = el('div','field'); trackField.style.minWidth='150px'; trackField.style.marginBottom='0';
  trackField.innerHTML = '<label>Tracking</label>';
  const trackSel = document.createElement('select'); trackSel.id='new-cat-track';
  trackSel.innerHTML = '<option value="hours">Hours</option><option value="miles">Miles</option><option value="none">Not tracked</option>';
  trackField.appendChild(trackSel);
  addRow.appendChild(trackField);
  const addCatBtn = document.createElement('button');
  addCatBtn.className='btn btn-primary'; addCatBtn.style.width='auto'; addCatBtn.style.padding='12px 20px'; addCatBtn.textContent='Add type';
  addCatBtn.onclick = async ()=>{
    const labelInput = document.getElementById('new-cat-label');
    const label = labelInput.value.trim();
    if(!label){ alert('Enter a name for the type.'); return; }
    const key = uid('cat');
    state.categories.push({ key, label, trackingUnit: trackSel.value, checklist: [
      {key:'fluids', label:'Fluid levels'},
      {key:'general', label:'General condition'}
    ]});
    const ok = await saveCategories();
    if(!ok){
      state.categories.pop();
      alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
      return;
    }
    renderAdminTab(holder);
  };
  addRow.appendChild(addCatBtn);
  addCatCard.appendChild(addRow);
  holder.appendChild(addCatCard);

  const missing = defaultCategories().filter(dc => !state.categories.some(c => c.key === dc.key));
  if(missing.length){
    const syncCard = el('div','card');
    syncCard.style.cssText = 'border-style:dashed; box-shadow:none;';
    syncCard.innerHTML = '<div class="section-label">New built-in types available</div>';
    syncCard.appendChild(el('div','note', missing.map(m=>m.label).join(', ') + ' — not in your list yet. Adding them won\'t touch or overwrite anything you\'ve already customized.'));
    const syncBtn = document.createElement('button');
    syncBtn.className='btn btn-gold'; syncBtn.style.marginTop='12px'; syncBtn.style.width='auto'; syncBtn.style.padding='11px 18px';
    syncBtn.textContent = 'Add ' + missing.length + ' missing type' + (missing.length===1?'':'s');
    syncBtn.onclick = async ()=>{
      syncBtn.disabled = true; syncBtn.textContent = 'Adding...';
      state.categories = state.categories.concat(missing);
      const ok = await saveCategories();
      if(!ok){
        state.categories = state.categories.filter(c => !missing.some(m=>m.key===c.key)); // roll back
        alert('Could not save.' + (lastStorageError?'\n\nDetails: '+lastStorageError:''));
        syncBtn.disabled = false; syncBtn.textContent = 'Add ' + missing.length + ' missing type' + (missing.length===1?'':'s');
        return;
      }
      renderAdminTab(holder);
    };
    syncCard.appendChild(syncBtn);
    holder.appendChild(syncCard);
  }
}

function renderIssuesTab(holder, all){
  const rows = [];
  all.forEach(s => (s.issues||[]).forEach((iss, idx) => {
    rows.push({shift:s, iss, idx});
  }));
  const toolbar = el('div','toolbar');
  const sel = document.createElement('select');
  sel.innerHTML = '<option value="open">Open</option><option value="resolved">Resolved</option><option value="all">All</option>';
  sel.value = state.admin.issueFilter || 'open';
  sel.onchange = ()=>{ state.admin.issueFilter = sel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Show: '));
  toolbar.appendChild(sel);
  holder.appendChild(toolbar);

  const filter = state.admin.issueFilter || 'open';
  const filtered = rows.filter(r => filter==='all' ? true : filter==='resolved' ? r.shift.issuesResolved : !r.shift.issuesResolved);
  filtered.sort((a,b)=> new Date(b.shift.timestamp) - new Date(a.shift.timestamp));

  const card = el('div','card');
  if(!filtered.length){
    card.appendChild(el('div','empty','No issues in this view.'));
  } else {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>Equipment</th><th>Reported</th><th>Driver</th><th>Category</th><th>Severity</th><th>Note</th><th>Status</th><th></th></tr></thead>';
    const tbody = document.createElement('tbody');
    filtered.forEach(r=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><strong>${escapeHtml(r.shift.busId)}</strong></td>
        <td>${fmtDT(r.shift.timestamp)}</td>
        <td>${escapeHtml(r.shift.driver)}</td>
        <td>${escapeHtml(r.iss.category)}</td>
        <td>${r.iss.severity==='urgent' ? '<span class="tag open">Urgent</span>' : '<span class="tag minor">Minor</span>'}</td>
        <td style="max-width:220px;">${escapeHtml(r.iss.note||'—')}</td>
        <td>${r.shift.issuesResolved ? '<span class="tag resolved">Resolved</span>' : '<span class="tag open">Open</span>'}</td>`;
      const tdBtn = document.createElement('td');
      const btn = document.createElement('button');
      btn.className='btn btn-outline btn-sm';
      btn.textContent = r.shift.issuesResolved ? 'Reopen' : 'Mark resolved';
      btn.onclick = async ()=>{
        const arr = await loadShifts(r.shift.busId);
        const target = arr.find(x=>x.id===r.shift.id);
        if(target) target.issuesResolved = !target.issuesResolved;
        await saveShifts(r.shift.busId, arr);
        renderAdminTab(holder);
      };
      tdBtn.appendChild(btn);
      tr.appendChild(tdBtn);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    const scrollWrap = el('div','table-scroll');
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);
  }
  holder.appendChild(card);
}

function renderLogTab(holder, all){
  const toolbar = el('div','toolbar');
  const sel = document.createElement('select');
  sel.innerHTML = '<option value="all">All equipment</option>' + state.buses.map(b=>`<option value="${escapeHtml(b.id)}">${escapeHtml(b.id)}</option>`).join('');
  sel.value = state.admin.logBus || 'all';
  sel.onchange = ()=>{ state.admin.logBus = sel.value; renderAdminTab(holder); };
  toolbar.appendChild(document.createTextNode('Equipment: '));
  toolbar.appendChild(sel);

  const exportBtn = document.createElement('button');
  exportBtn.className='btn btn-outline btn-sm'; exportBtn.textContent='Export CSV';
  exportBtn.onclick = ()=> exportCsv(all);
  toolbar.appendChild(exportBtn);

  const busFilter = state.admin.logBus || 'all';

  if(busFilter !== 'all'){
    const clearBtn = document.createElement('button');
    clearBtn.className='btn btn-outline btn-sm'; clearBtn.textContent='Clear all logs for ' + busFilter;
    clearBtn.onclick = async ()=>{
      if(!confirm('Delete ALL shift logs for ' + busFilter + '? This cannot be undone.')) return;
      const ok = await saveShifts(busFilter, []);
      if(!ok){ alert('Could not delete.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
      renderAdminTab(holder);
    };
    toolbar.appendChild(clearBtn);
  }
  holder.appendChild(toolbar);

  const filtered = busFilter==='all' ? all : all.filter(s=>s.busId===busFilter);

  const card = el('div','card');
  if(!filtered.length){
    card.appendChild(el('div','empty','No shift logs yet.'));
  } else {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>When</th><th>Equipment</th><th>Driver</th><th>Action</th><th>Reading</th><th>Issues</th><th>Notes</th><th></th></tr></thead>';
    const tbody = document.createElement('tbody');
    filtered.forEach(s=>{
      const tr = document.createElement('tr');
      const sBus = state.buses.find(b=>b.id===s.busId) || {id:s.busId};
      const sUnit = unitLabel(categoryFor(sBus).trackingUnit);
      let issueCell = '—';
      if(s.action==='end' && s.issues && s.issues.length){
        issueCell = s.issues.length + (s.issues.some(i=>i.severity==='urgent')?' ⚠':'');
      } else if(s.action==='start' && s.preTrip){
        const fails = Object.values(s.preTrip).filter(c=>c.status==='fail').length;
        issueCell = fails ? fails + ' failed ⚠' : 'All passed';
      }
      tr.innerHTML = `<td>${fmtDT(s.timestamp)}</td>
        <td><strong>${escapeHtml(s.busId)}</strong></td>
        <td>${escapeHtml(s.driver)}</td>
        <td>${s.action==='start' ? '<span class="tag resolved">Start</span>' : '<span class="tag open" style="background:#f0e6d0;color:#8a6d1a;">End</span>'}</td>
        <td class="mono">${s.mileage!=null ? s.mileage.toLocaleString()+' '+sUnit : '—'}</td>
        <td>${issueCell}</td>
        <td style="max-width:220px;">${escapeHtml(s.notes||'—')}</td>`;
      const tdDel = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className='btn btn-outline btn-sm'; delBtn.textContent='Delete';
      delBtn.onclick = async ()=>{
        if(!confirm('Delete this shift log entry? This cannot be undone.')) return;
        const arr = await loadShifts(s.busId);
        const newArr = arr.filter(x=>x.id!==s.id);
        const ok = await saveShifts(s.busId, newArr);
        if(!ok){ alert('Could not delete.' + (lastStorageError?'\n\nDetails: '+lastStorageError:'')); return; }
        renderAdminTab(holder);
      };
      tdDel.appendChild(delBtn);
      tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    const scrollWrap = el('div','table-scroll');
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);
  }
  holder.appendChild(card);
}

function exportCsv(all){
  const rows = [['Timestamp','Bus','Driver','Action','Odometer','Issue Count','Urgent Issue','Notes']];
  all.forEach(s=>{
    rows.push([
      s.timestamp, s.busId, s.driver, s.action, (s.mileage!=null ? s.mileage : ''),
      (s.issues||[]).length,
      (s.issues||[]).some(i=>i.severity==='urgent') ? 'YES' : 'NO',
      (s.notes||'').replace(/[\r\n]+/g,' ')
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fleet-shift-log.csv'; a.click();
  URL.revokeObjectURL(url);
}

/* ---------- small dom helpers ---------- */
function el(tag, cls, text){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text!=null) e.textContent = text;
  return e;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- mode toggle ---------- */
document.getElementById('modeToggle').addEventListener('click', (e)=>{
  if(state.qrLocked) return; // driver QR sessions never expose admin
  const btn = e.target.closest('button[data-mode]');
  if(!btn) return;
  document.querySelectorAll('#modeToggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.mode = btn.dataset.mode;
  render();
});

/* ---------- boot ---------- */
async function boot(){
  app.innerHTML = '<div class="wrap"><div class="empty">Loading fleet data...</div></div>';

  if(!supa){
    app.innerHTML = '<div class="wrap"><div class="card"><div class="section-label">Can\'t connect to storage</div>' +
      '<div class="note">The Supabase library didn\'t load, so buses, shift logs, and settings can\'t be read or saved. ' +
      'If you\'re viewing this inside Claude, that\'s expected — Claude\'s sandbox blocks this kind of external request. ' +
      'Open this page from where it\'s actually hosted (e.g. your GitHub Pages URL) and reload.</div></div></div>';
    return;
  }

  await loadBuses();
  await loadCategories();
  await loadSettings();
  for(const b of state.buses){ await loadShifts(b.id); }

  // hash deep link: #bus=ID&action=start
  const hash = window.location.hash.replace('#','');
  if(hash){
    const params = new URLSearchParams(hash);
    const busId = params.get('bus');
    const action = params.get('action');
    if(busId && state.buses.some(b=>b.id===busId) && (action==='start'||action==='end')){
      state.mode='driver';
      state.driver.busId = busId;
      state.driver.action = action;
      state.driver.screen = 'form';
      state.qrLocked = true;
      state.qrLockedBusId = busId;

      const toggle = document.getElementById('modeToggle');
      if(toggle) toggle.style.display = 'none';
      const bus = state.buses.find(b=>b.id===busId);
      const subtitle = document.querySelector('.brand-text .t2');
      if(subtitle && bus) subtitle.textContent = bus.id + (bus.name ? ' · ' + bus.name : '') + ' · ' + categoryFor(bus).label;
    }
  }
  render();
}
boot();

})();
</script>
</body>
</html>
